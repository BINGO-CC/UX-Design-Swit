<updated-code><!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap 编辑器原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== CSS Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { width: 100%; height: 100%; overflow: auto; }
  body { width: 100%; height: 100%; overflow: hidden; min-width: 960px; min-height: 600px; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #141414;
    color: #EBEBEB;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; }

  /* ===== Layout ===== */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ===== Header ===== */
  .mm-header {
    height: 48px;
    background: #141414;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
    z-index: 100;
    position: relative;
  }
  .mm-header-brand {
    font-size: 13px;
    font-weight: 600;
    color: #EBEBEB;
    opacity: 0.9;
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mm-header-nav-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px; color: #555555;
    transition: background 150ms ease, color 150ms ease;
  }
  .mm-header-nav-btn:hover { background: #1e1e1e; color: #EBEBEB; }
  .mm-header-divider { width: 1px; height: 18px; background: #242424; margin: 0 2px; }
  .mm-header-tabs {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 2px;
  }
  .mm-header-tab {
    font-size: 13px; font-weight: 400; color: #555555;
    padding: 5px 12px; border-radius: 5px;
    transition: background 100ms ease, color 100ms ease;
  }
  .mm-header-tab:hover { color: #EBEBEB; background: #1e1e1e; }
  .mm-header-tab.active {
    color: #EBEBEB; background: #252525; font-weight: 500;
  }
  .mm-header-spacer { flex: 1; }
  .mm-header-actions { display: flex; align-items: center; gap: 6px; }
  .mm-header-status {
    font-size: 12px; color: #555555;
    display: flex; align-items: center; gap: 5px;
  }
  .mm-header-status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #CCFF00;
  }
  .mm-header-action-btn {
    font-size: 13px; font-weight: 400; color: #555555;
    padding: 5px 10px; border-radius: 5px;
    transition: background 150ms ease, color 150ms ease;
    display: flex; align-items: center; gap: 5px;
  }
  .mm-header-action-btn:hover { background: #1e1e1e; color: #EBEBEB; }

  /* ===== Body ===== */
  .mm-body { display: flex; flex: 1; overflow: hidden; padding: 12px 16px 16px; gap: 0; }

  /* ===== Canvas Wrapper (带描边容器) ===== */
  .mm-canvas-wrapper {
    width: max-content;
    max-width: 100%;
    margin: 0 auto;
    flex-shrink: 1;
    border: 1px solid #252525;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    background: #141414;
    min-width: 0;
  }

  /* ===== Stage List (画布内最左列) ===== */
  .mm-stage-col {
    width: 160px;
    flex-shrink: 0;
    background: #141414;
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .mm-stage-col-header {
    padding: 14px 12px 8px;
    font-size: 10px;
    font-weight: 500;
    color: #3a3a3a;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .mm-stage-list {
    flex: 1; overflow-y: auto; padding: 0 6px;
  }
  .mm-stage-item {
    padding: 7px 8px;
    border-radius: 6px;
    font-size: 12px; font-weight: 400; color: #666666;
    cursor: pointer;
    transition: background 100ms ease, color 100ms ease;
    margin-bottom: 2px;
    display: flex; align-items: center; gap: 6px;
    user-select: none;
  }
  .mm-stage-item:hover { background: #1a1a1a; color: #EBEBEB; }
  .mm-stage-item.active { background: #FFFFFF; color: #000000; font-weight: 500; }
  .mm-stage-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; opacity: 0.5; flex-shrink: 0;
  }
  .mm-stage-item.active .mm-stage-dot { opacity: 1; background: #000; }
  .mm-stage-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mm-stage-edit-btn {
    width: 16px; height: 16px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #888888; opacity: 0;
    transition: opacity 150ms ease, background 150ms ease;
  }
  .mm-stage-item:hover .mm-stage-edit-btn { opacity: 1; }
  .mm-stage-item.active .mm-stage-edit-btn { color: #555; }
  .mm-stage-edit-btn:hover { background: rgba(0,0,0,0.08); }
  .mm-stage-item:not(.active) .mm-stage-edit-btn:hover { background: #2a2a2a; color: #EBEBEB; }
  .mm-stage-add {
    margin: 0 6px 4px; padding: 7px 8px;
    border-radius: 6px; font-size: 12px; font-weight: 400; color: #666666;
    display: flex; align-items: center; gap: 5px;
    cursor: pointer; border: 1px dashed #333333;
    transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
    flex-shrink: 0;
  }
  .mm-stage-add:hover { background: #1a1a1a; color: #EBEBEB; border-color: #333333; }
  /* Stage 编辑模式 — 重命名输入框 */
  .mm-stage-rename-input {
    flex: 1; min-width: 0;
    background: #1a1a1a; border: 1px solid #CCFF00;
    border-radius: 4px; padding: 2px 6px;
    font-size: 12px; font-weight: 400; color: #EBEBEB;
    font-family: inherit; outline: none;
  }
  /* Stage 编辑模式 — 删除按钮 */
  .mm-stage-del-btn {
    width: 18px; height: 18px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #FF4444; opacity: 0.6;
    transition: opacity 150ms ease, background 150ms ease;
  }
  .mm-stage-del-btn:hover { opacity: 1; background: rgba(255,68,68,0.12); }
  .mm-stage-item.active .mm-stage-del-btn { color: #FF4444; }
  /* Stage 编辑模式 — 完成编辑按钮 */
  .mm-stage-done {
    margin: 0 6px 4px; padding: 7px 8px;
    border-radius: 6px; font-size: 12px; font-weight: 500;
    color: #141414; background: #CCFF00;
    text-align: center; cursor: pointer;
    transition: opacity 150ms ease;
  }
  .mm-stage-done:hover { opacity: 0.85; }

  /* B2-11: 模块名称编辑输入框 */
  .mm-card-title-input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    font-size: 12px; font-weight: 500; color: #EBEBEB;
    font-family: inherit; padding: 0;
    border-bottom: 1px solid #CCFF00;
  }

  /* ===== Canvas Scroll Area ===== */
  .mm-canvas {
    flex: 1; overflow-x: auto; overflow-y: auto;
    position: relative; min-width: 0;
  }
  .mm-canvas-inner {
    display: flex; padding: 0; gap: 0;
    min-height: 100%; position: relative;
    width: max-content;
    margin-left: auto;
    margin-right: auto;
  }

  /* ===== Layer Columns ===== */
  .mm-layer-col {
    width: 360px; flex-shrink: 0;
    display: flex; flex-direction: column;
    position: relative;
    border-right: 1px solid #1e1e1e;
  }
  /* L1/L2/L3 底板 */
  .mm-layer-col[data-layer="L1"],
  .mm-layer-col[data-layer="L2"],
  .mm-layer-col[data-layer="L3"] { background: #303030; }

  .mm-layer-col[data-layer="L1.5"],
  .mm-layer-col[data-layer="L2.5"] { background: #1a1a1a; }

  /* 列头 */
  .mm-col-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 12px 12px;
    position: relative; flex-shrink: 0;
  }
  .mm-col-label-wrap { position: relative; display: inline-block; }
  .mm-col-label {
    font-size: 28px; font-weight: 700;
    color: rgba(255,255,255,0.18);
    letter-spacing: -1px;
    cursor: default; user-select: none;
    line-height: 1;
    transition: color 150ms ease;
  }
  .mm-col-label-wrap:hover .mm-col-label { color: rgba(255,255,255,0.35); }

  /* Global Floating Tooltip */
  .mm-global-tip {
    position: fixed;
    transform: translateX(-50%);
    background: #1a1a1a; border: 1px solid #333333;
    border-radius: 6px; padding: 5px 8px;
    font-size: 12px; font-weight: 400; color: #EBEBEB;
    white-space: nowrap; z-index: 9999;
    opacity: 0; pointer-events: none;
    transition: opacity 150ms ease;
  }
  .mm-global-tip.visible { opacity: 1; }

  /* Layer Tooltip (长文本，固定宽度) */
  .mm-tooltip {
    position: absolute; left: 0; top: calc(100% + 8px);
    background: #1a1a1a; border: 1px solid #333333;
    border-radius: 7px; padding: 8px 10px;
    font-size: 12px; font-weight: 400; color: #EBEBEB;
    white-space: normal; z-index: 300;
    opacity: 0; pointer-events: none;
    transition: opacity 150ms ease; transition-delay: 0ms;
    width: 260px; line-height: 1.5;
  }
  .mm-col-label-wrap:hover .mm-tooltip { opacity: 1; transition-delay: 400ms; }

  .mm-col-add-btn {
    width: 22px; height: 22px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #666666;
    transition: background 150ms ease, color 150ms ease;
    flex-shrink: 0;
  }
  .mm-col-add-btn:hover { background: #2a2a2a; color: #EBEBEB; }

  .mm-col-cards {
    flex: 1; padding: 0 8px 24px;
    position: relative;
  }

  /* ===== Module Card ===== */
  .mm-card {
    background: #242424;
    border: 1px solid rgba(80,80,80,0.5);
    border-radius: 8px;
    overflow: visible;
    position: absolute;
    left: 60px; right: 60px;
    animation: cardFadeIn 150ms ease forwards;
    transition: border-color 150ms ease;
    z-index: 4;
  }
  .mm-card:hover { border-color: #777777; }
  .mm-card.orphan { border: 1px dashed #3a3a3a; }
  /* 卡片拖动中 */
  .mm-card.card-dragging { opacity: 0.35; pointer-events: none; }
  /* 卡片拖动放置指示线 */
  .mm-card-drop-indicator {
    height: 2px; background: #CCFF00; border-radius: 2px;
    margin: 3px 0; pointer-events: none;
    box-shadow: 0 0 8px rgba(204,255,0,0.5);
  }
  /* 卡片标题拖动抓手 */
  .mm-card-header { cursor: grab; }
  .mm-card-header:active { cursor: grabbing; }
  /* 功能节点跨卡片拖动：目标卡片高亮 */
  .mm-card.feat-drop-target { box-shadow: 0 0 0 1.5px #CCFF00; border-color: #CCFF00 !important; }
  /* 功能节点跨卡片拖动：目标卡片末尾落点指示 */
  .mm-card-feat-drop-bottom {
    height: 2px; background: #CCFF00; border-radius: 2px;
    margin: 2px 4px 4px; pointer-events: none;
    box-shadow: 0 0 8px rgba(204,255,0,0.5);
  }
  /* 孤立候选卡片（连线模式）：禁止常态 hover 反馈（标题高亮、按钮出现等） */
  .mm-card.connect-candidate .mm-card-title:hover { background: transparent; }
  .mm-card.connect-candidate .mm-card-btn { opacity: 0 !important; pointer-events: none; }
  .mm-card.connect-candidate .mm-feature { cursor: default; }
  .mm-card.connect-candidate .mm-feature:hover { background: #262626; }
  .mm-card.connect-candidate .mm-feature-wrap:hover .mm-feature-del,
  .mm-card.connect-candidate .mm-feature-wrap:hover .mm-feature-connect { opacity: 0 !important; pointer-events: none; }
  /* 候选卡片悬浮态描边变为预览高亮色 */
  .mm-card.connect-candidate.candidate-hovered { border-color: #CCFF00 !important; border-style: solid !important; box-shadow: 0 0 14px rgba(204,255,0,0.22); }

  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mm-card-header {
    min-height: 36px;
    display: flex; align-items: center;
    padding: 8px 8px 8px 12px; gap: 6px;
  }
  .mm-card-title {
    flex: 1;
    font-size: 15px; font-weight: 600; color: #FFFFFF;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: text; border-radius: 4px; padding: 2px 4px; margin: -2px -4px;
    transition: background 150ms ease;
  }
  .mm-card-title:hover { background: #2e2e2e; }
  .mm-card-btn {
    width: 20px; height: 20px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0;
    transition: opacity 150ms ease, background 150ms ease;
  }
  .mm-card:hover .mm-card-btn { opacity: 1; }
  .mm-card-btn.add { color: #666666; }
  .mm-card-btn.add:hover { background: #333333; color: #EBEBEB; }
  .mm-card-btn.del { color: #FF4444; }
  .mm-card-btn.del:hover { background: #3a1a1a; }

  .mm-card-features {
    padding: 0 4px 4px; display: flex; flex-direction: column; gap: 4px;
  }

  /* ===== Feature Node 容器（包含外部左右元素） ===== */
  .mm-feature-wrap {
    display: flex; align-items: center; gap: 0;
    position: relative;
  }

  /* 优先级圆点（节点左侧外部） */
  .mm-priority-dot-single {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; cursor: pointer;
    transition: transform 150ms ease;
    margin-right: 6px; margin-left: 2px;
  }
  .mm-priority-dot-single:hover { transform: scale(1.3); }

  /* Priority Pill（展开态） */
  .mm-priority-pill {
    display: flex; align-items: center; gap: 4px;
    background: #2a2a2a; border: 1px solid #333333;
    border-radius: 20px; padding: 4px 8px;
    position: absolute; left: -4px;
    z-index: 400; opacity: 0; pointer-events: none;
    transform: scale(0.9);
    transition: opacity 100ms ease, transform 100ms ease;
    white-space: nowrap;
  }
  .mm-priority-pill.open { opacity: 1; pointer-events: auto; transform: scale(1); }
  .mm-priority-pill-dot {
    width: 8px; height: 8px; border-radius: 50%;
    cursor: pointer; flex-shrink: 0;
    transition: transform 150ms ease, opacity 150ms ease;
    opacity: 0.5;
  }
  .mm-priority-pill-dot:hover { transform: scale(1.3); opacity: 1; }
  .mm-priority-pill-dot.selected { opacity: 1; }

  /* ===== Feature Node ===== */
  .mm-feature {
    flex: 1; height: 32px;
    display: flex; align-items: center;
    padding: 0 8px 0 10px;
    border-radius: 5px; background: #262626;
    box-shadow: 0 0 0 1px rgba(51,51,51,0.5);
    position: relative; gap: 6px; cursor: default;
    transition: background 150ms ease, box-shadow 150ms ease;
    min-width: 0;
    overflow: hidden;
  }
  .mm-feature:hover { background: #303030; }

  .mm-feature-text {
    flex: 1;
    font-size: 13px; font-weight: 400; color: #999999;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: text; min-width: 0;
  }

  /* feature.layer 层级标签（消费 MODE_A_PROMPT 输出的 layer 字段） */
  .mm-layer-tag {
    font-size: 10px; font-weight: 500; color: #444444;
    flex-shrink: 0; letter-spacing: 0.2px;
    padding: 1px 4px; border-radius: 3px;
    background: rgba(255,255,255,0.04);
    border: 1px solid #333333;
    white-space: nowrap; position: relative;
  }
  .mm-layer-tag.l3 { color: #888888; border-color: #444444; cursor: default; }
  .mm-layer-tag .mm-l3-tooltip {
    position: absolute; right: 0; top: calc(100% + 8px);
    background: #1a1a1a; border: 1px solid #333333;
    border-radius: 7px; padding: 8px 10px;
    font-size: 12px; font-weight: 400; color: #EBEBEB; white-space: normal;
    width: 200px; z-index: 300; opacity: 0; pointer-events: none;
    transition: opacity 150ms ease; transition-delay: 0ms; line-height: 1.5;
  }
  .mm-layer-tag.l3:hover .mm-l3-tooltip { opacity: 1; transition-delay: 400ms; }

  /* UX Supplement icon */
  .mm-ux-icon {
    font-size: 13px; color: #FFD700;
    flex-shrink: 0; cursor: default; position: relative;
  }
  .mm-ux-tooltip {
    position: absolute; right: 0; top: calc(100% + 8px);
    background: #1a1a1a; border: 1px solid #333333;
    border-radius: 7px; padding: 8px 10px;
    font-size: 12px; font-weight: 400; color: #EBEBEB; white-space: normal;
    width: 200px; z-index: 300;
    opacity: 0; pointer-events: none;
    transition: opacity 150ms ease; transition-delay: 0ms; line-height: 1.5;
  }
  .mm-ux-icon:hover .mm-ux-tooltip { opacity: 1; transition-delay: 400ms; }

  /* 删除按钮（内部右侧，hover 显示） */
  .mm-feature-del {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #FF4444;
    opacity: 0; transition: opacity 150ms ease; cursor: pointer;
  }
  .mm-feature-wrap:hover .mm-feature-del { opacity: 1; }

  /* 连接按钮（绝对定位，卡片右边缘外侧，仅对未链接节点显示） */
  .mm-feature-right {
    position: absolute;
    left: 100%; margin-left: 6px;
    top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px;
  }
  /* 无 child → hover 显示连接按钮 */
  .mm-feature-connect {
    color: #444444; opacity: 0;
    transition: opacity 150ms ease, color 150ms ease;
    cursor: pointer;
  }
  .mm-feature-wrap:hover .mm-feature-connect { opacity: 1; }
  .mm-feature-connect:hover { color: #CCFF00; }

  /* Feature 内联编辑输入框 (B2-8) */
  .mm-feature-edit-input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    font-size: 13px; font-weight: 400; color: #EBEBEB;
    font-family: inherit; padding: 0;
  }
  .mm-feature.editing { box-shadow: 0 0 0 1px #CCFF00; background: #2a2a2a; }

  /* Feature 拖拽排序 (B2-9) */
  .mm-feature-wrap.dragging { opacity: 0.4; }
  .mm-feature-wrap { position: relative; }
  .mm-feature-wrap.drag-over-top::before,
  .mm-feature-wrap.drag-over-bottom::after {
    content: '';
    position: absolute; left: 0; right: 0;
    height: 2px; background: #CCFF00; border-radius: 1px;
    pointer-events: none; z-index: 5;
  }
  .mm-feature-wrap.drag-over-top::before { top: -1px; }
  .mm-feature-wrap.drag-over-bottom::after { bottom: -1px; }

  /* 连线 hover 高亮 (B2-10) */
  #mm-lines .line-path.hovered { opacity: 1; }
  #mm-lines .line-dot.hovered { opacity: 1; }

  /* ===== SVG Lines Layer ===== */
  #mm-lines {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; overflow: visible;
    z-index: 1; /* 默认在卡片(z-index:4)之下 */
    transition: z-index 0s;
  }
  #mm-lines.elevated {
    z-index: 20; /* hover/选中时提到最上层 */
  }
  #mm-lines .line-path {
    fill: none; stroke: #5E6B3B; stroke-width: 1.5;
    opacity: 1;
    transition: stroke 150ms ease-out, stroke-width 150ms ease-out, opacity 150ms ease-out;
  }
  #mm-lines .line-path.hovered { stroke: #CCFF00; opacity: 1; }
  #mm-lines .line-path.selected { stroke: #FFFFFF; stroke-width: 2; opacity: 1; }
  #mm-lines .line-dot {
    fill: #5E6B3B; opacity: 1;
    transition: fill 150ms ease-out, opacity 150ms ease-out;
  }
  #mm-lines .line-dot.hovered { fill: #CCFF00; }
  #mm-lines .line-dot.selected { fill: #FFFFFF; opacity: 1; }
  /* 选中态菱形把手 */
  #mm-lines .line-diamond {
    fill: #FFFFFF; opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease-out;
  }
  #mm-lines .line-diamond.selected { opacity: 1; }
  #mm-lines .line-diamond.hovered { opacity: 0.6; }
  #mm-lines .line-hit {
    fill: none; stroke: transparent; stroke-width: 10;
    pointer-events: stroke; cursor: pointer;
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #252525; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #333333; }

  /* ===== B5: 预览卡片（创建模式） ===== */
  .mm-preview-card {
    position: absolute;
    left: 60px; right: 60px;
    background: #242424;
    border: 1.5px solid #CCFF00;
    border-radius: 8px;
    z-index: 15;
    opacity: 0.6;
