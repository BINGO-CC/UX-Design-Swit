// Mode B helpers
function bFindP(id){return store.B.find(p=>p.id===id);}
function bFindS(pid,sid){const p=bFindP(pid);return p?p.stages.find(s=>s.id===sid):null;}
function bToggle(id){const p=bFindP(id);if(p)p.collapsed=!p.collapsed;renderAll();}
function bAddPath(){const nId=nid();store.B.push({id:nId,title:'新行为路径',startPoint:'',collapsed:false,stages:[{id:nid(),title:'新阶段',actions:[{id:nid(),text:''}],feedbacks:[],branches:[]}]});save();renderAll();toast('已新增路径');focusEl(`[data-f="b-title"][data-i="${nId}"]`);}
function bDelPath(id){store.B=store.B.filter(p=>p.id!==id);save();renderAll();toast('已删除');}
function bAddStage(pid){const p=bFindP(pid);if(p){const nId=nid();p.stages.push({id:nId,title:'新阶段',actions:[{id:nid(),text:''}],feedbacks:[],branches:[]});save();renderAll();toast('已新增');focusEl(`[data-f="b-stitle"][data-i="${nId}"]`);}}
function bDelStage(pid,sid){const p=bFindP(pid);if(p){p.stages=p.stages.filter(s=>s.id!==sid);save();renderAll();toast('已删除');}}
function bCopyStage(pid,sid){
  const p=bFindP(pid);if(!p)return;
  const s=bFindS(pid,sid);if(!s)return;
  const idx=p.stages.findIndex(x=>x.id===sid);
  function deepClone(obj){return JSON.parse(JSON.stringify(obj));}
  function reId(obj){
    if(Array.isArray(obj))return obj.map(reId);
    if(obj&&typeof obj==='object'){const n={};for(const k in obj){n[k]=k==='id'?nid():reId(obj[k]);}return n;}
    return obj;
  }
  const copy=reId(deepClone(s));copy.title=s.title+' (副本)';
  p.stages.splice(idx+1,0,copy);save();renderAll();toast('阶段已复制');
}
function bAddStep(pid,sid,type){const s=bFindS(pid,sid);if(s){const nId=nid();s[type].push({id:nId,text:''});save();renderAll();toast('已新增');focusEl(`[data-f="b-step"][data-i="${nId}"]`);}}
function bDelStep(pid,sid,type,id){const s=bFindS(pid,sid);if(s){s[type]=s[type].filter(x=>x.id!==id);save();renderAll();toast('已删除');}}
function bAddBranch(pid,sid){const s=bFindS(pid,sid);if(s){const nId=nid();s.branches.push({id:nId,label:'',items:[{id:nid(),text:''}]});save();renderAll();toast('已新增');focusEl(`[data-f="b-blabel"][data-i="${nId}"]`);}}
function bDelBranch(pid,sid,bid){const s=bFindS(pid,sid);if(s){s.branches=s.branches.filter(b=>b.id!==bid);save();renderAll();toast('已删除');}}
function bAddBItem(pid,sid,bid){const s=bFindS(pid,sid);const b=s?.branches.find(x=>x.id===bid);if(b){const nId=nid();b.items.push({id:nId,text:''});save();renderAll();toast('已新增');focusEl(`[data-f="b-bitem"][data-i="${nId}"]`);}}
function bDelBItem(pid,sid,bid,iid){const s=bFindS(pid,sid);const b=s?.branches.find(x=>x.id===bid);if(b){b.items=b.items.filter(x=>x.id!==iid);save();renderAll();toast('已删除');}}

// FB Popover (反馈与边界条件浮层)
let fbPopoverState = null; // { pid, sid }
function openFbPopover(pid, sid) {
  fbPopoverState = { pid, sid };
  renderFbPopover();
}
function closeFbPopover() {
  fbPopoverState = null;
  const ol = document.getElementById('fbPopoverOverlay');
  if (ol) ol.remove();
}
function renderFbPopover() {
  const ol = document.getElementById('fbPopoverOverlay');
  if (ol) ol.remove();
  if (!fbPopoverState) return;
  const { pid, sid } = fbPopoverState;
  const path = bFindP(pid); if (!path) return;
  const stageIdx = path.stages.findIndex(s => s.id === sid);
  if (stageIdx < 0) return;
  const stage = path.stages[stageIdx];

  const tabsHtml = path.stages.map((s, i) =>
    `<div class="fb-stage-tab ${s.id === sid ? 'active' : ''}" onclick="switchFbPopoverStage('${pid}','${s.id}')">${i+1}. ${esc(s.title.length>12?s.title.slice(0,12)+'…':s.title)}</div>`
  ).join('');

  const feedbacksHtml = stage.feedbacks.map(f => `
    <li class="step-item"><span class="step-num">•</span>
      <span class="step-content editable" contenteditable="true" data-f="b-step" data-i="${f.id}" data-s="${stage.id}" data-p="${pid}" data-t="feedbacks">${esc(f.text)}</span>
          <button class="step-del" onclick="bDelStep('${pid}','${stage.id}','feedbacks','${f.id}');renderFbPopover()" aria-label="删除">${ICONS.x}</button>
    </li>`).join('');

  const branchesHtml = stage.branches.map(b => `
    <div class="branch">
      <div class="branch-header">
        <span class="icon-btn" style="pointer-events:none;color:var(--orange);">${ICONS.arrowRight}</span>
        <span class="branch-title editable" contenteditable="true" data-f="b-blabel" data-i="${b.id}" data-s="${stage.id}" data-p="${pid}">${esc(b.label)}</span>
        <button class="step-del" onclick="bDelBranch('${pid}','${stage.id}','${b.id}');renderFbPopover()" aria-label="删除">${ICONS.x}</button>
      </div>
      ${b.items.map(it=>`<div class="branch-item"><span class="bullet">•</span>
        <span class="editable" contenteditable="true" style="flex:1" data-f="b-bitem" data-i="${it.id}" data-b="${b.id}" data-s="${stage.id}" data-p="${pid}">${esc(it.text)}</span>
        <button class="step-del" onclick="bDelBItem('${pid}','${stage.id}','${b.id}','${it.id}');renderFbPopover()" aria-label="删除">${ICONS.x}</button>
      </div>`).join('')}
      <button class="add-btn" onclick="bAddBItemInPopover('${pid}','${stage.id}','${b.id}')">+ 新增分支项</button>
    </div>`).join('');

  const html = `<div class="fb-popover-overlay" id="fbPopoverOverlay" onclick="if(event.target===this)closeFbPopover()">
    <div class="fb-popover">
      <div class="fb-popover-head">
        <h3>🔄 反馈与边界条件</h3>
        <button class="fb-popover-close" onclick="closeFbPopover()" aria-label="关闭">${ICONS.x}</button>
      </div>
      <div class="fb-stage-tabs">${tabsHtml}</div>
      <div class="fb-popover-body">
        <div class="fb-section">
          <div class="fb-section-title feedback">
            <span style="display:inline-flex;align-items:center;gap:5px;">${ICONS.feedback} 系统反馈</span>
            <button class="add-inline-btn" onclick="bAddStepInPopover('${pid}','${stage.id}','feedbacks')">＋新增反馈</button>
          </div>
          <div class="fb-section-body">
            <ul class="step-list">${feedbacksHtml}</ul>
          </div>
        </div>
        <div class="fb-section">
          <div class="fb-section-title branch">
            <span style="display:inline-flex;align-items:center;gap:5px;">${ICONS.arrowRight} 分支条件</span>
            <button class="add-btn" onclick="bAddBranchInPopover('${pid}','${stage.id}')" style="margin-top:0;border-color:var(--orange);color:var(--orange);">＋新增分支</button>
          </div>
          <div class="fb-section-body">
            ${branchesHtml}
          </div>
        </div>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  bindEditableInPopover();
}
function switchFbPopoverStage(pid, sid) {
  fbPopoverState = { pid, sid };
  renderFbPopover();
}
function bAddStepInPopover(pid, sid, type) {
  const s = bFindS(pid, sid); if (!s) return;
  const nId = nid(); s[type].push({id:nId, text:''});
  save(); renderFbPopover();
  requestAnimationFrame(() => {
    const el = document.querySelector(`#fbPopoverOverlay [data-f="b-step"][data-i="${nId}"]`);
    if (el) { el.focus(); const r=document.createRange(),sel=window.getSelection(); r.selectNodeContents(el); r.collapse(false); sel.removeAllRanges(); sel.addRange(r); }
  });
}
function bAddBranchInPopover(pid, sid) {
  const s = bFindS(pid, sid); if (!s) return;
  const nId = nid(); s.branches.push({id:nId, label:'', items:[{id:nid(), text:''}]});
  save(); renderFbPopover();
}
function bAddBItemInPopover(pid, sid, bid) {
  const s = bFindS(pid, sid); const b = s?.branches.find(x=>x.id===bid); if (!b) return;
  const nId = nid(); b.items.push({id:nId, text:''});
  save(); renderFbPopover();
}
function bindEditableInPopover() {
  // 使浮层内 editable 在 blur 时也能触发统一编辑处理
  requestAnimationFrame(() => {
    document.querySelectorAll('#fbPopoverOverlay .editable').forEach(el => {
      el.onblur = onBlur;
    });
    // 阶段 Tab 区支持鼠标滚轮横向滚动
    const tabs = document.querySelector('#fbPopoverOverlay .fb-stage-tabs');
    if (tabs) {
      tabs.addEventListener('wheel', e => {
        if (e.deltaY !== 0) {
          e.preventDefault();
          tabs.scrollLeft += e.deltaY;
        }
      }, { passive: false });
    }
  });
}

      <div class="card-body ${page.collapsed?'collapsed':''}">
        <div class="tree-node root">${page.nodes.map(n=>renderCNode(page.id,n)).join('')}</div>
        <button class="add-btn" onclick="cAddNode('${page.id}',null)">+ 新增根节点</button>
      </div>
    </div>`).join('') +
    '<div style="margin-top:12px;"><button class="add-btn" onclick="cAddPage()">+ 新增页面架构</button></div>';
}

function renderCNode(pageId,node,depth) {
  depth = depth||0;
  return `<div class="tree-node" style="${depth===0?'margin-left:0;':''}">
    <div class="node-row">
      <span class="node-icon">${node.icon||'├─'}</span>
      <span class="node-label editable" contenteditable="true" data-f="c-label" data-i="${node.id}" data-pg="${pageId}">${esc(node.label)}</span>
      ${node.note?`<span class="node-note">(${esc(node.note)})</span>`:''}
      <span class="node-actions">
        <button onclick="cAddNode('${pageId}','${node.id}')" title="添加子节点">＋</button>
        <button onclick="cEditNote('${pageId}','${node.id}')" title="编辑备注">📝</button>
        <button class="del-btn" onclick="cDelNode('${pageId}','${node.id}')" title="删除" aria-label="删除">${ICONS.x}</button>
      </span>
    </div>
    ${(node.children||[]).map(c=>renderCNode(pageId,c,depth+1)).join('')}
  </div>`;
}

// Mode C helpers
function cFindPage(id){return store.C.find(p=>p.id===id);}
function cFindNode(nodes,id){
  for(const n of nodes){if(n.id===id)return n;const r=cFindNode(n.children||[],id);if(r)return r;}return null;
}
function cFindParent(nodes,id){
  for(const n of nodes){if((n.children||[]).some(c=>c.id===id))return n;const r=cFindParent(n.children||[],id);if(r)return r;}return null;
}
function cToggle(id){const p=cFindPage(id);if(p)p.collapsed=!p.collapsed;renderAll();}
function cAddPage(){const nId=nid();store.C.push({id:nId,pageName:'',collapsed:false,nodes:[{id:nid(),icon:'📌',label:'',note:'',children:[]}]});save();renderAll();toast('已新增');focusEl(`[data-f="c-page"][data-i="${nId}"]`);}
function cDelPage(id){store.C=store.C.filter(p=>p.id!==id);save();renderAll();toast('已删除');}
function cAddNode(pgId,parentId){
  const pg=cFindPage(pgId);if(!pg)return;
  const nId=nid();
  const newNode={id:nId,icon:'',label:'',note:'',children:[]};
  if(!parentId){pg.nodes.push(newNode);}
  else{const p=cFindNode(pg.nodes,parentId);if(p){if(!p.children)p.children=[];p.children.push(newNode);}}
  save();renderAll();toast('已新增');focusEl(`[data-f="c-label"][data-i="${nId}"]`);
}
function cDelNode(pgId,nodeId){
  const pg=cFindPage(pgId);if(!pg)return;
  function del(arr){return arr.filter(n=>{if(n.id===nodeId)return false;n.children=del(n.children||[]);return true;});}
  pg.nodes=del(pg.nodes);save();renderAll();toast('已删除');
}
function cEditNote(pgId,nodeId){
  const pg=cFindPage(pgId);if(!pg)return;
  const n=cFindNode(pg.nodes,nodeId);if(!n)return;
  const v=prompt('编辑设计依据/备注：',n.note||'');
  if(v===null)return;n.note=v;save();renderAll();toast('已更新');
}

// ============================================================
// onBlur — unified edit handler for all modes
// ============================================================
function onBlur(e) {
  const el = e.target, ds = el.dataset, v = el.textContent.trim();
  let ch = false;
  const f = ds.f;
  // Mode A
  if (f === 'a-main' || f === 'a-hidden') {
    const type = f === 'a-main' ? 'main' : 'hidden';
    const g = store.A.goals[type].find(x => x.id === ds.i);
    if (g && g.text !== v) { g.text = v; ch = true; }
  } else if (f === 'a-modname') {
    const m = store.A.modules.find(x => x.id === ds.i);
    if (m && m.name !== v) { m.name = v; ch = true; }
  } else if (f === 'a-feat') {
    const m = store.A.modules.find(x => x.id === ds.mod);
    const it = m?.features.find(x => x.id === ds.i);
    if (it && it.text !== v) { it.text = v; ch = true; }
  } else if (f === 'a-sug') {
    const m = store.A.modules.find(x => x.id === ds.mod);
    const s = m?.suggestions.find(x => x.id === ds.i);
    if (s && s.text !== v) { s.text = v; ch = true; }
  } else if (f === 'a-sugr') {
    const m = store.A.modules.find(x => x.id === ds.mod);
    const s = m?.suggestions.find(x => x.id === ds.i);
    if (s && s.reason !== v) { s.reason = v; ch = true; }
  }
  // Mode B
  else if (f === 'b-title') { const p = bFindP(ds.i); if (p && p.title !== v) { p.title = v; ch = true; } }
  else if (f === 'b-start') { const p = bFindP(ds.i); if (p && p.startPoint !== v) { p.startPoint = v; ch = true; } }
  else if (f === 'b-stitle') { const s = bFindS(ds.p, ds.i); if (s && s.title !== v) { s.title = v; ch = true; } }
  else if (f === 'b-step') {
    const s = bFindS(ds.p, ds.s); const it = s?.[ds.t]?.find(x => x.id === ds.i);
    if (it && it.text !== v) { it.text = v; ch = true; }
  }
  else if (f === 'b-blabel') {
    const s = bFindS(ds.p, ds.s); const b = s?.branches.find(x => x.id === ds.i);
    if (b && b.label !== v) { b.label = v; ch = true; }
  }
  else if (f === 'b-bitem') {
    const s = bFindS(ds.p, ds.s); const b = s?.branches.find(x => x.id === ds.b);
    const it = b?.items.find(x => x.id === ds.i);
    if (it && it.text !== v) { it.text = v; ch = true; }
  }
  // Mode C
  else if (f === 'c-page') { const pg = cFindPage(ds.i); if (pg && pg.pageName !== v) { pg.pageName = v; ch = true; } }
  else if (f === 'c-label') {
    const pg = cFindPage(ds.pg); const n = pg ? cFindNode(pg.nodes, ds.i) : null;
    if (n && n.label !== v) { n.label = v; ch = true; }
  }
  // Mode D — specName
  else if (f === 'd-name') { const sp = dFindSpec(ds.i); if (sp && sp.specName !== v) { sp.specName = v; ch = true; } }
  // Mode D — Elements (区域)
  else if (f === 'd-area') { const sp = dFindSpec(ds.sp); const area = (sp?.elements||[]).find(x => x.id === ds.i); if (area && area.area !== v) { area.area = v; ch = true; } }
  else if (f === 'd-elabel') { const sp = dFindSpec(ds.sp); const area = (sp?.elements||[]).find(x => x.id === ds.area); const it = (area?.items||[]).find(x => x.id === ds.i); if (it && it.label !== v) { it.label = v; ch = true; } }
  else if (f === 'd-edesc') { const sp = dFindSpec(ds.sp); const area = (sp?.elements||[]).find(x => x.id === ds.area); const it = (area?.items||[]).find(x => x.id === ds.i); if (it && it.desc !== v) { it.desc = v; ch = true; } }
  // Mode D — Flows (交互流)
  else if (f === 'd-faction') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.i); if (fl && fl.action !== v) { fl.action = v; ch = true; } }
  else if (f === 'd-ftrig') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.i); if (fl && fl.trigger !== v) { fl.trigger = v; ch = true; } }
  else if (f === 'd-fvalid') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.i); if (fl && fl.validation !== v) { fl.validation = v; ch = true; } }
  else if (f === 'd-fstep') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.fl); const st = (fl?.steps||[]).find(x => x.id === ds.i); if (st && st.desc !== v) { st.desc = v; ch = true; } }
  // Mode D — Flow Exceptions (操作级异常)
  else if (f === 'd-exscn') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.fl); const ex = (fl?.exceptions||[]).find(x => x.id === ds.i); if (ex && ex.scenario !== v) { ex.scenario = v; ch = true; } }
  else if (f === 'd-extrig') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.fl); const ex = (fl?.exceptions||[]).find(x => x.id === ds.i); if (ex && ex.trigger !== v) { ex.trigger = v; ch = true; } }
  else if (f === 'd-exdef') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.fl); const ex = (fl?.exceptions||[]).find(x => x.id === ds.i); if (ex && ex.defense !== v) { ex.defense = v; ch = true; } }
  else if (f === 'd-exrec') { const sp = dFindSpec(ds.sp); const fl = (sp?.flows||[]).find(x => x.id === ds.fl); const ex = (fl?.exceptions||[]).find(x => x.id === ds.i); if (ex && ex.recovery !== v) { ex.recovery = v; ch = true; } }
  // Mode D — Boundaries (系统级边界)
  else if (f === 'd-bscn') { const sp = dFindSpec(ds.sp); const b = (sp?.boundaries||[]).find(x => x.id === ds.i); if (b && b.scenario !== v) { b.scenario = v; ch = true; } }
  else if (f === 'd-btrig') { const sp = dFindSpec(ds.sp); const b = (sp?.boundaries||[]).find(x => x.id === ds.i); if (b && b.trigger !== v) { b.trigger = v; ch = true; } }
  else if (f === 'd-bdef') { const sp = dFindSpec(ds.sp); const b = (sp?.boundaries||[]).find(x => x.id === ds.i); if (b && b.defense !== v) { b.defense = v; ch = true; } }
  else if (f === 'd-brec') { const sp = dFindSpec(ds.sp); const b = (sp?.boundaries||[]).find(x => x.id === ds.i); if (b && b.recovery !== v) { b.recovery = v; ch = true; } }

  if (ch) { save(); toast('已保存'); }
}

function importJSON() {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal">
    <h2>📥 导入 JSON 数据</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:10px;">粘贴 AI 输出的 JSON 数据，支持导入全部或单个模式的数据</p>
    <textarea id="importArea" placeholder='粘贴 JSON 数据...'></textarea>
    <div class="m-actions">
      <button onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="primary" onclick="doImport()">导入</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

function doImport() {
  const ta = document.getElementById('importArea');
  try {
    const d = JSON.parse(ta.value);
    // 只有当导入数据有实质内容时才覆盖，避免空数组/空对象清除已有数据
    const hasContent = {
      A: d.A && (d.A.goals?.main?.length > 0 || d.A.goals?.hidden?.length > 0 || d.A.modules?.length > 0),
      B: d.B && Array.isArray(d.B) && d.B.length > 0,
      C: d.C && Array.isArray(d.C) && d.C.length > 0,
      D: d.D && Array.isArray(d.D) && d.D.length > 0
    };
    if (hasContent.A) store.A = d.A;
    if (hasContent.B) store.B = d.B;
    if (hasContent.C) store.C = d.C;
    if (hasContent.D) store.D = d.D;
    ensureRefs(); // 兼容无 refs 字段的旧数据
    migrateD(); // 兼容旧版 D 模块数据结构
    // 保存导入快照用于后续对比（仅记录实际导入的模式）
    if (hasContent.A) importSnapshot.A = JSON.parse(JSON.stringify(store.A));
    if (hasContent.B) importSnapshot.B = JSON.parse(JSON.stringify(store.B));
    if (hasContent.C) importSnapshot.C = JSON.parse(JSON.stringify(store.C));
    if (hasContent.D) importSnapshot.D = JSON.parse(JSON.stringify(store.D));
    try { localStorage.setItem(SNAPSHOT_STORAGE_KEY, JSON.stringify(importSnapshot)); } catch(e) {}
    save(); renderAll();
    ta.closest('.modal-overlay').remove();
    const imported = ['A','B','C','D'].filter(k => hasContent[k]);
    toast(imported.length > 0 ? `导入成功（${imported.join('、')}）` : '导入的JSON中无有效数据');
  } catch (e) { toast('JSON 格式错误：' + e.message); }
}

function exportMd() {
  let md = '# UX 设计文档\n\n';
  // Mode A
  md += '## A 策划案分析\n\n### 🎯 核心目标拆解\n**主目标**\n';
  store.A.goals?.main?.forEach((g, i) => { md += `${i + 1}. ${g.text}\n`; });
  md += '\n**隐性需求**\n';
  store.A.goals?.hidden?.forEach(g => { md += `* ${g.text}\n`; });
  md += '\n### 🧩 功能模块\n';
  store.A.modules?.forEach(m => {
    const p = m.priority === 'high' ? '高' : m.priority === 'mid' ? '中' : '低';
    md += `\n#### ${m.name} (优先级：${p})\n**包含功能**\n`;
    m.features.forEach((f, i) => { md += `${i + 1}. ${f.text}\n`; });
    if (m.suggestions.length) {
      md += '**✨ UX补充建议**\n';
      m.suggestions.forEach(s => { md += `* \`${s.text}\`：${s.reason}\n`; });
    }
  });
  // Mode B
  md += '\n---\n\n## B 行为路径\n';
  store.B.forEach(path => {
    md += `\n### ${path.title}\n**【起点】** ${path.startPoint}\n\n`;
    path.stages.forEach((s, si) => {
      md += `#### 🌊 阶段 ${si + 1}：${s.title}\n👤 **用户操作**\n`;
      s.actions.forEach((a, i) => { md += `${i + 1}. ${a.text}\n`; });
      md += '   │\n   ▼\n💻 **系统反馈**\n';
      s.feedbacks.forEach(f => { md += `* ${f.text}\n`; });
      s.branches.forEach(b => { md += `\n👉 **${b.label}**\n`; b.items.forEach(it => { md += `* ${it.text}\n`; }); });
      md += '\n';
    });
  });
  // Mode C
  md += '\n---\n\n## C 信息架构\n';
  store.C.forEach(pg => {
    md += `\n### 🏗️ ${pg.pageName}\n\`\`\`\n`;
    function printNode(n, indent) {
      md += `${indent}${n.icon || '├─'} ${n.label}${n.note ? ' (' + n.note + ')' : ''}\n`;
      (n.children || []).forEach(c => printNode(c, indent + '  '));
    }
    pg.nodes.forEach(n => printNode(n, ''));
    md += '```\n';
  });
  // Mode D
  md += '\n---\n\n## D 交互稿\n';
  store.D.forEach(sp => {
    md += `\n### 📱 ${sp.specName}\n`;
    md += '#### 🧩 元素状态与基础逻辑\n';
    (sp.elements||[]).forEach(area => {
      md += `\n**【${area.area}】**\n`;
      (area.items||[]).forEach(it => { md += `* **${it.label}**：${it.desc}\n`; });
    });
    md += '\n#### 🖱️ 核心场景交互流\n';
    (sp.flows||[]).forEach(fl => {
      md += `\n**操作：${fl.action}**\n`;
      if(fl.trigger) md += `* 触发条件：${fl.trigger}\n`;
      if(fl.validation) md += `* 系统校验：${fl.validation}\n`;
      if((fl.steps||[]).length) { md += '* UI 反馈：\n'; fl.steps.forEach((st,i) => { md += `  ${i+1}. ${st.desc}\n`; }); }
      (fl.exceptions||[]).forEach(ex => {
        md += `\n> ⚠️ **异常分支：${ex.scenario}**\n`;
        md += `> * 触发条件：${ex.trigger}\n`;
        md += `> * 防错设计：${ex.defense}\n`;
        md += `> * 流程反馈：${ex.recovery}\n`;
      });
    });
    md += '\n#### 🚧 系统级边界\n';
    (sp.boundaries||[]).forEach(b => {
      md += `\n**场景：${b.scenario}**\n`;
      md += `* 触发条件：${b.trigger}\n`;
      md += `* 防错设计：${b.defense}\n`;
      md += `* 流程反馈：${b.recovery}\n`;
    });
  });
  showExportModal('导出 Markdown', md, 'md');
}

// ====== 复制为 Prompt ======
const NEXT_MODE_MAP = { A: 'B', B: 'D' }; // A→B, B→D, D无下游
function copyAsPrompt() {
  closeExportDropdown();
  const m = activeMode;
  const next = NEXT_MODE_MAP[m];
  if (!next) {
    toast('交互稿为终极交付物，无下游模式');
    return;
  }
  const data = {};
  data[m] = store[m];
  const prompt = `/UX-NEXT ${next}\n\n以下是${MODE_LABELS[m]}的数据：\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
  navigator.clipboard.writeText(prompt).then(() => {
    toast(`已复制 /UX-NEXT ${next} Prompt`);
  }).catch(() => {
    // 降级：弹窗展示供手动复制
    showExportModal(`复制为 Prompt（/UX-NEXT ${next}）`, prompt, 'txt');
  });
}

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal">
    <h2>${title}</h2>
    <pre>${esc(content)}</pre>
    <div class="m-actions">
      <button onclick="this.closest('.modal-overlay').remove()">关闭</button>
      <button class="primary" onclick="navigator.clipboard.writeText(this.closest('.modal').querySelector('pre').textContent).then(()=>toast('已复制'))">复制</button>
      <button class="primary" onclick="dlFile(this,'${ext}')">下载</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

function dlFile(btn, ext) {
  const text = btn.closest('.modal').querySelector('pre').textContent;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `UX设计_${new Date().toISOString().slice(0, 10)}.${ext}`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已下载');
}

// ============================================================
// Keyboard Shortcuts
// ============================================================
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});

// ====== 分享（文件导出/导入） ======

/**
 * 打开分享面板（主入口）
 */
function openShareCodeManager() {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal modal-sm">
    <h2>📤 导出分享文件</h2>
    <p class="modal-hint">下载 .uxshare 文件发送给对方，对方拖入编辑器即可加载</p>
    <div class="share-modal-row">
      <label class="share-modal-label">文件名（可选）：</label>
      <input id="shareFileName" type="text" placeholder="如: 科技2.0-v3" class="share-modal-input" maxlength="50">
    </div>
    <label class="share-checkbox-row">
      <input type="checkbox" id="shareSelectedOnly" style="accent-color:var(--accent);" onchange="onShareModeToggle()"> 仅导出当前模式（${MODE_LABELS[activeMode]}）
    </label>
    <div class="m-actions">
      <button onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="primary" onclick="doExportShareFile()">📥 下载 .uxshare 文件</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

/**
 * 勾选/取消"仅导出当前模式"时，自动更新文件名
 */
function onShareModeToggle() {
  const cb = document.getElementById('shareSelectedOnly');
  const nameInput = document.getElementById('shareFileName');
  if (!cb || !nameInput) return;
  if (cb.checked) {
    // 勾选时，如果文件名为空或是默认值，自动填入模式名称
    const cur = nameInput.value.trim();
    if (!cur) {
      nameInput.value = MODE_LABELS[activeMode];
    }
  }
}

/**
 * 导出 .uxshare 文件
 */
function doExportShareFile() {
  if (isStoreEmpty()) {
    toast('当前无数据，请先导入 JSON');
    return;
  }

  const nameInput = document.getElementById('shareFileName');
  const selectedOnly = document.getElementById('shareSelectedOnly')?.checked;

  // 文件名
  let fileName = (nameInput?.value || '').trim().replace(/[<>:"/\\|?*]/g, '');
  if (!fileName) {
    const now = new Date();
    fileName = `UX-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  }

  // 准备数据
  let dataToShare;
  if (selectedOnly) {
    dataToShare = { A: {}, B: [], C: [], D: [] };
    dataToShare[activeMode] = store[activeMode];
  } else {
    dataToShare = JSON.parse(JSON.stringify(store));
  }

  const modes = selectedOnly ? [activeMode] : ['A','B','C','D'].filter(k => {
    if (k === 'A') return store.A.goals?.main?.length > 0 || store.A.modules?.length > 0;
    return store[k]?.length > 0;
  });

  // 构建分享文件内容
  const shareFile = {
    _format: 'uxshare',
    _version: '1.0',
    _created: new Date().toISOString(),
    _modes: modes,
    data: dataToShare
  };

  const json = JSON.stringify(shareFile);
  const compressed = LZString.compressToBase64(json);

  // 下载文件
  const blob = new Blob([compressed], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName + '.uxshare';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  const originalKB = (JSON.stringify(dataToShare).length / 1024).toFixed(1);
  const compressedKB = (compressed.length / 1024).toFixed(1);
  toast(`已下载 ${fileName}.uxshare（${originalKB}KB → ${compressedKB}KB，含 ${modes.join('、')}）`);
}

/**
 * 处理选择的分享文件
 */
function handleShareFileSelect(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    loadShareFileContent(e.target.result, file.name);
  };
  reader.readAsText(file);
}

/**
 * 解析并加载分享文件内容
 */
function loadShareFileContent(content, fileName) {
  try {
    let data, label;

    // 尝试作为压缩的 .uxshare 解析
    const decompressed = LZString.decompressFromBase64(content.trim());
    if (decompressed) {
      const parsed = JSON.parse(decompressed);
      if (parsed._format === 'uxshare' && parsed.data) {
        data = parsed.data;
        label = fileName || 'uxshare';
      } else if (parsed.A || parsed.B || parsed.C || parsed.D) {
        // 压缩的纯 JSON 数据
        data = parsed;
        label = fileName || 'share';
      }
    }

    // 如果解压失败，尝试作为纯 JSON 解析
    if (!data) {
      const parsed = JSON.parse(content);
      if (parsed._format === 'uxshare' && parsed.data) {
        data = parsed.data;
        label = fileName || 'uxshare';
      } else if (parsed.A || parsed.B || parsed.C || parsed.D) {
        data = parsed;
        label = fileName || 'json';
      }
    }

    if (!data) {
      toast('文件格式无法识别');
      return;
    }

    applyShareData(data, label);
  } catch (e) {
    toast('文件解析失败：' + e.message);
  }
}

/**
 * 应用分享数据到 store
 */
function applyShareData(data, label) {
  if (!data.A && !data.B && !data.C && !data.D) {
    toast('分享数据为空'); return;
  }
  const hasLocal = !isStoreEmpty();
  if (hasLocal) {
    if (!confirm(`加载 ${label} 的数据？\n含有数据的模式将覆盖当前对应模式的内容。`)) return;
  }

  const hasContent = {
    A: data.A && (data.A.goals?.main?.length > 0 || data.A.goals?.hidden?.length > 0 || data.A.modules?.length > 0),
    B: data.B && Array.isArray(data.B) && data.B.length > 0,
    C: data.C && Array.isArray(data.C) && data.C.length > 0,
    D: data.D && Array.isArray(data.D) && data.D.length > 0
  };
  if (hasContent.A) store.A = data.A;
  if (hasContent.B) store.B = data.B;
  if (hasContent.C) store.C = data.C;
  if (hasContent.D) store.D = data.D;
  ensureRefs();
  migrateD();
  if (hasContent.A) importSnapshot.A = JSON.parse(JSON.stringify(store.A));
  if (hasContent.B) importSnapshot.B = JSON.parse(JSON.stringify(store.B));
  if (hasContent.C) importSnapshot.C = JSON.parse(JSON.stringify(store.C));
  if (hasContent.D) importSnapshot.D = JSON.parse(JSON.stringify(store.D));
  try { localStorage.setItem(SNAPSHOT_STORAGE_KEY, JSON.stringify(importSnapshot)); } catch(e) {}
  save(); renderAll();

  document.querySelector('.modal-overlay')?.remove();
  const imported = ['A','B','C','D'].filter(k => hasContent[k]);
  toast(`加载成功（${imported.join('、')}）`);
}

/**
 * 兼容旧版分享链接（URL hash 方式）
 */
function loadFromShareLink() {
  const hash = location.hash;
  if (!hash || !hash.startsWith('#data=')) return false;
  try {
    const compressed = hash.substring(6);
    const json = LZString.decompressFromEncodedURIComponent(compressed);
    if (!json) return false;
    const data = JSON.parse(json);
    if (!data.A && !data.B && !data.C && !data.D) return false;
    const hasLocal = localStorage.getItem(STORAGE_KEY);
    if (hasLocal) {
      if (!confirm('检测到分享数据，是否加载？\n（将覆盖当前本地数据）')) {
        history.replaceState(null, '', location.pathname);
        return false;
      }
    }
    if (data.A) store.A = data.A;
    if (data.B) store.B = data.B;
    if (data.C) store.C = data.C;
    if (data.D) store.D = data.D;
    ensureRefs();
    importSnapshot = JSON.parse(JSON.stringify(store));
    try { localStorage.setItem(SNAPSHOT_STORAGE_KEY, JSON.stringify(importSnapshot)); } catch(e) {}
    history.replaceState(null, '', location.pathname);
    return true;
  } catch (e) {
    console.error('Share link parse failed:', e);
    return false;
  }
}

// ============================================================
// Init
// ============================================================
document.getElementById('undoBtn').onclick = undo;
document.getElementById('redoBtn').onclick = redo;
document.getElementById('importBtn').onclick = importJSON;
document.getElementById('exportJsonBtn').onclick = toggleExportDropdown;
document.addEventListener('click', () => closeExportDropdown());
document.getElementById('shareLinkBtn').onclick = openShareCodeManager;
document.getElementById('clearStorageBtn').onclick = clearStorage;
document.querySelectorAll('.mode-tab').forEach(t => {
  t.onclick = () => switchMode(t.dataset.mode);
});

// 优先检测分享链接
const sharedLoaded = loadFromShareLink();

if (!sharedLoaded) {
  // 尝试从 LocalStorage 加载，如果没有则保持空状态等待导入
  if (!loadFromStorage()) {
    // 首次进入，保持空状态
    store = { A: {}, B: [], C: [], D: [] };
  }
}

// 加载导入快照
try {
  const snapData = localStorage.getItem(SNAPSHOT_STORAGE_KEY);
  if (snapData) importSnapshot = JSON.parse(snapData);
} catch(e) {}

// 加载引用指纹
try {
  const fpData = localStorage.getItem(FINGERPRINT_STORAGE_KEY);
  if (fpData) refFingerprints = JSON.parse(fpData);
} catch(e) {}

// 确保 refs 字段存在 + 构建反向索引
ensureRefs();
// 迁移旧版 D 模块数据到新结构
migrateD();

save();
renderAll();

if (sharedLoaded) {
  toast('已加载分享数据，可自由编辑');
} else if (isStoreEmpty()) {
  toast('欢迎使用，请导入 JSON 数据');
} else {
  toast('数据已加载');
}

// 全局拖拽导入 .uxshare 文件
document.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
document.addEventListener('drop', e => {
  e.preventDefault();
  e.stopPropagation();
  const file = e.dataTransfer?.files?.[0];
  if (file && (file.name.endsWith('.uxshare') || file.name.endsWith('.json'))) {
    handleShareFileSelect(file);
  }
});
</script>
