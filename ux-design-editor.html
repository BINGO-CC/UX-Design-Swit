// ── C: onBlur handler for contenteditable ──
function onCBlur(e) {
  const el = e.target, ds = el.dataset, v = el.textContent.trim();
  if (!ds.f || !ds.f.startsWith('c-')) return;
  const f = ds.f;
  let ch = false;

  // specName — 同时刷新左侧面板（S4.6）
  if (f === 'c-name') { const sp = cFindSpec(ds.i); if (sp && sp.specName !== v) { sp.specName = v; ch = true; renderCSidePanel(); } }
  // Elements (区域)
  else if (f === 'c-area') { const sp = cFindSpec(ds.sp); const area = (sp?.elements || []).find(x => x.id === ds.i); if (area && area.area !== v) { area.area = v; ch = true; } }
  else if (f === 'c-elabel') { const sp = cFindSpec(ds.sp); const area = (sp?.elements || []).find(x => x.id === ds.area); const it = (area?.items || []).find(x => x.id === ds.i); if (it && it.label !== v) { it.label = v; ch = true; } }
  else if (f === 'c-edesc') { const sp = cFindSpec(ds.sp); const area = (sp?.elements || []).find(x => x.id === ds.area); const it = (area?.items || []).find(x => x.id === ds.i); if (it && it.desc !== v) { it.desc = v; ch = true; } }
  // Flows (交互流)
  else if (f === 'c-faction') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.i); if (fl && fl.action !== v) { fl.action = v; ch = true; } }
  else if (f === 'c-ftrig') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.i); if (fl && fl.trigger !== v) { fl.trigger = v; ch = true; } }
  else if (f === 'c-fvalid') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.i); if (fl && fl.validation !== v) { fl.validation = v; ch = true; } }
  else if (f === 'c-fstep') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.fl); const st = (fl?.steps || []).find(x => x.id === ds.i); if (st && st.desc !== v) { st.desc = v; ch = true; } }
  // Flow Exceptions
  else if (f === 'c-exscn') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.fl); const ex = (fl?.exceptions || []).find(x => x.id === ds.i); if (ex && ex.scenario !== v) { ex.scenario = v; ch = true; } }
  else if (f === 'c-extrig') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.fl); const ex = (fl?.exceptions || []).find(x => x.id === ds.i); if (ex && ex.trigger !== v) { ex.trigger = v; ch = true; } }
  else if (f === 'c-exdef') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.fl); const ex = (fl?.exceptions || []).find(x => x.id === ds.i); if (ex && ex.defense !== v) { ex.defense = v; ch = true; } }
  else if (f === 'c-exrec') { const sp = cFindSpec(ds.sp); const fl = (sp?.flows || []).find(x => x.id === ds.fl); const ex = (fl?.exceptions || []).find(x => x.id === ds.i); if (ex && ex.recovery !== v) { ex.recovery = v; ch = true; } }
  // Boundaries (系统级边界)
  else if (f === 'c-bscn') { const sp = cFindSpec(ds.sp); const b = (sp?.boundaries || []).find(x => x.id === ds.i); if (b && b.scenario !== v) { b.scenario = v; ch = true; } }
  else if (f === 'c-btrig') { const sp = cFindSpec(ds.sp); const b = (sp?.boundaries || []).find(x => x.id === ds.i); if (b && b.trigger !== v) { b.trigger = v; ch = true; } }
  else if (f === 'c-bdef') { const sp = cFindSpec(ds.sp); const b = (sp?.boundaries || []).find(x => x.id === ds.i); if (b && b.defense !== v) { b.defense = v; ch = true; } }
  else if (f === 'c-brec') { const sp = cFindSpec(ds.sp); const b = (sp?.boundaries || []).find(x => x.id === ds.i); if (b && b.recovery !== v) { b.recovery = v; ch = true; } }

  if (ch) save();
}

// S2-4: LocalStorage 持久化
const MM_STORAGE_KEY = 'mm-editor-data';

// ── v5.0.0 旧版数据迁移：清除 v4.x 卡片编辑器残留的 LocalStorage ──
(function migrateFromV4() {

// ── 历史栈（撤销 / 重做）──────────────────────────────
// 架构对齐 ux-design-editor.bak.html：
//   save() 是唯一的数据保存入口 → 先推快照 → 再持久化
//   saveToStorage() 是纯持久化函数，不触发历史栈
let _mmHist = [], _mmHIdx = -1;

/** 统一保存入口：先推历史快照 → 再持久化到 localStorage */
function save() {
  const snap = JSON.stringify(getStoreSnapshot());
  // 若当前指针不在栈尾，截断后续历史
  if (_mmHIdx < _mmHist.length - 1) _mmHist = _mmHist.slice(0, _mmHIdx + 1);
  // 若与上一条完全相同则跳过（防重复入栈），但仍需持久化
  if (_mmHist.length > 0 && _mmHist[_mmHist.length - 1] === snap) {
    console.log('[save] 快照与上一条相同，跳过入栈（dedup）');
    saveToStorage();
    return;
  }
  _mmHist.push(snap);
  if (_mmHist.length > 80) _mmHist.shift();
  _mmHIdx = _mmHist.length - 1;
  console.log('[save] 推入快照 idx=', _mmHIdx, 'histLen=', _mmHist.length);
  updHist();
  saveToStorage();
}

function undo() {
  console.log('[Undo] _mmHIdx=', _mmHIdx, 'histLen=', _mmHist.length);
  if (_mmHIdx <= 0) { console.log('[Undo] 已在栈底，无法撤销'); return; }
  _mmHIdx--;
  console.log('[Undo] 回退到 idx=', _mmHIdx);
  _applySnapshot(JSON.parse(_mmHist[_mmHIdx]));
  updHist();
  mmToast('已撤销');
}

function redo() {
  console.log('[Redo] _mmHIdx=', _mmHIdx, 'histLen=', _mmHist.length);
  if (_mmHIdx >= _mmHist.length - 1) { console.log('[Redo] 已在栈顶，无法重做'); return; }
  _mmHIdx++;
  _applySnapshot(JSON.parse(_mmHist[_mmHIdx]));
  updHist();
  mmToast('已重做');
}

let _mmApplying = false;  // 抑制标志：_applySnapshot 期间阻止 render() 推历史栈

function _applySnapshot(snap) {
  _mmApplying = true;
  // 恢复 A
  if (snap.A && Array.isArray(snap.A.stages)) {
    mockData.stages = snap.A.stages;
    if (snap.A.activeStageId) state.activeStageId = snap.A.activeStageId;
  }
  // 恢复 B — mockDataB 是 const，不能重新赋值，需要清空再填充
  if (snap.B) {
    Object.keys(mockDataB).forEach(k => delete mockDataB[k]);
    Object.keys(snap.B).forEach(k => { mockDataB[k] = snap.B[k]; });
  }
  // 恢复 C
  if (Array.isArray(snap.C)) storeC = snap.C;
  // 纯持久化（不推历史栈）+ 重渲染
  saveToStorage();
  render();
  if (state.viewMode === 'C') { renderCSidePanel(); renderCDetail(); }
  _mmApplying = false;
}

function updHist() {
  const u = document.getElementById('mm-undoBtn');
  const r = document.getElementById('mm-redoBtn');
  if (u) u.disabled = _mmHIdx <= 0;
  if (r) r.disabled = _mmHIdx >= _mmHist.length - 1;
}

/** 纯持久化函数 — 不触发历史栈，供 save() 和 _applySnapshot() 调用 */
function saveToStorage() {
  try {
    const payload = {
      A: { activeStageId: state.activeStageId, stages: mockData.stages },
      B: mockDataB,
      C: storeC
    };
    localStorage.setItem(MM_STORAGE_KEY, JSON.stringify(payload));
    // 更新 Header 状态指示
    const dot = document.querySelector('.mm-header-status-dot');
    const txt = document.querySelector('.mm-header-status');
    if (dot) dot.style.background = '#CCFF00';
    if (txt) txt.lastChild.textContent = '已保存';

      state.activeStageId = mockData.activeStageId;
    }
    // 恢复 B 数据
    if (data.B && typeof data.B === 'object') {
      Object.keys(data.B).forEach(k => { mockDataB[k] = data.B[k]; });
    }
    // 恢复 C 数据
    if (Array.isArray(data.C)) {

  } catch (e) {
    console.error('[MM] LocalStorage load failed:', e);
    return false;

}

const MODE_LABELS_MM = { A: '策划案分析', B: '行为路径', C: '交互稿' };
const NEXT_MODE_MAP_MM = { A: 'B', B: 'C' }; // A→B, B→C, C 无下游

function getStoreSnapshot() {
  return {
    A: { activeStageId: state.activeStageId, stages: mockData.stages },
    B: mockDataB,
    C: storeC
  };
}

function isStoreEmptyMM() {
  const hasA = mockData.stages && mockData.stages.length > 0;
  const hasB = Object.keys(mockDataB).length > 0;
  const hasC = storeC && storeC.length > 0;
  return !hasA && !hasB && !hasC;
}

function applyImportedData(data) {
  if (typeof umami !== 'undefined') umami.track('import-data');
  const hasContent = {
    A: data.A && Array.isArray(data.A.stages) && data.A.stages.length > 0,
    B: data.B && typeof data.B === 'object' && Object.keys(data.B).length > 0,
    C: data.C && Array.isArray(data.C) && data.C.length > 0
  };
  if (hasContent.A) {
    // ── 自动补全 module.targetLayer ──────────────────────────────
    // Skill 输出的 JSON 中 targetLayer 写在 feature.layer 上，module 本身无此字段。
    // buildCardMap / buildColCards 依赖 module.targetLayer 决定卡片落列，
    // 缺失时所有卡片均回退到 L1。此处在写入前统一补全。
    function inferModuleLayer(mod) {
      if (mod.targetLayer) return; // 已有则跳过
      // 取第一个 feature 的 layer；若还没有则 L1
      const firstFeatLayer = (mod.features && mod.features[0] && mod.features[0].layer) || 'L1';
      mod.targetLayer = firstFeatLayer;
      // 递归处理 childModule
      for (const feat of (mod.features || [])) {
        if (feat.childModule) inferModuleLayer(feat.childModule);
      }
    }
    for (const stage of (data.A.stages || [])) {
      for (const mod of (stage.modules || [])) inferModuleLayer(mod);
    }
    // ────────────────────────────────────────────────────────────
    mockData.stages = data.A.stages;
    mockData.activeStageId = data.A.activeStageId || (data.A.stages[0] && data.A.stages[0].id) || null;
    state.activeStageId = mockData.activeStageId;
  }
  if (hasContent.B) {
    Object.keys(mockDataB).forEach(k => delete mockDataB[k]);
    Object.keys(data.B).forEach(k => {
      mockDataB[k] = data.B[k];
      // 透传保留 _supplementsReason（豁免原因字段）
      if (data.B[k] && Array.isArray(data.B[k].loops)) {
        data.B[k].loops.forEach(loop => {
          if (loop._supplementsReason != null && loop.supplements == null) {
            loop.supplements = [];
          }
        });
      }
    });
  }
  if (hasContent.C) {
    storeC = data.C;
  }
  migrateC();
  save();
  render();
  return hasContent;
}

// ── 导入预处理工具函数 ──────────────────────────────────

/**
 * 过滤 JSON 字符串中 // 开头的注释行（AI 输出偶发行为）
 */
function stripJsonComments(str) {
  return str.replace(/^\s*\/\/.*$/gm, '');
}

/**
 * 兼容 Mode B 数组格式 → 对象格式
 * AI 有时将 B 输出为 [{stageId, loops:[]}] 而非 { stageId: {loops:[]} }
 */
function normalizeBData(b) {
  if (!b) return b;
  if (Array.isArray(b)) {
    const obj = {};
    b.forEach(item => {
      if (item && item.stageId) obj[item.stageId] = { loops: item.loops || [] };
    });
    return obj;
  }
  return b;
}

/**
 * 将旧版 action.children(kind=feedback) 格式迁移为新版 action.feedbacks[]
 * 同时兼容 validation.elseLoopId → targetLoopId 字段重命名
 */
function migrateSteps(stageMap) {
  if (!stageMap || typeof stageMap !== 'object') return stageMap;
  Object.values(stageMap).forEach(stageData => {
    (stageData.loops || []).forEach(loop => {
      function walkSteps(steps) {
        if (!Array.isArray(steps)) return;
        steps.forEach(step => {
          if (step.kind === 'action') {
            // children → feedbacks 迁移
            if (!Array.isArray(step.feedbacks) || step.feedbacks.length === 0) {
              const fbFromChildren = (step.children || []).filter(c => c.kind === 'feedback');
              if (fbFromChildren.length > 0) {
                step.feedbacks = fbFromChildren;
                step.children = (step.children || []).filter(c => c.kind !== 'feedback');
              }
            }
          }
          if (step.kind === 'validation') {
            // elseLoopId → targetLoopId 迁移
            if (step.elseLoopId != null && step.targetLoopId == null) {
              step.targetLoopId = step.elseLoopId;
              delete step.elseLoopId;
            }
          }
          // 递归处理 children
          if (Array.isArray(step.children)) walkSteps(step.children);
        });
      }
      walkSteps(loop.steps || []);
    });
  });
  return stageMap;
}

function doImport() {
  const ta = document.getElementById('mmImportArea');
  try {
    // Step1: 过滤 // 注释
    const cleaned = stripJsonComments(ta.value);
    const d = JSON.parse(cleaned);
    // Step2: 兼容 B 数组格式
    if (d.B) d.B = normalizeBData(d.B);
    // Step3: 迁移旧 B 步骤字段
    if (d.B) d.B = migrateSteps(d.B);
    const hasContent = applyImportedData(d);
    ta.closest('.mm-modal-overlay').remove();
    const imported = ['A','B','C'].filter(k => hasContent[k]);
    mmToast(imported.length > 0 ? `导入成功（${imported.join('、')}）` : '导入的JSON中无有效数据');
  } catch (e) { mmToast('JSON 格式错误：' + e.message); }
}

// ── 导出 Markdown ──
function exportMd() {
  closeExportDropdown();
  let md = '# UX 设计文档\n\n';
  const snap = getStoreSnapshot();
  // Mode A
  md += '## A 策划案分析\n\n### 🧩 功能模块\n';
  (snap.A.stages||[]).forEach(st => {
    md += `\n#### 【${st.label}】\n`;
    (st.modules||[]).forEach(m => {
      md += `\n##### ${m.name}\n**包含功能**\n`;
      (m.features||[]).forEach((f, i) => {
        md += `${i + 1}. ${f.text}\n`;
      });
    });
  });
  // Mode B
  md += '\n---\n\n## B 行为路径\n';
  Object.keys(snap.B).forEach(stId => {
    const loopData = snap.B[stId];
    if (!loopData || !loopData.loops) return;
    md += `\n### Stage: ${stId}\n`;
    loopData.loops.forEach(lp => {
      md += `\n#### 🔄 ${lp.title || '(未命名)'}\n`;
      (lp.steps||[]).forEach((step, i) => {
        md += `\n**Step ${i+1}**\n`;
        if (step.validation) md += `* 校验：${step.validation}\n`;
        if (step.action) md += `* 操作：${step.action}\n`;
        if (step.feedback) md += `* 反馈：${step.feedback}\n`;
        if (step.elseNote) md += `* 分支：${step.elseNote}\n`;
      });
    });
  });
  // Mode C
  md += '\n---\n\n## C 交互稿\n';
  (snap.C||[]).forEach(sp => {
    md += `\n### 📱 ${sp.specName}\n`;
    md += '#### 🧩 元素状态与基础逻辑\n';
    (sp.elements||[]).forEach(area => {
      md += `\n**【${area.area}】**\n`;
      (area.items||[]).forEach(it => { md += `* **${it.label}**：${it.desc}\n`; });
    });
    md += '\n#### 🖱️ 核心场景交互流\n';
    (sp.flows||[]).forEach(fl => {
      md += `\n**操作：${fl.action}**\n`;
      if(fl.trigger) md += `* 触发条件：${fl.trigger}\n`;
      if(fl.validation) md += `* 系统校验：${fl.validation}\n`;
      if((fl.steps||[]).length) { md += '* UI 反馈：\n'; fl.steps.forEach((st,i) => { md += `  ${i+1}. ${st.desc}\n`; }); }
      (fl.exceptions||[]).forEach(ex => {
        md += `\n> ⚠️ **异常分支：${ex.scenario}**\n`;
        md += `> * 触发条件：${ex.trigger}\n> * 防错设计：${ex.defense}\n> * 流程反馈：${ex.recovery}\n`;
      });
    });
    md += '\n#### 🚧 系统级边界\n';
    (sp.boundaries||[]).forEach(b => {
      md += `\n**场景：${b.scenario}**\n* 触发条件：${b.trigger}\n* 防错设计：${b.defense}\n* 流程反馈：${b.recovery}\n`;
    });
  });
  showExportModal('导出 Markdown', md, 'md');
}

function doExportShareFile() {
  if (isStoreEmptyMM()) { mmToast('当前无数据'); return; }
  if (typeof umami !== 'undefined') umami.track('export-share');
  const nameInput = document.getElementById('shareFileName');
  const selectedOnly = document.getElementById('shareSelectedOnly')?.checked;
  let fileName = (nameInput?.value || '').trim().replace(/[<>:"/\\|?*]/g, '');
  if (!fileName) {
    const now = new Date();
    fileName = `UX-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  }
  const snap = getStoreSnapshot();
  let dataToShare;
  if (selectedOnly) {
    dataToShare = { A: {}, B: {}, C: [] };
    dataToShare[state.viewMode] = snap[state.viewMode];
  } else {
    dataToShare = JSON.parse(JSON.stringify(snap));
  }
  const modes = selectedOnly ? [state.viewMode] : ['A','B','C'].filter(k => {
    if (k === 'A') return snap.A.stages?.length > 0;
    if (k === 'B') return Object.keys(snap.B).length > 0;
    return snap.C?.length > 0;
  });
  const shareFile = { _format: 'uxshare', _version: '1.0', _created: new Date().toISOString(), _modes: modes, data: dataToShare };
  const json = JSON.stringify(shareFile);
  const compressed = typeof LZString !== 'undefined' ? LZString.compressToBase64(json) : json;
  const blob = new Blob([compressed], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName + '.uxshare';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const originalKB = (json.length / 1024).toFixed(1);
  const compressedKB = (compressed.length / 1024).toFixed(1);
  mmToast(`已下载 ${fileName}.uxshare（${originalKB}KB → ${compressedKB}KB，含 ${modes.join('、')}）`);
  document.querySelector('.mm-modal-overlay')?.remove();
}

// ── 处理 .uxshare / .json 文件导入 ──
function handleShareFileSelect(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => { loadShareFileContent(e.target.result, file.name); };
  reader.readAsText(file);
}

function loadShareFileContent(content, fileName) {
  try {
    let data, label;
    // 尝试作为压缩的 .uxshare 解析
    if (typeof LZString !== 'undefined') {
      const decompressed = LZString.decompressFromBase64(content.trim());
      if (decompressed) {
        const parsed = JSON.parse(decompressed);
        if (parsed._format === 'uxshare' && parsed.data) { data = parsed.data; label = fileName || 'uxshare'; }
        else if (parsed.A || parsed.B || parsed.C) { data = parsed; label = fileName || 'share'; }
      }
    }
    // 如果解压失败，尝试作为纯 JSON 解析
    if (!data) {
      const parsed = JSON.parse(content);
      if (parsed._format === 'uxshare' && parsed.data) { data = parsed.data; label = fileName || 'uxshare'; }
      else if (parsed.A || parsed.B || parsed.C) { data = parsed; label = fileName || 'json'; }
    }
    if (!data) { mmToast('文件格式无法识别'); return; }
    // 确认覆盖
    if (!isStoreEmptyMM()) {
      if (!confirm(`加载 ${label} 的数据？\n含有数据的模式将覆盖当前对应模式的内容。`)) return;
    }
    const hasContent = applyImportedData(data);
    document.querySelector('.mm-modal-overlay')?.remove();
    const imported = ['A','B','C'].filter(k => hasContent[k]);
    mmToast(`加载成功（${imported.join('、')}）`);
  } catch (e) { mmToast('文件解析失败：' + e.message); }
}

const CARD_GAP    = 16;
const CANVAS_PAD  = 16;
const LINE_RADIUS = 6;

// ============================================================
// Helpers

function getActiveStage() {

}

// ── Mode B：工具函数 ──
function getLoopById(loopId) {

// ============================================================
// Phase 4 — 行为连线渲染引擎
// ============================================================

// ── Step A helper 1：路径计算（跨层折角，完全复用 renderLines 算法）──
// from / to 格式：{ x, y }（画布坐标系，相对 canvasInner）
// divX：折点 X（两列之间的分界，跨层连线专用；平层连线传 null）
function calcLinePath(from, to, divX) {
  const r = LINE_RADIUS;
  if (divX === null) {
    // 平层连线：直接从 from.x 水平连到 to.x（Y 轴与底板分割线重合，已由调用者保证）
    return `M ${from.x} ${from.y} L ${to.x} ${to.y}`;
  }
  if (Math.abs(from.y - to.y) < 2) {
    return `M ${from.x} ${from.y} L ${to.x} ${to.y}`;
  }
  const goDown = to.y > from.y;
  if (goDown) {
    return [
      `M ${from.x} ${from.y}`,
      `L ${divX - r} ${from.y}`,
      `Q ${divX} ${from.y} ${divX} ${from.y + r}`,
      `L ${divX} ${to.y - r}`,
      `Q ${divX} ${to.y} ${divX + r} ${to.y}`,
      `L ${to.x} ${to.y}`,
    ].join(' ');
  } else {
    return [
      `M ${from.x} ${from.y}`,
      `L ${divX - r} ${from.y}`,
      `Q ${divX} ${from.y} ${divX} ${from.y - r}`,
      `L ${divX} ${to.y + r}`,
      `Q ${divX} ${to.y} ${divX + r} ${to.y}`,
      `L ${to.x} ${to.y}`,
    ].join(' ');
  }
}

// ── Step A helper 2：创建单段连线 SVG 元素（hit + path + dot + arrow）──
// opts: { showDot, showArrow, sameLayer, lineId, diamondX }
function createBLineElements(svg, d, fromPt, toPt, opts) {
  const { showDot = true, showArrow = true, sameLayer = false, lineId, diamondX } = opts;
  const isSelected = state.selectedBLineIds.has(lineId);

  const baseClass = sameLayer ? 'line-same-layer' : '';

  // 每条连线用 <g> 包裹，hover/选中时 svg.appendChild(group) 移至末尾 = 渲染最上层
  const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  group.dataset.lineGroupId = lineId;

  // 透明宽击打区
  const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  hitPath.setAttribute('d', d);
  hitPath.setAttribute('class', 'line-hit');
  hitPath.dataset.lineId = lineId;
  hitPath.addEventListener('mouseenter', () => {
    svg.classList.add('elevated');
    // ⚠️ 不调用 svg.appendChild(group)：移动 DOM 节点会触发伪 mouseleave，导致 hovered 永久残留
    group.querySelectorAll('.line-path').forEach(p => {
      p.classList.add('hovered');
      if (!p.classList.contains('selected')) p.setAttribute('marker-end', showArrow ? 'url(#b-arrowhead-hover)' : '');
    });
    group.querySelectorAll('.line-dot').forEach(p => p.classList.add('hovered'));
    group.querySelectorAll('.line-diamond').forEach(p => p.classList.add('hovered'));
  });
  hitPath.addEventListener('mouseleave', () => {
    if (!state.selectedBLineIds.size) svg.classList.remove('elevated');
    group.querySelectorAll('.line-path').forEach(p => {
      p.classList.remove('hovered');
      if (!p.classList.contains('selected')) p.setAttribute('marker-end', showArrow ? 'url(#b-arrowhead)' : '');
    });
    group.querySelectorAll('.line-dot').forEach(p => p.classList.remove('hovered'));
    group.querySelectorAll('.line-diamond').forEach(p => p.classList.remove('hovered'));
  });
  hitPath.addEventListener('click', (e) => {
    e.stopPropagation();
    if (e.shiftKey) {
      if (state.selectedBLineIds.has(lineId)) {
        state.selectedBLineIds.delete(lineId);
      } else {
        state.selectedBLineIds.add(lineId);
      }
    } else {
      if (state.selectedBLineIds.size === 1 && state.selectedBLineIds.has(lineId)) {
        state.selectedBLineIds.clear();
      } else {
        state.selectedBLineIds = new Set([lineId]);
      }
    }
    renderBLines(state.selectedLoopId);
  });

  // 视觉路径
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', d);
  path.setAttribute('class', ('line-path ' + baseClass + (isSelected ? ' selected' : '')).trim());
  if (showArrow) {
    path.setAttribute('marker-end', isSelected ? 'url(#b-arrowhead-white)' : 'url(#b-arrowhead)');
  }
  path.dataset.lineId = lineId;

  // 起点圆点
  if (showDot) {
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', fromPt.x);
    dot.setAttribute('cy', fromPt.y);
    dot.setAttribute('r', '3');
    dot.setAttribute('class', ('line-dot ' + baseClass + (isSelected ? ' selected' : '')).trim());
    dot.dataset.lineId = lineId;
    group.appendChild(dot);
  }

  // 菱形把手
  const midX = (diamondX !== undefined) ? diamondX : (fromPt.x + toPt.x) / 2;
  const midY = (fromPt.y + toPt.y) / 2;
  const ds = 5;
  const diamond = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  diamond.setAttribute('points', `${midX},${midY-ds} ${midX+ds},${midY} ${midX},${midY+ds} ${midX-ds},${midY}`);
  diamond.setAttribute('class', ('line-diamond ' + baseClass + (isSelected ? ' selected' : '')).trim());
  diamond.dataset.lineId = lineId;

  // 装入 group，选中线置顶追加，非选中线插到最前
  group.appendChild(hitPath);
  group.appendChild(path);
  group.appendChild(diamond);
  if (isSelected) {
    svg.appendChild(group);
  } else {
    svg.insertBefore(group, svg.firstChild);
  }
}

// ── Step B helper 1：获取 feature 在画布中的连接坐标（完全复用 _layoutResult，零 DOM bounding rect）──
// 返回：{ rx, lx, cy, divideY }
//   rx       — 卡片右边缘（跨层连线起点 X 基准）
//   lx       — 卡片左边缘（平层连线 X 基准）
//   cy       — feature 中心 Y（跨层连线 Y）
//   divideY  — feature-wrap 底边 Y（平层连线 Y，底板分割线）
function getFeatureConnectPoints(featId) {
  const featEl = document.querySelector(`.mm-feature[data-feature-id="${featId}"]`);
  if (!featEl) return null;
  const wrapEl  = featEl.closest('.mm-feature-wrap');
  const card    = featEl.closest('.mm-card');
  if (!card) return null;
  const moduleId = card.dataset.moduleId;
  const layout   = _layoutResult[moduleId];
  if (!layout) return null;

  // 与 Mode A renderLines collectLines 完全相同的计算方式
  const FEATURE_H = 32;
  const GAP       = 4;
  const headerEl  = card.querySelector('.mm-card-header');
  const headerH   = headerEl ? headerEl.offsetHeight : 36;
  const wraps     = Array.from(card.querySelectorAll('.mm-feature-wrap'));
  const featIndex = wrapEl ? wraps.indexOf(wrapEl) : 0;

  // feature 中心 Y（在卡片内部的偏移）
  const featCenterInCard = headerH + 4 + featIndex * (FEATURE_H + GAP) + FEATURE_H / 2;
  // feature-wrap 底边 Y（在卡片内部的偏移）— 底板分割线
  const featBottomInCard = headerH + 4 + (featIndex + 1) * (FEATURE_H + GAP) - GAP;

  return {
    rx:       layout.cardRight,
    lx:       layout.cardLeft,
    colLeft:  layout.colLeft,
    cy:       layout.colCardsTop + layout.idealY + featCenterInCard,
    divideY:  layout.colCardsTop + layout.idealY + featBottomInCard,
  };
}

// ── Step B helper 2：深度优先扁平化 steps，取出所有有效 action 步骤 ──
function flattenActionSteps(steps) {
  const result = [];
  function walk(arr) {
    for (const step of (arr || [])) {
      if (step.kind === 'action' && step.refFeature) result.push(step);
      walk(step.children);
    }
  }
  walk(steps);
  return result;
}

// ── Step B helper 3：action 序列 → 连线边数组 ──
// 按 validation 组分段产边：同组内相邻 action 产生一条边，组间不产生跨组边
// 这样删除连线时拆分 validation 组即可保证独立性
function buildBLineEdges(loop) {
  // 深度优先扁平化所有节点（action + feedback），按执行顺序相邻产边
  // action 与其 feedbacks 顺序连接：action → feedback1 → feedback2
  // 跨 validation 的 action 之间也正常产边
  function flattenNodes(steps) {
    const result = [];
    for (const step of (steps || [])) {
      if (step.kind === 'action' && step.refFeature) {
        result.push(step);
        // 顺序收集该 action 的 feedbacks（有 refFeature 的）
        for (const fb of (step.feedbacks || [])) {
          if (fb.refFeature) result.push(fb);
        }
      } else if (step.children) {
        result.push(...flattenNodes(step.children));
      }
    }
    return result;
  }
  const allNodes = flattenNodes(loop.steps);
  const edges = [];
  for (let i = 0; i < allNodes.length - 1; i++) {
    // _breakBefore 标记：删除连线时设置，表示与前一个节点之间不产边
    if (allNodes[i + 1]._breakBefore) continue;
    edges.push({
      fromFeatId:    allNodes[i].refFeature,
      toFeatId:      allNodes[i + 1].refFeature,
      triggersLayer: allNodes[i].triggersLayer || null,
    });
  }
  return edges;
}

// ── clearBLines：清空 SVG（保留 defs）+ 清除压暗/幽灵节点 ──
function clearBLines() {
  const svg = document.getElementById('mm-b-lines');
  if (svg) {
    Array.from(svg.children)
      .filter(c => c.tagName.toLowerCase() !== 'defs')
      .forEach(c => c.remove());
  }
  document.querySelectorAll('.mm-card.b-dimmed').forEach(c => c.classList.remove('b-dimmed'));
  document.querySelectorAll('.mm-feature-wrap.b-feat-dimmed').forEach(f => f.classList.remove('b-feat-dimmed'));
  document.querySelectorAll('.mm-ghost-node').forEach(el => el.remove());
  const hint = document.getElementById('mm-b-empty-hint');
  if (hint) hint.remove();
}

// ── 初始化 mm-b-lines defs（箭头 marker）──
function initBLinesDefs() {
  const svg = document.getElementById('mm-b-lines');
  if (!svg) return;
  // 避免重复创建
  if (svg.querySelector('defs')) return;
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  function makeMarker(id, color) {
    const m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    m.setAttribute('id', id);
    m.setAttribute('markerWidth', '7');
    m.setAttribute('markerHeight', '7');
    m.setAttribute('refX', '6');
    m.setAttribute('refY', '3.5');
    m.setAttribute('orient', 'auto');
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    p.setAttribute('points', '0 0, 7 3.5, 0 7');
    p.setAttribute('fill', color);
    m.appendChild(p);
    return m;
  }
  defs.appendChild(makeMarker('b-arrowhead',       '#CCFF00'));
  defs.appendChild(makeMarker('b-arrowhead-hover', '#CCFF00'));
  defs.appendChild(makeMarker('b-arrowhead-white', '#FFFFFF'));
  svg.appendChild(defs);
}

// ── renderBLinesOverview：D1 — 无 Loop 选中，画布完全空白 ──
function renderBLinesOverview() {
  clearBLines();
  document.body.classList.remove('mode-b-loop-active');
  // D1：全部卡片恢复 100% 亮度，不绘制任何连线
}

// ── renderBLines：选中具体 Loop 的聚焦态 ──
function renderBLines(loopId) {
  clearBLines();
  document.body.classList.toggle('mode-b-loop-active', !!(loopId && state.viewMode === 'B'));
  initBLinesDefs();

  const loop = getLoopById(loopId);
  if (!loop) return;

  const edges = buildBLineEdges(loop);

  // 空 Loop（无连线数据）：全部卡片 100% 亮度，显示底部操作提示
  if (edges.length === 0) {
    showBEmptyLoopHint();
    return;
  }

  const svg = document.getElementById('mm-b-lines');
  const covered = new Set(loop.coveredFeatures || []);
  // 自动把 supplements[] 里的幽灵节点 ID 加入 covered
  // 避免它们在画布上被 b-feat-dimmed 压暗（无需 Skill 在 coveredFeatures 里重复声明）
  (loop.supplements || []).forEach(sup => { if (sup.id) covered.add(sup.id); });

  // ── 1. 压暗无关卡片（连线进行中跳过，保持全亮）──
  if (!_bConnectPending) {
    document.querySelectorAll('.mm-card[data-module-id]').forEach(card => {
      const featureWraps = card.querySelectorAll('[data-feature-wrap-id]');
      if (featureWraps.length === 0) {
        card.classList.add('b-dimmed');
        return;
      }
      const hasAnyCovered = Array.from(featureWraps).some(w => covered.has(w.dataset.featureWrapId));
      if (!hasAnyCovered) {
        card.classList.add('b-dimmed');
      } else {
        featureWraps.forEach(w => {
          if (!covered.has(w.dataset.featureWrapId)) w.classList.add('b-feat-dimmed');
        });
      }
    });
  }

  // ── 2. 绘制行为连线 ──
  // 先绘跨层连线，再绘平层连线（平层最后渲染 = z-index 最高）
  const crossLayerEdges = [];
  const sameLayerEdges  = [];

  for (const edge of edges) {
    const fromPts = getFeatureConnectPoints(edge.fromFeatId);
    const toPts   = getFeatureConnectPoints(edge.toFeatId);
    if (!fromPts || !toPts) continue;

    // 判断是否平层：两个 feature 所属列（.mm-layer-col[data-layer]）相同
    const fromColEl = document.querySelector(`.mm-feature[data-feature-id="${edge.fromFeatId}"]`)?.closest('.mm-layer-col');
    const toColEl   = document.querySelector(`.mm-feature[data-feature-id="${edge.toFeatId}"]`)?.closest('.mm-layer-col');
    const fromLayer = fromColEl?.dataset.layer || '';
    const toLayer   = toColEl?.dataset.layer   || '';
    const isSameLayer = !!(fromLayer && toLayer && fromLayer === toLayer);

    if (isSameLayer) {
      sameLayerEdges.push({ edge, fromPts, toPts });
    } else {
      crossLayerEdges.push({ edge, fromPts, toPts });
    }
  }

  // 识别过渡节点：同时是跨层边终点 且 是平层边起点
  const crossLayerToIds   = new Set(crossLayerEdges.map(e => e.edge.toFeatId));
  const sameLayerFromIds  = new Set(sameLayerEdges.map(e => e.edge.fromFeatId));
  const transitionIds     = new Set([...crossLayerToIds].filter(id => sameLayerFromIds.has(id)));
  // 识别平层连续中间节点：同时是某条平层边终点 且 是另一条平层边起点（复用 sameLayerFromIds）
  const sameLayerToIds       = new Set(sameLayerEdges.map(e => e.edge.toFeatId));
  const sameIntermediateIds  = new Set([...sameLayerToIds].filter(id => sameLayerFromIds.has(id)));
  // 全局起点（从未作为任何边的终点）和全局终点（从未作为任何边的起点）
  // 即使在闭环中也强制保留其 dot / arrow，避免符号全部消失
  const globalSrcIds = new Set([...sameLayerFromIds].filter(id => !sameLayerToIds.has(id)));
  const globalDstIds = new Set([...sameLayerToIds].filter(id => !sameLayerFromIds.has(id)));
  // 若平层连线构成完整闭环（无纯起点/终点），取序列首尾强制保留
  if (globalSrcIds.size === 0 && sameLayerEdges.length > 0) {
    globalSrcIds.add(sameLayerEdges[0].edge.fromFeatId);
  }
  if (globalDstIds.size === 0 && sameLayerEdges.length > 0) {
    globalDstIds.add(sameLayerEdges[sameLayerEdges.length - 1].edge.toFeatId);
  }

  // 绘跨层连线
  for (const { edge, fromPts, toPts } of crossLayerEdges) {
    const lineId   = `bl-${edge.fromFeatId}-${edge.toFeatId}`;

    // 起点：卡片右边缘 + 4px；终点：下一卡片左边缘
    const fromCard = document.querySelector(`.mm-feature[data-feature-id="${edge.fromFeatId}"]`)?.closest('.mm-card');
    const toCard   = document.querySelector(`.mm-feature[data-feature-id="${edge.toFeatId}"]`)?.closest('.mm-card');
    const fromModuleId = fromCard?.dataset.moduleId;
    const toModuleId   = toCard?.dataset.moduleId;
    const fromLayout   = fromModuleId ? _layoutResult[fromModuleId] : null;
    const toLayout     = toModuleId   ? _layoutResult[toModuleId]   : null;
    if (!fromLayout || !toLayout) continue;

    const xs = fromLayout.cardRight + 4;  // 起点：卡片右边缘 + 4px 间隙
    const xe = toLayout.cardLeft;         // 终点：卡片左边缘（箭头 marker refX 已含偏移）
    const ys = fromPts.cy;
    // 若终点是过渡节点，终点 Y 上移 2px（让出间隙），省略箭头
    const isToTransition = transitionIds.has(edge.toFeatId);
    const ye = isToTransition ? toPts.cy - 2 : toPts.cy;
    const divX = fromLayout.colRight;

    const d = calcLinePath({ x: xs, y: ys }, { x: xe, y: ye }, divX);
    createBLineElements(svg, d, { x: xs, y: ys }, { x: xe, y: ye }, {
      showDot:   true,
      showArrow: !isToTransition,
      sameLayer: false,
      lineId,
      diamondX:  divX,   // 折点 X = 源列右边界，与 Mode A 保持一致
    });
  }

  // 绘平层连线（最后绘，覆盖在跨层连线之上）
  for (const { edge, fromPts, toPts } of sameLayerEdges) {
    const lineId = `bl-${edge.fromFeatId}-${edge.toFeatId}`;

    // 平层连线：bracket 形三段折线
    // 路径：(lx-4, fromCy) → 水平左到 sameX → 垂直到 toCy → 水平右到 (lx-4, toCy)
    // sameX 基于 cardLeft 向左偏移 40px，确保始终在卡片外侧，不受列宽影响
    const r      = LINE_RADIUS;
    const startX = fromPts.lx - 4;       // 起点 X：卡片左侧 -4px
    const endX   = toPts.lx   - 4;       // 终点 X：卡片左侧 -4px
    const sameX  = Math.min(fromPts.colLeft + 30, Math.min(startX, endX) - 20); // 折返点：确保在起终点左侧
    // 若起点是过渡节点，起点 Y 下移 2px（让出与跨层入线的间隙），省略圆点
    const isFromTransition = transitionIds.has(edge.fromFeatId);
    const fromCy = isFromTransition ? fromPts.cy + 2 : fromPts.cy;
    const toCy   = toPts.cy;
    const goDown = toCy > fromCy;

    const d = (goDown ? [
      `M ${startX} ${fromCy}`,
      `L ${sameX + r} ${fromCy}`,
      `Q ${sameX} ${fromCy} ${sameX} ${fromCy + r}`,
      `L ${sameX} ${toCy - r}`,
      `Q ${sameX} ${toCy} ${sameX + r} ${toCy}`,
      `L ${endX} ${toCy}`,
    ] : [
      `M ${startX} ${fromCy}`,
      `L ${sameX + r} ${fromCy}`,
      `Q ${sameX} ${fromCy} ${sameX} ${fromCy - r}`,
      `L ${sameX} ${toCy + r}`,
      `Q ${sameX} ${toCy} ${sameX + r} ${toCy}`,
      `L ${endX} ${toCy}`,
    ]).join(' ');

    // 平层中间节点：入边终点不显示箭头，出边起点不显示圆点
    // 全局起点 / 终点（含闭环修正）强制保留 dot / arrow
    const isToIntermediate   = sameIntermediateIds.has(edge.toFeatId)   && !globalDstIds.has(edge.toFeatId);
    const isFromIntermediate = sameIntermediateIds.has(edge.fromFeatId) && !globalSrcIds.has(edge.fromFeatId);
    createBLineElements(svg, d, { x: startX, y: fromCy }, { x: endX, y: toCy }, {
      showDot:   !(isFromTransition || isFromIntermediate),
      showArrow: !isToIntermediate,
      sameLayer: true,
      lineId,
      diamondX:  sameX,  // 折返点 X = bracket 竖段所在 X，与 Mode A divX 对应
    });
  }

  // ── Phase 5：幽灵补全节点 ──
  renderSupplementGhosts(loop);
  // ── Phase 6：Steps 详情 ICON ──
  renderBStepIcon(loop);
}

// ── Phase 5：renderSupplementGhosts — 幽灵补全节点写入 ──
// 将 loop.supplements[] 里的路径缺口节点写入对应 Module 的 features[]（持久化，不随 Loop 切换清除）
function renderSupplementGhosts(loop) {
  if (!loop || !loop.supplements || !loop.supplements.length) return;
  const stage = getActiveStage();
  if (!stage) return;

  // 找到 featId 所在的 Module（深度搜索，返回直接包含该 feature 的 module 对象）
  function findModuleByFeatureId(modules, featId) {
    for (const mod of modules) {
      for (const feat of (mod.features || [])) {
        if (feat.id === featId) return mod;
        if (feat.childModule) {
          const found = findModuleByFeatureId([feat.childModule], featId);
          if (found) return found;
        }
      }
    }
    return null;
  }

  let changed = false;
  loop.supplements.forEach(sup => {
    if (!sup.refNearFeature || !sup.text) return;
    // 找到 refNearFeature 所在 module
    const mod = findModuleByFeatureId(stage.modules || [], sup.refNearFeature);
    if (!mod) return;
    // 去重：已存在 id === sup.id 的 feature 则跳过（ID 即来源标记）
    const alreadyExists = (mod.features || []).some(f => f.id === sup.id);
    if (alreadyExists) return;
    // 创建新 feature（与标准 feature 结构一致，追加到 module.features 末尾）
    // 使用 sup.id 作为 feature ID，确保与 steps[].refFeature 中的引用一致
    const newFeat = {
      id:                sup.id,
      text:              sup.text,
      layer:             (() => {
        // 继承 refNearFeature 的 layer，找不到则默认 L1
        const ref = findFeatureById(stage, sup.refNearFeature);
        return ref ? ref.layer : 'L1';
      })(),
      priority:          'Mid',
      role:              'display',
      isUXSupplement:    true,
      supplementReason:  sup.reason || '',
      supplementSourceId: sup.id,   // 来源标记，用于去重
      l3Reason:          '',
      childModule:       null,
    };
    if (!mod.features) mod.features = [];
    mod.features.push(newFeat);
    changed = true;
  });

  // 有新节点写入才重新渲染画布（render 会自动触发 renderBLines）
  if (changed) render();
}

// ── Phase 6：renderBStepIcon — 在 SVG 内渲染 📋 ICON ──
function renderBStepIcon(loop) {
  if (!loop) return;
  const svg = document.getElementById('mm-b-lines');
  if (!svg) return;
  // 清除旧 ICON（安全起见）
  svg.querySelectorAll('.mm-b-step-icon').forEach(el => el.remove());

  const edges = buildBLineEdges(loop);
  if (!edges || edges.length === 0) return;
  const firstFeatId = edges[0].fromFeatId;

  // 找功能节点所在的 .mm-card
  const featEl = document.querySelector(`.mm-feature[data-feature-id="${firstFeatId}"]`);
  if (!featEl) return;
  const card = featEl.closest('.mm-card');
  if (!card) return;
  const cardTitle = card.querySelector('.mm-card-title');

  const svgRect = svg.getBoundingClientRect();
  const cardRect = card.getBoundingClientRect();

  // X：卡片左边缘转 SVG 坐标，再向左偏移 8 + 16（ICON半径）
  const cx = (cardRect.left - svgRect.left) - 8 - 16;

  // Y：标题垂直中心（若找不到标题则用卡片顶部偏移 20）
  let cy;
  if (cardTitle) {
    const titleRect = cardTitle.getBoundingClientRect();
    cy = titleRect.top + titleRect.height / 2 - svgRect.top;
  } else {
    cy = cardRect.top - svgRect.top + 20;
  }

  const NS = 'http://www.w3.org/2000/svg';
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('class', 'mm-b-step-icon');
  g.setAttribute('data-loop-id', loop.id);
  g.style.cursor = 'pointer';
  g.style.pointerEvents = 'all';  // 穿透 SVG 层级的 pointer-events:none

  const circle = document.createElementNS(NS, 'circle');
  circle.setAttribute('cx', cx);
  circle.setAttribute('cy', cy);
  circle.setAttribute('r', '16');
  circle.setAttribute('fill', '#1e1e1e');
  circle.setAttribute('stroke', '#4a9e6b');
  circle.setAttribute('stroke-width', '1.5');

  const text = document.createElementNS(NS, 'text');
  text.setAttribute('x', cx);
  text.setAttribute('y', cy + 5);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('font-size', '14');
  text.setAttribute('fill', '#4a9e6b');
  text.textContent = '📋';

  g.appendChild(circle);
  g.appendChild(text);
  g.addEventListener('click', (e) => { e.stopPropagation(); openStepsPanel(loop.id); });
  svg.appendChild(g);
}

// ── Phase 6：openStepsPanel ──
function openStepsPanel(loopId) {
  const loop = getLoopById(loopId);
  if (!loop) return;
  state.stepsPanel = { open: true, loopId };

  // 遮罩
  let overlay = document.getElementById('mm-steps-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'mm-steps-overlay';
    overlay.addEventListener('click', closeStepsPanel);
    document.body.appendChild(overlay);
  }

  // 面板
  let panel = document.getElementById('mm-steps-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'mm-steps-panel';
    document.body.appendChild(panel);
  }

  // Header
  panel.innerHTML = '';
  const header = document.createElement('div');
  header.className = 'mm-sp-header';
  const title = document.createElement('span');
  title.textContent = loop.title || loop.id;
  const closeBtn = document.createElement('button');
  closeBtn.className = 'mm-sp-close';
  closeBtn.textContent = '×';
  closeBtn.addEventListener('click', closeStepsPanel);
  header.appendChild(title);
  header.appendChild(closeBtn);
  panel.appendChild(header);

  // Body
  const body = document.createElement('div');
  body.className = 'mm-sp-body';
  panel.appendChild(body);

  // 渲染内容
  renderStepsPanel(loop, body);

  // 触发滑入动画
  requestAnimationFrame(() => { panel.classList.add('open'); });
}

// ── Phase 6：closeStepsPanel ──
function closeStepsPanel() {
  state.stepsPanel = { open: false, loopId: null };
  closeElsePopup();
  const overlay = document.getElementById('mm-steps-overlay');
  if (overlay) overlay.remove();
  const panel = document.getElementById('mm-steps-panel');
  if (panel) panel.remove();
}

// ── Phase 7：elseNote 跨 Loop 分支跳转面板 ──

function closeElsePopup() {
  _insideElsePopup = false;
  const overlay = document.getElementById('mm-else-popup-overlay');
  if (overlay) overlay.remove();
  const popup = document.getElementById('mm-else-popup');
  if (popup) popup.remove();
}

function openElsePopup(targetLoopId, anchorEl) {
  // 若已存在则先关闭
  closeElsePopup();

  const targetLoop = getLoopById(targetLoopId);
  if (!targetLoop) return;

  _insideElsePopup = true;

  // 遮罩层（透明，点击关闭）
  const overlay = document.createElement('div');
  overlay.id = 'mm-else-popup-overlay';
  overlay.addEventListener('click', closeElsePopup);
  document.body.appendChild(overlay);

  // 弹出面板
  const popup = document.createElement('div');
  popup.id = 'mm-else-popup';
  popup.addEventListener('click', (e) => e.stopPropagation()); // 阻止冒泡到 overlay
  document.body.appendChild(popup);

  // 标题
  const titleColor = targetLoop.type === 'happy_path' ? '#7FC97F' : '#FF6B6B';
  const header = document.createElement('div');
  header.className = 'mm-ep-header';
  header.style.color = titleColor;
  const typeDot = document.createElement('span');
  typeDot.style.cssText = `display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:${titleColor}`;
  header.appendChild(typeDot);
  header.appendChild(document.createTextNode(targetLoop.title));
  popup.appendChild(header);

  // 内容区（复用 renderStepsPanel 逻辑）
  const body = document.createElement('div');
  body.className = 'mm-ep-body mm-sp-body';
  popup.appendChild(body);
  renderStepsPanel(targetLoop, body);

  // 定位：顶部与 anchorEl 顶对齐，向左侧弹出
  requestAnimationFrame(() => {
    const anchorRect = anchorEl.getBoundingClientRect();
    const popupW = 480;
    const popupH = popup.offsetHeight;
    const vpW = window.innerWidth;
    const vpH = window.innerHeight;

    // 尝试在锚点左侧弹出，如果空间不够则右侧
    let left = anchorRect.left - popupW - 8;
    if (left < 8) left = anchorRect.right + 8;
    // 顶部对齐
    let top = anchorRect.top;
    // 防止超出底部
    if (top + popupH > vpH - 8) top = Math.max(8, vpH - popupH - 8);

    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  });
}

// ESC 键关闭弹出面板
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && _insideElsePopup) {
    closeElsePopup();
  }
}, true);

// ── Phase 6：renderStepsPanel — 渲染面板内容 ──
function renderStepsPanel(loop, body) {
  if (!loop || !loop.steps || loop.steps.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'mm-sp-empty';
    empty.textContent = '此 Loop 暂无 Steps';
    body.appendChild(empty);
    return;
  }

  // 计算 action 序号（按 flattenActionSteps 顺序）
  const allActions = flattenActionSteps(loop.steps);
  const actionNumMap = new Map();
  allActions.forEach((step, i) => { actionNumMap.set(step.id, i + 1); });

  // 折叠状态集合（action id → boolean expanded）
  const expandedActions = new Set();

  function makeEditable(el, getVal, setVal) {
    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'mm-sp-text editing';
      input.value = getVal();
      el.replaceWith(input);
      input.focus();
      input.select();
      const commitEdit = () => {
        setVal(input.value);
        const span = document.createElement('span');
        span.className = el.className;
        span.textContent = input.value;
        makeEditable(span, getVal, setVal);
        input.replaceWith(span);
        save();
      };
      input.addEventListener('blur', commitEdit);
      input.addEventListener('keydown', (ke) => { if (ke.key === 'Enter') { ke.preventDefault(); input.blur(); } });
    });
  }

  const fbColors = {
    layer_transition: '#5b8dd9',
    state_change:     '#4a9e6b',
    data_write:       '#c8a84b',
    visual_only:      '#666666',
    block:            '#c05050',
  };

  function renderFeedbackRow(fb) {
    const row = document.createElement('div');
    row.className = 'mm-sp-row mm-sp-feedback';
    row.dataset.feedbackId = fb.id;
    row.style.display = 'none'; // 默认折叠

    // feedbackType 色点
    const dot = document.createElement('span');
    dot.className = 'mm-sp-fb-dot';
    dot.style.backgroundColor = fbColors[fb.feedbackType] || '#666666';
    row.appendChild(dot);

    const textSpan = document.createElement('span');
    textSpan.className = 'mm-sp-text';
    textSpan.textContent = fb.text || '（无描述）';
    makeEditable(textSpan, () => fb.text || '', (v) => { fb.text = v; textSpan.textContent = v; });
    row.appendChild(textSpan);

    // feedback 展开详情行
    const detail = document.createElement('div');
    detail.className = 'mm-sp-fb-detail';
    detail.style.display = 'none';
    if (fb.expression != null) {
      const exprDiv = document.createElement('div');
      exprDiv.className = 'mm-sp-fb-expr';
      const exprIcon = document.createElement('span');
      exprIcon.textContent = '👁 ';
      exprIcon.style.flexShrink = '0';
      const exprText = document.createElement('span');
      exprText.textContent = fb.expression || '（无表现层描述）';
      makeEditable(exprText, () => fb.expression || '', (v) => { fb.expression = v; exprText.textContent = v; });
      exprDiv.appendChild(exprIcon);
      exprDiv.appendChild(exprText);
      detail.appendChild(exprDiv);
    }
    if (fb.outcome != null) {
      const outcDiv = document.createElement('div');
      outcDiv.className = 'mm-sp-fb-outc';
      const outcIcon = document.createElement('span');
      outcIcon.textContent = '⚙ ';
      outcIcon.style.flexShrink = '0';
      const outcText = document.createElement('span');
      outcText.textContent = fb.outcome || '（无结果层描述）';
      makeEditable(outcText, () => fb.outcome || '', (v) => { fb.outcome = v; outcText.textContent = v; });
      outcDiv.appendChild(outcIcon);
      outcDiv.appendChild(outcText);
      detail.appendChild(outcDiv);
    }

    return { row, detail };
  }

  function renderActionRow(action) {
    const row = document.createElement('div');
    row.className = 'mm-sp-row mm-sp-action';
    row.dataset.actionId = action.id;

    const numSpan = document.createElement('span');
    numSpan.className = 'mm-sp-num';
    numSpan.textContent = (actionNumMap.get(action.id) || '') + ' →';
    row.appendChild(numSpan);

    const textSpan = document.createElement('span');
    textSpan.className = 'mm-sp-text';
    textSpan.textContent = action.text || '（无描述）';
    makeEditable(textSpan, () => action.text || '', (v) => { action.text = v; textSpan.textContent = v; });
    row.appendChild(textSpan);

    if (action.triggersLayer) {
      const tagLayer = document.createElement('span');
      tagLayer.className = 'mm-sp-tag-layer';
      tagLayer.textContent = `⚡${action.triggersLayer}`;
      row.appendChild(tagLayer);
    }

    // feedback 子项（兼容旧版 children[] 和新版 feedbacks[] 两种结构）
    const feedbacks = Array.isArray(action.feedbacks) && action.feedbacks.length > 0
      ? action.feedbacks
      : (action.children || []).filter(c => c.kind === 'feedback');
    const feedbackPairs = feedbacks.map(renderFeedbackRow);

    if (feedbacks.length > 0) {
      row.style.cursor = 'pointer';
      row.addEventListener('click', () => {
        const isExpanded = expandedActions.has(action.id);
        if (isExpanded) {
          expandedActions.delete(action.id);
          feedbackPairs.forEach(({ row: fr, detail }) => {
            fr.style.display = 'none'; fr.classList.remove('expanded');
            detail.style.display = 'none';
          });
        } else {
          expandedActions.add(action.id);
          feedbackPairs.forEach(({ row: fr, detail }) => {
            fr.style.display = 'flex'; fr.classList.add('expanded');
            if (detail.children.length > 0) detail.style.display = 'flex';
          });
        }
      });
    }

    return { row, feedbackPairs };
  }

  function renderValidationRow(step) {
    const row = document.createElement('div');
    row.className = 'mm-sp-row mm-sp-validation';
    row.style.flexDirection = 'column';
    row.style.alignItems = 'flex-start';

    const textSpan = document.createElement('span');
    textSpan.className = 'mm-sp-text';
    textSpan.textContent = step.condition || 'IF:';
    makeEditable(textSpan, () => step.condition || '', (v) => { step.condition = v; textSpan.textContent = v; });
    row.appendChild(textSpan);

    if (step.elseNote) {
      const elseDiv = document.createElement('div');
      elseDiv.className = 'mm-sp-else-note';

      if (step.targetLoopId) {
        // 有跳转目标 → 渲染带颜色下划线的可点击版本
        const targetLoop = getLoopById(step.targetLoopId);
        const linkClass = targetLoop
          ? (targetLoop.type === 'edge_case' ? 'edge' : 'happy')
          : 'edge';

        // 前缀文本（↳ 不满足：）
        elseDiv.appendChild(document.createTextNode('↳ 不满足：'));

        // 可点击的链接部分 = 整段 elseNote 文本
        const linkSpan = document.createElement('span');
        linkSpan.className = 'mm-sp-else-note-link ' + linkClass;
        linkSpan.textContent = step.elseNote;
        linkSpan.title = targetLoop ? ('查看：' + targetLoop.title) : '';
        linkSpan.addEventListener('click', (e) => {
          if (!_insideElsePopup) {
            e.stopPropagation();
            openElsePopup(step.targetLoopId, linkSpan);
          }
        });
        elseDiv.appendChild(linkSpan);
      } else {
        // 无跳转目标 → 纯文本，双击可编辑
        elseDiv.textContent = '↳ 不满足：' + step.elseNote;
        elseDiv.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'mm-sp-text editing';
          input.style.width = '100%';
          input.value = step.elseNote || '';
          elseDiv.replaceWith(input);
          input.focus();
          input.select();
          const save = () => {
            step.elseNote = input.value;
            elseDiv.textContent = '↳ 不满足：' + input.value;
            input.replaceWith(elseDiv);
          };
          input.addEventListener('blur', save);
          input.addEventListener('keydown', (ke) => { if (ke.key === 'Enter') { ke.preventDefault(); input.blur(); } });
        });
      }

      row.appendChild(elseDiv);
    }

    return row;
  }

  function walkSteps(steps) {
    for (const step of (steps || [])) {
      if (step.kind === 'validation') {
        body.appendChild(renderValidationRow(step));
        // render actions inside this validation
        for (const child of (step.children || [])) {
          if (child.kind === 'action') {
            const { row, feedbackPairs } = renderActionRow(child);
            body.appendChild(row);
            feedbackPairs.forEach(({ row: fr, detail }) => {
              body.appendChild(fr);
              body.appendChild(detail);
            });
          }
        }
      } else if (step.kind === 'action') {
        const { row, feedbackPairs } = renderActionRow(step);
        body.appendChild(row);
        feedbackPairs.forEach(({ row: fr, detail }) => {
          body.appendChild(fr);
          body.appendChild(detail);
        });
      }
    }
  }

  walkSteps(loop.steps);
}

// ── enterBConnectMode：Mode B 手动连线入口 ──
// 将 featId 追加到当前 Loop 的 coveredFeatures[] + steps[] 末尾 action 占位
// ── enterBConnectMode：两步式跨层连线（仿 SameLayer 两步流程）──
// 第一次点击 > 按钮：记录源节点，进入等待态并显示提示
// 第二次点击任意功能节点：写入源+目标两个 action，形成一条边
let _bCrossLayerConnectSource = null; // { featId, loopId }

function enterBConnectMode(featId, loopId) {
  if (!loopId) return;

  _bCrossLayerConnectSource = { featId, loopId };
  document.body.classList.add('mode-b-crosslayer-connecting');

  // 底部提示条
  const existing = document.getElementById('mm-b-crosslayer-hint');
  if (existing) existing.remove();
  const hint = document.createElement('div');
  hint.id = 'mm-b-crosslayer-hint';
  hint.style.cssText = [
    'position:fixed', 'bottom:24px', 'left:50%', 'transform:translateX(-50%)',
    'background:#1e1e1e', 'border:1px solid #2e2e2e', 'border-radius:8px',
    'padding:8px 14px', 'font-size:12px', 'color:#888', 'pointer-events:none',
    'z-index:9999', 'white-space:nowrap',
  ].join(';');
  hint.innerHTML = `点击目标功能点完成跨层连线 &nbsp;·&nbsp; <span style="color:#555">Esc 取消</span>`;
  document.body.appendChild(hint);

  // 高亮源节点
  const srcEl = document.querySelector(`.mm-feature[data-feature-id="${featId}"]`);
  if (srcEl) srcEl.classList.add('b-connect-source');

  document.addEventListener('click', _onBCrossLayerConnectClick, true);
  document.addEventListener('keydown', _onBCrossLayerConnectKeydown);
}

function _onBCrossLayerConnectClick(e) {
  const featEl = e.target.closest('.mm-feature');
  if (!featEl) {
    // 点击空白区域取消
    _cancelBCrossLayerConnect();
    return;
  }

  const targetFeatId = featEl.dataset.featureId;
  const { featId: sourceFeatId, loopId } = _bCrossLayerConnectSource;

  // 点击自己取消
  if (targetFeatId === sourceFeatId) {
    _cancelBCrossLayerConnect();
    return;
  }

  e.stopPropagation();

  // 写入 loop.steps[]：源节点 + 目标节点各一个 action（相邻配对即可被 buildBLineEdges 生成边）
  const loop = getLoopById(loopId);
  if (loop) {
    if (!loop.coveredFeatures) loop.coveredFeatures = [];
    [sourceFeatId, targetFeatId].forEach(id => {
      if (!loop.coveredFeatures.includes(id)) loop.coveredFeatures.push(id);
    });
    if (!loop.steps) loop.steps = [];
    let lastValidation = null;
    for (let i = loop.steps.length - 1; i >= 0; i--) {
      if (loop.steps[i].kind === 'validation') { lastValidation = loop.steps[i]; break; }
    }
    if (!lastValidation) {
      lastValidation = { id: `n_auto_${Date.now()}`, kind: 'validation', condition: 'IF: 手动添加', children: [] };
      loop.steps.push(lastValidation);
    }
    if (!lastValidation.children) lastValidation.children = [];

    // 判断是否允许就地追加：仅当源节点是当前组的最后一个 action 时才链式延伸
    // 否则新建独立 validation 组，避免向已有节点的组末尾追加造成幽灵边
    const lastAction = [...lastValidation.children].reverse().find(c => c.kind === 'action');
    const canAppend = lastAction && lastAction.refFeature === sourceFeatId;

    if (canAppend) {
      // 链式延伸：源节点已是末尾，直接追加目标节点
      lastValidation.children.push({
        id: `n_auto_${Date.now()}_tgt_${targetFeatId}`,
        kind: 'action', text: '', refFeature: targetFeatId,
        triggersLayer: null, isAnchor: false, isSupplement: false, children: [],
      });
    } else {
      // 新建独立 validation 组承载这条边的 [src, tgt]
      const newGroup = {
        id: `n_auto_${Date.now()}`,
        kind: 'validation', condition: 'IF: 手动添加',
        children: [
          { id: `n_auto_${Date.now()}_src_${sourceFeatId}`, kind: 'action', text: '', refFeature: sourceFeatId, triggersLayer: null, isAnchor: false, isSupplement: false, children: [] },
          { id: `n_auto_${Date.now()}_tgt_${targetFeatId}`, kind: 'action', text: '', refFeature: targetFeatId, triggersLayer: null, isAnchor: false, isSupplement: false, children: [] },
        ],
      };
      loop.steps.push(newGroup);
    }
  }

  _cancelBCrossLayerConnect();
  render();
}

function _onBCrossLayerConnectKeydown(e) {
  if (e.key === 'Escape') {
    e.preventDefault();
    _cancelBCrossLayerConnect();
  }
}

function _cancelBCrossLayerConnect() {
  if (_bCrossLayerConnectSource) {
    const { featId } = _bCrossLayerConnectSource;
    const srcEl = document.querySelector(`.mm-feature[data-feature-id="${featId}"]`);
    if (srcEl) srcEl.classList.remove('b-connect-source');
  }
  _bCrossLayerConnectSource = null;
  document.body.classList.remove('mode-b-crosslayer-connecting');
  const hint = document.getElementById('mm-b-crosslayer-hint');
  if (hint) hint.remove();
  document.removeEventListener('click', _onBCrossLayerConnectClick, true);
  document.removeEventListener('keydown', _onBCrossLayerConnectKeydown);
}

// 连线进行中标记（保留兼容旧逻辑，现已不由 enterBConnectMode 设置）
let _bConnectPending = false;
// Phase 7：elseNote 弹出面板状态标记
let _insideElsePopup = false;

// ── enterBSameLayerConnectMode：发起平层（同层级）连线 ──
let _bSameLayerConnectSource = null; // { featId, loopId, layer }

function enterBSameLayerConnectMode(featId, loopId) {
  if (!loopId) return;
  const featEl = document.querySelector(`.mm-feature[data-feature-id="${featId}"]`);
  const colEl  = featEl ? featEl.closest('.mm-layer-col') : null;
  const layer  = colEl ? colEl.dataset.layer : null;
  if (!layer) return;

  _bSameLayerConnectSource = { featId, loopId, layer };
  document.body.classList.add('mode-b-samelayer-connecting');

  // 高亮源节点（与 enterBConnectMode 保持一致）
  if (featEl) featEl.classList.add('b-connect-source');

  // 底部提示条
  const existing = document.getElementById('mm-b-samelayer-hint');
  if (existing) existing.remove();
  const hint = document.createElement('div');
  hint.id = 'mm-b-samelayer-hint';
  hint.style.cssText = [
    'position:fixed', 'bottom:24px', 'left:50%', 'transform:translateX(-50%)',
    'background:#1e1e1e', 'border:1px solid #2e2e2e', 'border-radius:8px',
    'padding:8px 14px', 'font-size:12px', 'color:#888', 'pointer-events:none',
    'z-index:9999', 'white-space:nowrap',
  ].join(';');
  hint.innerHTML = `点击同层级功能点完成平层连线 &nbsp;·&nbsp; <span style="color:#555">Esc 取消</span>`;
  document.body.appendChild(hint);

  document.addEventListener('click', _onSameLayerConnectClick, true);
  document.addEventListener('keydown', _onSameLayerConnectKeydown);
}

function _onSameLayerConnectClick(e) {
  const featEl = e.target.closest('.mm-feature');
  if (!featEl) {
    _cancelBSameLayerConnect();
    return;
  }

  const targetFeatId = featEl.dataset.featureId;
  const { featId: sourceFeatId, loopId, layer: sourceLayer } = _bSameLayerConnectSource;

  if (targetFeatId === sourceFeatId) {
    _cancelBSameLayerConnect();
    return;
  }

  const colEl = featEl.closest('.mm-layer-col');
  const targetLayer = colEl ? colEl.dataset.layer : null;
  if (targetLayer !== sourceLayer) {
    _cancelBSameLayerConnect();
    return;
  }

  e.stopPropagation();

  const loop = getLoopById(loopId);
  if (loop) {
    if (!loop.coveredFeatures) loop.coveredFeatures = [];
    [sourceFeatId, targetFeatId].forEach(id => {
      if (!loop.coveredFeatures.includes(id)) loop.coveredFeatures.push(id);
    });
    if (!loop.steps) loop.steps = [];
    let lastValidation = null;
    for (let i = loop.steps.length - 1; i >= 0; i--) {
      if (loop.steps[i].kind === 'validation') { lastValidation = loop.steps[i]; break; }
    }
    if (!lastValidation) {
      lastValidation = { id: `n_auto_${Date.now()}`, kind: 'validation', condition: 'IF: 手动添加', children: [] };
      loop.steps.push(lastValidation);
    }
    if (!lastValidation.children) lastValidation.children = [];

    // 判断是否允许就地追加：仅当源节点是当前组的最后一个 action 时才链式延伸
    // 否则新建独立 validation 组，避免向已有节点的组末尾追加造成幽灵边
    const lastAction = [...lastValidation.children].reverse().find(c => c.kind === 'action');
    const canAppend = lastAction && lastAction.refFeature === sourceFeatId;

    if (canAppend) {
      // 链式延伸：源节点已是末尾，直接追加目标节点
      lastValidation.children.push({
        id: `n_auto_${Date.now()}_${targetFeatId}`,
        kind: 'action', text: '', refFeature: targetFeatId,
        triggersLayer: null, isAnchor: false, isSupplement: false, children: [],
      });
    } else {
      // 新建独立 validation 组承载这条边的 [src, tgt]
      const newGroup = {
        id: `n_auto_${Date.now()}`,
        kind: 'validation', condition: 'IF: 手动添加',
        children: [
          { id: `n_auto_${Date.now()}_${sourceFeatId}`, kind: 'action', text: '', refFeature: sourceFeatId, triggersLayer: null, isAnchor: false, isSupplement: false, children: [] },
          { id: `n_auto_${Date.now()}_${targetFeatId}`, kind: 'action', text: '', refFeature: targetFeatId, triggersLayer: null, isAnchor: false, isSupplement: false, children: [] },
        ],
      };
      loop.steps.push(newGroup);
    }
  }

  _cancelBSameLayerConnect();
  render();
}

function _onSameLayerConnectKeydown(e) {
  if (e.key === 'Escape') {
    e.preventDefault();
    _cancelBSameLayerConnect();
  }
}

function _cancelBSameLayerConnect() {
  // 清除源节点高亮（与 _cancelBCrossLayerConnect 保持一致）
  if (_bSameLayerConnectSource) {
    const { featId } = _bSameLayerConnectSource;
    const srcEl = document.querySelector(`.mm-feature[data-feature-id="${featId}"]`);
    if (srcEl) srcEl.classList.remove('b-connect-source');
  }
  _bSameLayerConnectSource = null;
  document.body.classList.remove('mode-b-samelayer-connecting');
  const hint = document.getElementById('mm-b-samelayer-hint');
  if (hint) hint.remove();
  document.removeEventListener('click', _onSameLayerConnectClick, true);
  document.removeEventListener('keydown', _onSameLayerConnectKeydown);
}

function buildCardMap(stage) {
  if (!stage) return {};
  const map = {};
  function traverse(module, layer) {
    map[module.id] = { module, layer, colIndex: LAYERS.indexOf(layer) };
    for (const feat of (module.features || [])) {
      if (feat.childModule) traverse(feat.childModule, feat.childModule.targetLayer);
    }
  }
  for (const mod of (stage.modules || [])) traverse(mod, mod.targetLayer || "L1");
  return map;
}

function buildColCards(stage) {
  const cols = {};
  for (const l of LAYERS) cols[l] = [];
  function traverse(module, layer) {
    cols[layer].push(module.id);
    for (const feat of (module.features || [])) {
      if (feat.childModule) traverse(feat.childModule, feat.childModule.targetLayer);
    }
  }
  for (const mod of (stage ? stage.modules || [] : [])) traverse(mod, mod.targetLayer || "L1");
  return cols;
}

// Render — Stage List (B2-1 ~ B2-6)
// ============================================================
function renderStageTabs() {
  // Mode B/C 可能修改过 stageAddBtn 样式/className，进入 A 时重置
  const mainBtnReset = document.getElementById('stageAddBtn');
  if (mainBtnReset) {
    mainBtnReset.style.opacity = ''; mainBtnReset.style.pointerEvents = ''; mainBtnReset.style.display = '';
    mainBtnReset.className = 'mm-stage-add';
    mainBtnReset.onclick = null;
    mainBtnReset.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <path d="M6.5 1.5L8.5 3.5L3 9H1V7L6.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg> 阶段管理`;
  }
  // 清理 Mode C 可能残留的新增按钮
  const stageAddNewBtn = document.getElementById('stageAddNewBtn');
  if (stageAddNewBtn) stageAddNewBtn.remove();

  const el = document.getElementById('stageList');
  el.innerHTML = '';

  // 空数据时隐藏阶段管理按钮
  if (mockData.stages.length === 0 && mainBtnReset) {
    mainBtnReset.style.display = 'none';
  }

  for (const stage of mockData.stages) {
    const item = document.createElement('div');
    item.className = 'mm-stage-item' + (stage.id === state.activeStageId ? ' active' : '');
    item.dataset.stageId = stage.id;

    const dot = document.createElement('div');
    dot.className = 'mm-stage-dot';
    item.appendChild(dot);

    // ── 重命名态：内联 input ──
    if (state.renamingStageId === stage.id) {
      const input = document.createElement('input');
      input.className = 'mm-stage-rename-input';
      input.value = stage.label;
      let committed = false;
      const commit = () => {
        if (committed) return; committed = true;
        stage.label = input.value.trim() || stage.label; state.renamingStageId = null; render();
      };
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') commit();
        if (e.key === 'Escape') { committed = true; state.renamingStageId = null; render(); }
      });
      input.addEventListener('blur', commit);
      item.appendChild(input);
      // 点击 item 不切换 stage
      item.addEventListener('click', (e) => e.stopPropagation());
      el.appendChild(item);
      requestAnimationFrame(() => { input.focus(); input.select(); });
      continue;
    }

    const labelSpan = document.createElement('span');
    labelSpan.className = 'mm-stage-label';
    labelSpan.textContent = stage.label;
    item.appendChild(labelSpan);

    // ── 编辑模式：显示删除按钮，双击重命名 ──
    if (state.stageEditMode) {
      // 双击进入重命名
      labelSpan.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        state.renamingStageId = stage.id;
        render();
      });
      // 删除按钮
      if (mockData.stages.length > 1) {
        const delBtn = document.createElement('button');
        delBtn.className = 'mm-stage-del-btn';
        attachTip(delBtn, '删除阶段');
        delBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 2L8 8M8 2L2 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>`;
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteStage(stage.id);
        });
        item.appendChild(delBtn);
      }
      item.addEventListener('click', () => { state.activeStageId = stage.id; render(); });
    } else {
      // 普通模式：点击切换
      item.addEventListener('click', () => { state.activeStageId = stage.id; render(); });
    }

    el.appendChild(item);
  }

  // ── 底部按钮区（空数据时隐藏）──
  if (mockData.stages.length > 0) {
    renderStageFooter();
  }
}

// B2-2/B2-6: 编辑模式入口 & 退出
function renderStageFooter() {
  const mainBtn = document.getElementById('stageAddBtn');
  mainBtn.style.display = '';  // 确保可见（从空状态恢复时）
  if (state.stageEditMode) {
    // 编辑模式：主按钮变为「完成编辑」（与「阶段管理」同位置）
    mainBtn.className = 'mm-stage-done';
    mainBtn.textContent = '完成编辑';
    mainBtn.onclick = () => { state.stageEditMode = false; state.renamingStageId = null; render(); };
    // 在其后插入「新增阶段」按钮
    let addNewBtn = document.getElementById('stageAddNewBtn');
    if (!addNewBtn) {
      addNewBtn = document.createElement('div');
      addNewBtn.id = 'stageAddNewBtn';
      addNewBtn.className = 'mm-stage-add';
      addNewBtn.innerHTML = `
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M5.5 1V10M1 5.5H10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        新增阶段`;
      addNewBtn.addEventListener('click', () => addStage());
      mainBtn.parentNode.insertBefore(addNewBtn, mainBtn.nextSibling);
    }
  } else {
    // 普通模式：显示「阶段管理」
    mainBtn.className = 'mm-stage-add';
    mainBtn.innerHTML = `
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M6.5 1.5L8.5 3.5L3 9H1V7L6.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      阶段管理`;
    mainBtn.onclick = () => { state.stageEditMode = true; render(); };
    // 移除「新增阶段」按钮
    const addNewBtn = document.getElementById('stageAddNewBtn');
    if (addNewBtn) addNewBtn.remove();
  }
}

// B2-3: 新增阶段
function addStage() {
  const newId = 's' + String(Date.now()).slice(-6);
  const idx = mockData.stages.length;
  const letter = String.fromCharCode(65 + idx); // A, B, C...
  const newStage = { id: newId, label: `${letter}.新阶段`, modules: [] };
  mockData.stages.push(newStage);
  state.activeStageId = newId;
  state.renamingStageId = newId; // 自动进入重命名
  render();
}

// B2-4: 删除阶段
function deleteStage(stageId) {
  const idx = mockData.stages.findIndex(s => s.id === stageId);
  if (idx === -1 || mockData.stages.length <= 1) return;
  mockData.stages.splice(idx, 1);
  if (state.activeStageId === stageId) {
    state.activeStageId = mockData.stages[Math.min(idx, mockData.stages.length - 1)].id;
  }
  render();
}

function initTabEvents() {
  document.querySelectorAll('.mm-header-tab[data-mode]').forEach(btn => {

// ============================================================
// Render — Canvas
// ============================================================
function render() {
  renderHeaderTabs();

  // ── 空数据检测：空状态遮罩层显隐 ──
  const hasDataAB = mockData.stages.length > 0;
  const hasDataC  = storeC && storeC.length > 0;
  const isEmptyCurrentMode = (state.viewMode === 'C') ? !hasDataC : !hasDataAB;
  const emptyOverlay = document.getElementById('mmEmptyOverlay');
  if (emptyOverlay) emptyOverlay.style.display = isEmptyCurrentMode ? '' : 'none';

  // S4.6: Mode C 通过 .mode-c class 控制画布/详情面板显隐
  //        画布不用 display:none，改用 CSS visibility:hidden + height:0 保留宽度占位
  const mmCDetail = document.getElementById('mm-c-detail');
  const mmWrapper = document.querySelector('.mm-canvas-wrapper');
  if (mmCDetail) mmCDetail.style.display = state.viewMode === 'C' ? '' : 'none';
  if (mmWrapper) mmWrapper.classList.toggle('mode-c', state.viewMode === 'C');

  // Mode C：渲染左侧 Spec Tab + 右侧详情，不渲染画布/连线
  if (state.viewMode === 'C') {
    renderCSidePanel();
    renderCDetail();
    if (_mmApplying) saveToStorage(); else save();
    if (typeof _notifyDataChange === 'function') _notifyDataChange();
    return;
  }

  // 连线层互斥切换：
  // #mm-lines  → 结构连线（childModule），仅 Mode A 显示
  // #mm-b-lines → 行为路径叠加层（Loop steps），仅 Mode B 显示
  // Mode B 下画布不带任何结构连线，连线内容完全由 renderBLines / renderBLinesOverview 驱动（Phase 4 实装）
  const mmLines  = document.getElementById('mm-lines');
  const mmBLines = document.getElementById('mm-b-lines');
  if (mmLines)  mmLines.style.display  = state.viewMode === 'A' ? '' : 'none';
  if (mmBLines) mmBLines.style.display = state.viewMode === 'B' ? '' : 'none';

  // ⚠️ 架构约束：viewMode 的分流仅限于「左侧面板」和「连线层」两处
  // renderCanvas() / renderCard() / renderFeatureWrap() 内部禁止出现 viewMode 判断
  // → 任何对画布卡片编辑功能的新增，A/B 两模式自动同步，无需额外处理
  if (state.viewMode === 'A') {
    renderStageTabs();   // Mode A 专属左侧面板
  } else if (state.viewMode === 'B') {
    renderBSidePanel();  // Mode B 专属左侧面板
  }
  renderCanvas();        // 画布渲染：A/B 共用同一份，行为完全一致
                         // renderBLines 在 renderCanvas 末帧回调内按 viewMode 分支触发

  // S2-4: 每次渲染后自动保存到 LocalStorage（撤销恢复期间仅持久化不推栈）
  if (_mmApplying) saveToStorage(); else save();

  // 通知外部数据变更（集成接口，原型内部无副作用）
  if (typeof _notifyDataChange === 'function') _notifyDataChange();
}

// ============================================================
// Render — Mode B 左侧面板（完整实现含 Loop CRUD）
//   布局：面板头 + Stage 行（手风琴）+ Loop 子列表 + Loop 管理底部

function renderBSidePanel() {
  const el = document.getElementById('stageList');
  el.innerHTML = '';

  const mainBtn = document.getElementById('stageAddBtn');
  if (mainBtn) { mainBtn.style.display = 'none'; }

  if (addNewBtn) addNewBtn.remove();

  // ── 空数据时不渲染 Loop 管理按钮 ──
  if (mockData.stages.length > 0) {
    renderBLoopManagementBtn(el);
  }

  for (const stage of mockData.stages) {
    const isActiveStage = stage.id === state.activeStageId;
    const isExpanded    = state.expandedStageIds.has(stage.id);
    const loops         = (mockDataB[stage.id] || {}).loops || [];

    // ── Stage 行 ──
    const stageRow = document.createElement('div');
    stageRow.className = 'mm-b-stage-row'
      + (isActiveStage ? ' active'   : '')
      + (isExpanded    ? ' expanded' : '');
    stageRow.dataset.stageId = stage.id;

    const chevron = document.createElement('div');
    chevron.className = 'mm-b-stage-chevron';
    chevron.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8" fill="none">
      <path d="M2.5 1.5L5.5 4L2.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
    stageRow.appendChild(chevron);

    const nameSpan = document.createElement('span');
    nameSpan.className = 'mm-b-stage-name';
    nameSpan.textContent = stage.label;
    stageRow.appendChild(nameSpan);

    // Stage 行点击：手风琴 + 退出 Loop 编辑模式
    stageRow.addEventListener('click', () => {
      const wasExpanded = state.expandedStageIds.has(stage.id);
      state.expandedStageIds.clear();
      if (!wasExpanded) state.expandedStageIds.add(stage.id);
      state.activeStageId = stage.id;
      closeStepsPanel();
      state.selectedLoopId = null;
      state.loopEditMode = false;
      state.renamingLoopId = null;
      render();
    });

    el.appendChild(stageRow);

    // ── Loop 子列表容器 ──
    const loopsContainer = document.createElement('div');
    loopsContainer.className = 'mm-b-loops-container' + (isExpanded ? ' expanded' : '');

    for (const loop of loops) {
      const isSelected = loop.id === state.selectedLoopId;

      // ── 重命名态：内联 input ──
      if (state.renamingLoopId === loop.id) {
        const loopRow = document.createElement('div');
        loopRow.className = 'mm-b-loop-row' + (isSelected ? ' selected' : '');
        loopRow.dataset.loopId = loop.id;

        const typeDot = document.createElement('div');
        typeDot.className = 'mm-b-loop-type ' + (loop.type === 'happy_path' ? 'happy' : 'edge');
        loopRow.appendChild(typeDot);

        const input = document.createElement('input');
        input.className = 'mm-stage-rename-input';
        input.value = loop.title || '';
        let committed = false;
        const commit = () => {
          if (committed) return; committed = true;
          loop.title = input.value.trim() || loop.title;
          state.renamingLoopId = null;
          render();
        };
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') commit();
          if (e.key === 'Escape') { committed = true; state.renamingLoopId = null; render(); }
        });
        input.addEventListener('blur', commit);
        input.addEventListener('click', (e) => e.stopPropagation());
        loopRow.appendChild(input);
        loopsContainer.appendChild(loopRow);
        requestAnimationFrame(() => { input.focus(); input.select(); });
        continue;
      }

      // ── 普通 / 编辑态 ──
      const loopRow = document.createElement('div');
      loopRow.className = 'mm-b-loop-row' + (isSelected ? ' selected' : '');
      loopRow.dataset.loopId = loop.id;

      const typeDot = document.createElement('div');
      typeDot.className = 'mm-b-loop-type ' + (loop.type === 'happy_path' ? 'happy' : 'edge');
      loopRow.appendChild(typeDot);

      const titleSpan = document.createElement('span');
      titleSpan.className = 'mm-b-loop-title';
      titleSpan.textContent = loop.title || 'Untitled Loop';
      loopRow.appendChild(titleSpan);

      if (state.loopEditMode) {
        // 编辑模式：双击重命名
        titleSpan.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          state.renamingLoopId = loop.id;
          render();
        });
        // 删除按钮（至少保留 1 条）
        if (loops.length > 1) {
          const delBtn = document.createElement('button');
          delBtn.className = 'mm-b-loop-del-btn';
          delBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 2L8 8M8 2L2 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>`;
          delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteLoop(loop.id); });
          loopRow.appendChild(delBtn);
        }
        loopRow.addEventListener('click', () => { closeStepsPanel(); state.selectedLoopId = loop.id; render(); });
      } else {
        // 普通模式：点击选中 / 取消
        loopRow.addEventListener('click', (e) => {
          e.stopPropagation();
          closeStepsPanel();
          state.selectedLoopId = isSelected ? null : loop.id;
          // render() 重建按钮 DOM（isModeBConnect 依赖 selectedLoopId），
          // render() 末帧回调会自动调用 renderBLines / renderBLinesOverview
          render();
          // loop-row 高亮在同一帧内同步刷新
          document.querySelectorAll('.mm-b-loop-row').forEach(r => {
            r.classList.toggle('selected', r.dataset.loopId === state.selectedLoopId);
          });
        });
      }

      loopsContainer.appendChild(loopRow);
    }

    // 无 Loop 占位（非编辑模式）
    if (loops.length === 0 && !state.loopEditMode) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:4px 8px 4px 22px; font-size:12px; color:#3a3a3a; margin:0 6px;';
      empty.textContent = '暂无 Loop';
      loopsContainer.appendChild(empty);
    }

    // （Loop 管理按钮已移至面板头下方统一渲染）

    el.appendChild(loopsContainer);
  }
}

// ── Loop 管理按钮区：面板头下方，原位切换（参照 Mode A renderStageFooter 机制）──
// container = el（stageList），按钮渲染在 Stage 列表之前
function renderBLoopManagementBtn(container) {

  const NO_H_MARGIN = 'margin-left:0;margin-right:0;';
