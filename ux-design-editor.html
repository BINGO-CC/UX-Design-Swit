<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX 设计交互编辑器</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#232735;
  --border:#2e3345; --text:#e4e6ed; --text2:#9498a8;
  --accent:#6c8cff; --accent2:#4a6adf;
  --green:#34d399; --orange:#fb923c; --red:#f87171;
  --yellow:#fbbf24; --purple:#a78bfa; --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

/* Toolbar (Title bar) */
.toolbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;}
.toolbar h1{font-size:15px;font-weight:600;margin-right:auto;}
.toolbar button{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;}
.toolbar button:hover{background:var(--accent);border-color:var(--accent);}
.toolbar .sep{width:1px;height:22px;background:var(--border);}

/* Tab bar with actions */
.tab-bar{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:43px;z-index:99;}
.tab-bar .tabs-left{display:flex;flex:1;}
.tab-bar .actions-right{display:flex;align-items:center;gap:8px;padding:6px 0;}
.tab-bar .actions-right button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap;}
.tab-bar .actions-right button:hover{background:var(--accent);border-color:var(--accent);}
.tab-bar .actions-right .sep{width:1px;height:20px;background:var(--border);}
.undo-redo{display:flex;gap:3px;}
.undo-redo button{padding:4px 8px;font-size:13px;}
.undo-redo button:disabled{opacity:.3;cursor:not-allowed;}
.undo-redo button:disabled:hover{background:var(--surface2);border-color:var(--border);}

/* Dropdown */
.dropdown{position:relative;display:inline-block;}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;min-width:200px;overflow:hidden;}
.dropdown-menu button{display:block;width:100%;padding:10px 16px;border:none;background:transparent;color:var(--text);font-size:13px;text-align:left;cursor:pointer;transition:all .15s;}
.dropdown-menu button:hover{background:var(--accent);color:#fff;}
.dropdown-menu button.disabled{opacity:.35;cursor:not-allowed;}
.dropdown-menu button.disabled:hover{background:transparent;color:var(--text);}
.dropdown-menu button:not(:last-child){border-bottom:1px solid var(--border);}
.dropdown.open .dropdown-menu{display:block;}

/* Mode Tabs */
.mode-tab{padding:10px 20px;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;}
.mode-tab:hover{color:var(--text);}
.mode-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* Container */
.container{max-width:960px;margin:0 auto;padding:20px;}
.mode-panel{display:none;}
.mode-panel.active{display:block;}

/* Editable */
.editable{cursor:text;padding:2px 4px;border-radius:4px;transition:all .15s;outline:none;min-height:1.6em;}
.editable:hover{background:rgba(108,140,255,.1);}
.editable:focus{background:rgba(108,140,255,.15);box-shadow:0 0 0 2px var(--accent);}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.card-header{padding:14px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.card-header .drag-handle{color:var(--text2);font-size:16px;cursor:grab;user-select:none;padding-top:2px;}
.card-header .info{flex:1;}
.card-header .title{font-size:15px;font-weight:600;color:var(--accent);}
.card-header .meta{font-size:13px;color:var(--text2);margin-top:3px;}
.card-header .actions{display:flex;gap:5px;}
.card-header .actions button{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:3px 5px;border-radius:4px;}
.card-header .actions button:hover{background:var(--surface);color:var(--text);}
.card-header .actions button.del-btn{color:var(--red) !important;font-size:14px;}
.card-header .actions button.del-btn:hover{background:rgba(248,113,113,.12) !important;color:var(--red) !important;}
.card-body{padding:0 18px 14px;}
.card-body.collapsed{display:none;}

/* Stage (Mode B) */
.stage{margin-top:14px;border-left:3px solid var(--accent);padding-left:14px;position:relative;}
.stage-header{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.stage-header .stage-title{font-weight:600;font-size:14px;flex:1;}
.stage-header button{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;}
.stage-header button:hover{background:var(--surface2);color:var(--text);}

/* Action/Feedback blocks */
.action-block,.feedback-block{margin:7px 0;padding:9px 12px;border-radius:6px;font-size:14px;}
.action-block{background:rgba(108,140,255,.08);border:1px solid rgba(108,140,255,.2);}
.feedback-block{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);}
.block-label{font-size:12px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.action-block .block-label{color:var(--accent);}
.feedback-block .block-label{color:var(--green);}

/* Step items */
.step-list{list-style:none;}
.step-item{display:flex;align-items:flex-start;gap:7px;padding:2px 0;}
.step-item .step-num{color:var(--text2);font-size:13px;min-width:18px;text-align:right;padding-top:1px;}
.step-item .step-drag{cursor:grab;color:var(--text2);font-size:11px;padding-top:3px;user-select:none;}
.step-item .step-content{flex:1;}
.step-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:2px 5px;opacity:0;transition:opacity .15s;line-height:1;}
.step-del:hover{opacity:.7;}
.step-item:hover .step-del{opacity:1;}
.sug-item .step-del{position:absolute;top:6px;right:6px;}
.sug-item:hover .step-del{opacity:1;}
.bound-item .step-del{position:absolute;top:7px;right:7px;}
.bound-item:hover .step-del{opacity:1;}
.branch-header:hover .step-del{opacity:1;}
.branch-item:hover .step-del{opacity:1;}

/* Feedback & Boundary wrapper (Mode B) */
.fb-wrapper{margin:7px 0;border:1px solid rgba(168,85,247,.2);border-radius:6px;overflow:hidden;}
.fb-wrapper-header{display:flex;align-items:center;gap:7px;padding:8px 12px;background:rgba(168,85,247,.08);cursor:pointer;user-select:none;font-size:13px;font-weight:600;color:var(--purple);}
.fb-wrapper-header:hover{background:rgba(168,85,247,.13);}
.fb-wrapper-header .fb-toggle{font-size:11px;transition:transform .2s;}
.fb-wrapper-body{padding:4px 10px 10px;}
.fb-wrapper-body.collapsed{display:none;}

/* Branch */
.branch{margin:7px 0;padding:9px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);}
.branch-header{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.branch-header .branch-title{font-weight:600;font-size:13px;color:var(--orange);flex:1;}
.branch-header button{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;}
.branch-header button:hover{opacity:.7;}
.branch-header:hover .step-del{opacity:1;}
.branch-item{display:flex;gap:5px;padding:2px 0;font-size:14px;}
.branch-item .bullet{color:var(--text2);min-width:14px;}

/* Tree node (Mode C) */
.tree-node{margin-left:20px;border-left:1px dashed var(--border);padding-left:12px;margin-top:6px;}
.tree-node.root{margin-left:0;border-left:none;padding-left:0;}
.node-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;transition:background .1s;}
.node-row:hover{background:var(--surface2);}
.node-icon{font-size:14px;min-width:20px;text-align:center;}
.node-label{flex:1;font-size:14px;}
.node-note{font-size:12px;color:var(--text2);font-style:italic;}
.node-actions button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:2px 4px;opacity:0;transition:opacity .1s;}
.node-row:hover .node-actions button{opacity:1;}
.node-actions button:hover{color:var(--accent);}
.node-actions button.del-btn{color:var(--red);}
.node-actions button.del-btn:hover{color:var(--red);opacity:.7;}

/* Spec section (Mode D) */
.spec-section{margin-top:14px;border-radius:6px;overflow:hidden;}
.spec-section-header{padding:10px 14px;font-weight:600;font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;}
.spec-section-header.visible{background:rgba(108,140,255,.12);color:var(--accent);border:1px solid rgba(108,140,255,.2);border-radius:6px 6px 0 0;}
.spec-section-header.interact{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2);border-radius:6px 6px 0 0;}
.spec-section-header.boundary{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2);border-radius:6px 6px 0 0;}
.spec-section-body{padding:10px 14px;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--surface);}

/* Module card (Mode A) */
.module-priority{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.module-priority.high{background:rgba(248,113,113,.15);color:var(--red);}
.module-priority.mid{background:rgba(251,191,36,.15);color:var(--yellow);}
.module-priority.low{background:rgba(52,211,153,.15);color:var(--green);}

/* Add btn */
.add-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 10px;margin-top:7px;background:transparent;border:1px dashed var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:0;transition:all .15s;width:100%;}
.add-btn::before{content:'＋';font-size:16px;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(108,140,255,.05);}

/* Annotation */
.anno{display:inline-flex;align-items:center;gap:3px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--yellow);margin-left:6px;cursor:pointer;}
.anno-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;padding:2px 4px;opacity:0;transition:opacity .1s;}
.step-item:hover .anno-btn,.node-row:hover .anno-btn,.card-header:hover .anno-btn{opacity:1;}
.anno-btn:hover{color:var(--yellow);}
.anno-input{background:var(--bg);border:1px solid var(--yellow);border-radius:4px;padding:3px 7px;font-size:11px;color:var(--text);width:150px;outline:none;}

/* Reference Tags */
.ref-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.ref-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--accent);}
.ref-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.ref-tag.changed{color:var(--orange);border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.08);}
.ref-tag.changed:hover{background:var(--orange);color:#fff;}
.ref-tag.deleted{color:var(--red);border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.08);text-decoration:line-through;cursor:default;}
.ref-tag .ref-mode{font-weight:700;opacity:.7;}
.back-ref-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;align-items:center;}
.back-ref-label{font-size:11px;color:var(--text2);}
.back-ref-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:11px;cursor:pointer;transition:all .15s;color:var(--text2);background:rgba(255,255,255,.04);border:1px solid var(--border);}
.back-ref-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.ref-link-btn{background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;transition:all .15s;}
.ref-link-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
/* Ref highlight animation */
.ref-highlight{animation:refFlash 0.5s ease-in-out 3;}
@keyframes refFlash{0%,100%{box-shadow:0 0 0 2px transparent;}50%{box-shadow:0 0 0 3px var(--yellow);}}
/* Ref modal */
.ref-modal-list{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:4px;}
.ref-modal-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;cursor:pointer;font-size:13px;transition:all .1s;}
.ref-modal-item:hover{background:var(--surface2);}
.ref-modal-item input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer;}
.ref-modal-item .ref-modal-label{flex:1;color:var(--text);}
.ref-modal-item .ref-modal-id{font-size:11px;color:var(--text2);font-family:monospace;}

/* Drag & Drop */
.dragging{opacity:.5;transform:scale(.98);}
.drag-over{border:2px dashed var(--accent) !important;background:rgba(108,140,255,.05) !important;}
.drag-handle{cursor:grab;user-select:none;}
.drag-handle:active{cursor:grabbing;}

/* Storage indicator */
.storage-status{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;}
.storage-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.storage-dot.unsaved{background:var(--orange);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

/* Context menu */
.ctx-menu{position:fixed;z-index:200;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.ctx-menu button{display:flex;align-items:center;gap:7px;width:100%;padding:7px 11px;background:none;border:none;color:var(--text);cursor:pointer;font-size:13px;border-radius:4px;text-align:left;}
.ctx-menu button:hover{background:var(--accent);}
.ctx-menu button.danger{color:var(--red);}
.ctx-menu button.danger:hover{background:rgba(248,113,113,.15);}

/* Empty State */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text2);}
.empty-state .empty-icon{font-size:72px;margin-bottom:20px;opacity:.6;filter:grayscale(.3);}
.empty-state .empty-text{font-size:15px;font-weight:500;color:var(--text2);text-align:center;line-height:1.8;}
.empty-state .empty-action{color:var(--accent);font-weight:600;cursor:pointer;padding:6px 16px;border-radius:6px;transition:all .15s;display:inline-block;margin-top:4px;}
.empty-state .empty-action:hover{background:rgba(108,140,255,.15);text-decoration:underline;}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:8px 18px;border-radius:8px;font-size:13px;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:all .3s;opacity:0;pointer-events:none;}
.toast.show{opacity:1;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:640px;max-height:80vh;overflow-y:auto;}
.modal h2{font-size:15px;margin-bottom:14px;}
.modal pre{background:var(--bg);padding:14px;border-radius:8px;font-size:12px;overflow-x:auto;white-space:pre-wrap;max-height:45vh;}
.modal textarea{width:100%;height:200px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px;font-size:12px;font-family:monospace;resize:vertical;}
.modal .m-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:14px;}
.modal button{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;}
.modal button.primary{background:var(--accent);border-color:var(--accent);}

/* Inline add button (next to card title) */
.add-inline-btn{background:transparent !important;border:1px dashed rgba(108,140,255,.35) !important;border-radius:5px;color:var(--text2) !important;cursor:pointer;font-size:0 !important;padding:2px 7px !important;transition:all .15s;white-space:nowrap;line-height:1.6;}
.add-inline-btn::before{content:'＋';font-size:13px;}
.add-inline-btn:hover{border-color:var(--accent) !important;color:var(--accent) !important;background:rgba(108,140,255,.08) !important;}

/* FB Popover (反馈与边界条件浮层) */
.fb-popover-btn{background:rgba(251,191,36,.12) !important;border:1px solid rgba(251,191,36,.4) !important;border-radius:5px;color:var(--yellow) !important;cursor:pointer;font-size:12px !important;padding:3px 9px !important;transition:all .15s;white-space:nowrap;}
.fb-popover-btn:hover{background:rgba(251,191,36,.22) !important;border-color:var(--yellow) !important;}
.fb-popover-overlay{position:fixed;inset:0;z-index:260;background:rgba(0,0,0,.45);}
.fb-popover{position:fixed;z-index:261;background:var(--surface);border:1px solid rgba(251,191,36,.4);border-radius:12px;padding:0;width:760px;max-width:calc(100vw - 40px);height:75vh;max-height:75vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.5);top:50%;left:50%;transform:translate(-50%,-50%);}
.fb-popover-head{display:flex;align-items:center;gap:8px;padding:14px 18px 0;flex-shrink:0;}
.fb-popover-head h3{font-size:14px;font-weight:600;color:var(--yellow);flex:1;}
.fb-popover-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px;line-height:1;}
.fb-popover-close:hover{background:var(--surface2);color:var(--text);}
.fb-stage-tabs{display:flex;gap:4px;padding:10px 18px 0;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.fb-stage-tabs::-webkit-scrollbar{display:none;}
.fb-stage-tab{padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);white-space:nowrap;transition:all .15s;flex-shrink:0;}
.fb-stage-tab:hover{border-color:var(--yellow);color:var(--yellow);}
.fb-stage-tab.active{background:rgba(251,191,36,.15);border-color:var(--yellow);color:var(--yellow);font-weight:600;}
.fb-popover-body{overflow-y:auto;padding:12px 18px 16px;flex:1;min-height:0;}
.fb-popover-body .editable{overflow-wrap:break-word;word-break:break-word;}
.fb-popover-body .step-content,.fb-popover-body .branch-title{white-space:normal;overflow-wrap:break-word;word-break:break-word;}
</style>
</head>
<body>

<div class="toolbar">
  <h1>🎨 UX 设计交互编辑器</h1>
  <div class="sep"></div>
  <button id="shareLinkBtn" title="分享：导出/导入 .uxshare 文件">🔗 分享</button>
  <button id="clearStorageBtn" title="清除所有本地数据">🗑️ 清除数据</button>
</div>

<div class="tab-bar">
  <div class="tabs-left">
    <div class="mode-tab active" data-mode="A">A 策划案分析</div>
    <div class="mode-tab" data-mode="B">B 行为路径</div>
    <div class="mode-tab" data-mode="C">C 信息架构</div>
    <div class="mode-tab" data-mode="D">D 交互稿</div>
  </div>
  <div class="actions-right">
    <div class="storage-status" id="storageStatus" title="数据自动保存到浏览器">
      <span class="storage-dot"></span>
      <span>已保存</span>
    </div>
    <div class="undo-redo">
      <button id="undoBtn" disabled title="撤销 Ctrl+Z">↩</button>
      <button id="redoBtn" disabled title="重做 Ctrl+Y">↪</button>
    </div>
    <div class="sep"></div>
    <button id="importBtn">📥 导入</button>
    <div class="dropdown" id="exportJsonDropdown">
      <button id="exportJsonBtn">📤 导出 ▾</button>
      <div class="dropdown-menu" id="exportJsonMenu">
        <button onclick="exportJsonModDiff()">导出该模块修改部分JSON</button>
        <button onclick="exportJsonModFull()">导出全部JSON</button>
        <button onclick="exportMd()">导出MarkDown</button>
        <button onclick="showCoverageReport()">📊 引用覆盖率报告</button>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div id="panelA" class="mode-panel active"></div>
  <div id="panelB" class="mode-panel"></div>
  <div id="panelC" class="mode-panel"></div>
  <div id="panelD" class="mode-panel"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== Core Utils ======
let uid = 1000;
function nid() { return 'n' + (uid++); }
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ====== State ======
let store = { A: {}, B: [], C: [], D: [] };
let importSnapshot = { A: {}, B: [], C: [], D: [] }; // 导入时的快照，用于对比修改
let annotations = {}; // { nodeId: "批注内容" }
let hist = [], hIdx = -1, activeMode = 'A';
const STORAGE_KEY = 'ux_design_editor_data';
const ANNO_STORAGE_KEY = 'ux_design_editor_annotations';
const SNAPSHOT_STORAGE_KEY = 'ux_design_editor_snapshot';
const FINGERPRINT_STORAGE_KEY = 'ux_design_editor_fingerprints';

// ====== Reference Network ======
// 运行时反向索引（不持久化），key = 被引用方ID，value = [{ from, fromMode, fromLabel }]
let refIndex = {};
// 引用指纹（持久化），建立引用时记录被引用对象的内容hash，用于变更检测
let refFingerprints = {};

/**
 * 从 store 构建反向引用索引
 * B.refs.A → refIndex[aModuleId] = [{ from: bPathId, fromMode:'B', fromLabel }]
 * D.refs.B → refIndex[bPathId]   = [{ from: dSpecId, fromMode:'D', fromLabel }]
 * D.refs.C → refIndex[cPageId]   = [{ from: dSpecId, fromMode:'D', fromLabel }]
 */
function buildRefIndex() {
  refIndex = {};
  // B→A
  (store.B || []).forEach(path => {
    (path.refs?.A || []).forEach(aId => {
      if (!refIndex[aId]) refIndex[aId] = [];
      refIndex[aId].push({ from: path.id, fromMode: 'B', fromLabel: path.title });
    });
  });
  // D→B
  (store.D || []).forEach(spec => {
    (spec.refs?.B || []).forEach(bId => {
      if (!refIndex[bId]) refIndex[bId] = [];
      refIndex[bId].push({ from: spec.id, fromMode: 'D', fromLabel: spec.specName });
    });
    // D→C
    (spec.refs?.C || []).forEach(cId => {
      if (!refIndex[cId]) refIndex[cId] = [];
      refIndex[cId].push({ from: spec.id, fromMode: 'D', fromLabel: spec.specName });
    });
  });
}

/**
 * 对节点对象生成轻量内容指纹（djb2 hash），排除 refs/collapsed/id 等非内容字段
 */
function fingerprint(obj) {
  const content = JSON.stringify(obj, (key, val) => {
    if (['refs', 'collapsed', 'id'].includes(key)) return undefined;
    return val;
  });
  let hash = 5381;
  for (let i = 0; i < content.length; i++) {
    hash = ((hash << 5) + hash) + content.charCodeAt(i);
  }
  return 'fp_' + (hash >>> 0).toString(36);
}

/**
 * 记录被引用对象的当前内容指纹
 */
function snapshotFingerprint(targetId, targetObj) {
  refFingerprints[targetId] = fingerprint(targetObj);
  try { localStorage.setItem(FINGERPRINT_STORAGE_KEY, JSON.stringify(refFingerprints)); } catch(e) {}
}

/**
 * 检查被引用对象内容是否已变更
 */
function hasRefChanged(targetId, targetObj) {
  const saved = refFingerprints[targetId];
  if (!saved) return false;
  return saved !== fingerprint(targetObj);
}

/**
 * 确保 B 和 D 数据中的 refs 字段存在（导入兼容）
 */
function ensureRefs() {
  (store.B || []).forEach(path => {
    if (!path.refs) path.refs = {};
    if (!path.refs.A) path.refs.A = [];
  });
  (store.D || []).forEach(spec => {
    if (!spec.refs) spec.refs = {};
    if (!spec.refs.B) spec.refs.B = [];
    if (!spec.refs.C) spec.refs.C = [];
  });
}

/**
 * 根据 ID 在 store 中查找对应节点及其标签
 * 返回 { mode, label, obj } 或 null
 */
function resolveRefTarget(targetId) {
  // 在 A 模块中查找
  const aMod = store.A.modules?.find(m => m.id === targetId);
  if (aMod) return { mode: 'A', label: aMod.name, obj: aMod };
  // 在 B 路径中查找
  const bPath = (store.B || []).find(p => p.id === targetId);
  if (bPath) return { mode: 'B', label: bPath.title, obj: bPath };
  // 在 C 页面中查找
  const cPage = (store.C || []).find(p => p.id === targetId);
  if (cPage) return { mode: 'C', label: cPage.pageName, obj: cPage };
  // 在 D 交互稿中查找
  const dSpec = (store.D || []).find(s => s.id === targetId);
  if (dSpec) return { mode: 'D', label: dSpec.specName, obj: dSpec };
  return null;
}

/**
 * 渲染正向引用标签行（B卡片显示refs.A，D卡片显示refs.B和refs.C）
 */
function renderRefTags(item, itemMode) {
  if (!item.refs) return '';
  const tags = [];
  const refKeys = itemMode === 'B' ? ['A'] : ['B', 'C'];
  refKeys.forEach(targetMode => {
    (item.refs[targetMode] || []).forEach(targetId => {
      const resolved = resolveRefTarget(targetId);
      if (!resolved) {
        tags.push(`<span class="ref-tag deleted" title="引用目标已删除">⚠️ <span class="ref-mode">${targetMode}:</span>(已删除)</span>`);
      } else {
        const changed = hasRefChanged(targetId, resolved.obj);
        const cls = changed ? 'ref-tag changed' : 'ref-tag';
        const prefix = changed ? '⚠️ ' : '';
        const onclick = changed
          ? `showRefChangeDetail('${targetId}','${resolved.mode}','${esc(resolved.label).replace(/'/g,"\\&#39;")}')`
          : `jumpToRef('${targetId}','${resolved.mode}')`;
        const title = changed ? '内容已变更，点击查看详情' : '点击跳转';
        tags.push(`<span class="${cls}" onclick="${onclick}" title="${title}">${prefix}<span class="ref-mode">${targetMode}:</span>${esc(resolved.label)}</span>`);
      }
    });
  });
  if (tags.length === 0) return '';
  return `<div class="ref-tags">${tags.join('')}</div>`;
}

/**
 * 渲染反向引用标签行（A模块/B路径/C页面 显示"被谁引用"）
 */
function renderBackRefTags(itemId) {
  const refs = refIndex[itemId];
  if (!refs || refs.length === 0) return '';
  const tags = refs.map(r =>
    `<span class="back-ref-tag" onclick="jumpToRef('${r.from}','${r.fromMode}')" title="点击跳转到 ${r.fromLabel}">${r.fromMode}:${esc(r.fromLabel)}</span>`
  ).join('');
  return `<div class="back-ref-row"><span class="back-ref-label">📍被引用:</span>${tags}</div>`;
}

/**
 * 跳转到引用目标：切换Tab + 滚动 + 高亮闪烁
 */
function jumpToRef(targetId, targetMode) {
  switchMode(targetMode);
  requestAnimationFrame(() => {
    const selectors = [
      `.card[data-path="${targetId}"]`,
      `.card[data-mod="${targetId}"]`,
      `.card[data-page="${targetId}"]`,
      `.card[data-spec="${targetId}"]`
    ];
    let el = null;
    for (const sel of selectors) {
      el = document.querySelector(sel);
      if (el) break;
    }
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('ref-highlight');
      setTimeout(() => el.classList.remove('ref-highlight'), 2000);
    } else {
      toast('未找到目标节点');
    }
  });
}

/**
 * 打开引用管理浮层
 */
function openRefModal(itemId, itemMode) {
  const item = itemMode === 'B' ? (store.B || []).find(p => p.id === itemId) : (store.D || []).find(s => s.id === itemId);
  if (!item) return;
  if (!item.refs) item.refs = {};

  let sections = '';

  if (itemMode === 'B') {
    const aModules = store.A.modules || [];
    const selectedA = new Set(item.refs.A || []);
    sections += `<div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px;">📎 引用功能模块（A）</div>
      <div class="ref-modal-list" id="refListA">
        ${aModules.length === 0 ? '<div style="padding:12px;color:var(--text2);font-size:13px;">暂无功能模块数据</div>' :
          aModules.map(m => `<label class="ref-modal-item">
            <input type="checkbox" value="${m.id}" ${selectedA.has(m.id) ? 'checked' : ''}>
            <span class="ref-modal-label">${esc(m.name)}</span>
            <span class="ref-modal-id">${m.id}</span>
          </label>`).join('')}
      </div>
    </div>`;
  }

  if (itemMode === 'D') {
    const bPaths = store.B || [];
    const selectedB = new Set(item.refs.B || []);
    sections += `<div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px;">📎 引用行为路径（B）</div>
      <div class="ref-modal-list" id="refListB">
        ${bPaths.length === 0 ? '<div style="padding:12px;color:var(--text2);font-size:13px;">暂无行为路径数据</div>' :
          bPaths.map(p => `<label class="ref-modal-item">
            <input type="checkbox" value="${p.id}" ${selectedB.has(p.id) ? 'checked' : ''}>
            <span class="ref-modal-label">${esc(p.title)}</span>
            <span class="ref-modal-id">${p.id}</span>
          </label>`).join('')}
      </div>
    </div>`;

    const cPages = store.C || [];
    const selectedC = new Set(item.refs.C || []);
    sections += `<div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px;">📎 引用信息架构（C）</div>
      <div class="ref-modal-list" id="refListC">
        ${cPages.length === 0 ? '<div style="padding:12px;color:var(--text2);font-size:13px;">暂无信息架构数据</div>' :
          cPages.map(p => `<label class="ref-modal-item">
            <input type="checkbox" value="${p.id}" ${selectedC.has(p.id) ? 'checked' : ''}>
            <span class="ref-modal-label">${esc(p.pageName)}</span>
            <span class="ref-modal-id">${p.id}</span>
          </label>`).join('')}
      </div>
    </div>`;
  }

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal" style="max-width:480px;">
    <h2>🔗 管理引用关系</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">选择该${itemMode === 'B' ? '路径' : '交互稿'}所关联的上游模块，建立引用后可跳转导航和变更检测</p>
    ${sections}
    <div class="m-actions">
      <button onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="primary" onclick="saveRefs('${itemId}','${itemMode}')">保存</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

/**
 * 保存引用关系
 */
function saveRefs(itemId, itemMode) {
  const item = itemMode === 'B' ? (store.B || []).find(p => p.id === itemId) : (store.D || []).find(s => s.id === itemId);
  if (!item) return;
  if (!item.refs) item.refs = {};

  if (itemMode === 'B') {
    const listA = document.getElementById('refListA');
    if (listA) {
      const checked = [...listA.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
      item.refs.A = checked;
      checked.forEach(aId => {
        const mod = store.A.modules?.find(m => m.id === aId);
        if (mod) snapshotFingerprint(aId, mod);
      });
    }
  }

  if (itemMode === 'D') {
    const listB = document.getElementById('refListB');
    if (listB) {
      const checked = [...listB.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
      item.refs.B = checked;
      checked.forEach(bId => {
        const path = (store.B || []).find(p => p.id === bId);
        if (path) snapshotFingerprint(bId, path);
      });
    }
    const listC = document.getElementById('refListC');
    if (listC) {
      const checked = [...listC.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
      item.refs.C = checked;
      checked.forEach(cId => {
        const page = (store.C || []).find(p => p.id === cId);
        if (page) snapshotFingerprint(cId, page);
      });
    }
  }

  document.querySelector('.modal-overlay')?.remove();
  save(); renderAll();
  toast('引用关系已保存');
}

// ====== Phase 3: 变更详情弹窗 + 标记已读 ======

/**
 * 显示引用变更详情弹窗
 */
function showRefChangeDetail(targetId, targetMode, targetLabel) {
  const resolved = resolveRefTarget(targetId);
  if (!resolved) {
    toast('引用目标已不存在');
    return;
  }

  // 计算变更摘要
  const changes = computeRefChangeSummary(targetId, resolved.obj, targetMode);

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal" style="max-width:500px;">
    <h2>⚠️ 引用变更详情</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px;">
      <strong style="color:var(--orange);">${targetMode}:${esc(resolved.label)}</strong> 的内容已发生变更
    </p>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px;max-height:250px;overflow-y:auto;">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;">变更内容：</div>
      ${changes.length > 0 ? changes.map(c => `
        <div style="display:flex;gap:6px;align-items:flex-start;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border);">
          <span style="color:${c.color};font-size:14px;min-width:18px;">${c.icon}</span>
          <span style="color:var(--text);flex:1;">${esc(c.text)}</span>
        </div>
      `).join('') : '<div style="font-size:13px;color:var(--text2);">内容结构已变更（详细差异请跳转查看）</div>'}
    </div>
    <div class="m-actions">
      <button onclick="this.closest('.modal-overlay').remove()">关闭</button>
      <button class="primary" onclick="this.closest('.modal-overlay').remove();jumpToRef('${targetId}','${targetMode}')">🔍 跳转查看</button>
      <button class="primary" style="background:var(--green);border-color:var(--green);" onclick="ackRefChange('${targetId}','${targetMode}')">✅ 标记已读</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

/**
 * 计算引用变更摘要（对比指纹快照与当前内容的差异）
 */
function computeRefChangeSummary(targetId, targetObj, targetMode) {
  const changes = [];
  try {
    if (targetMode === 'A') {
      // A模块：对比 features / suggestions 数量
      changes.push({ icon: '📝', text: `功能项数量: ${targetObj.features?.length || 0} 个`, color: 'var(--accent)' });
      changes.push({ icon: '💡', text: `建议数量: ${targetObj.suggestions?.length || 0} 个`, color: 'var(--green)' });
      changes.push({ icon: '🏷️', text: `优先级: ${targetObj.priority === 'high' ? '高' : targetObj.priority === 'mid' ? '中' : '低'}`, color: 'var(--yellow)' });
    } else if (targetMode === 'B') {
      // B路径：对比 stages 数量、起点、关键点
      changes.push({ icon: '🌊', text: `阶段数量: ${targetObj.stages?.length || 0} 个`, color: 'var(--accent)' });
      changes.push({ icon: '📍', text: `起点: ${targetObj.startPoint || '(空)'}`, color: 'var(--text2)' });
      changes.push({ icon: '⭐', text: `体验关键点: ${targetObj.keyPoint || '(空)'}`, color: 'var(--text2)' });
    } else if (targetMode === 'C') {
      // C页面：对比根节点数量
      const countNodes = (nodes) => { let c = nodes.length; nodes.forEach(n => { c += countNodes(n.children || []); }); return c; };
      const total = countNodes(targetObj.nodes || []);
      changes.push({ icon: '🌳', text: `节点总数: ${total} 个`, color: 'var(--accent)' });
    }
  } catch (e) {
    changes.push({ icon: '❓', text: '无法解析变更详情', color: 'var(--text2)' });
  }
  return changes;
}

/**
 * 标记变更已读（更新指纹）
 */
function ackRefChange(targetId, targetMode) {
  const resolved = resolveRefTarget(targetId);
  if (resolved) {
    snapshotFingerprint(targetId, resolved.obj);
  }
  document.querySelector('.modal-overlay')?.remove();
  renderAll();
  toast('已标记为已读');
}

// ====== Phase 4: 覆盖率报告 ======

/**
 * 生成覆盖率报告数据
 */
function generateCoverageReport() {
  const report = {
    BA: { items: [], covered: 0, total: 0 },
    DB: { items: [], covered: 0, total: 0 },
    DC: { items: [], covered: 0, total: 0 },
    orphans: []
  };

  // B→A 覆盖率
  (store.B || []).forEach(path => {
    const linked = path.refs?.A?.length > 0;
    const targets = (path.refs?.A || []).map(id => {
      const mod = store.A.modules?.find(m => m.id === id);
      return mod ? mod.name : `(ID:${id} 未找到)`;
    });
    const changed = linked && (path.refs.A || []).some(id => {
      const mod = store.A.modules?.find(m => m.id === id);
      return mod && hasRefChanged(id, mod);
    });
    report.BA.items.push({ source: path.title, sourceId: path.id, linked, targets, changed });
    report.BA.total++;
    if (linked) report.BA.covered++;
  });

  // D→B 覆盖率
  (store.D || []).forEach(spec => {
    const linked = spec.refs?.B?.length > 0;
    const targets = (spec.refs?.B || []).map(id => {
      const p = (store.B || []).find(b => b.id === id);
      return p ? p.title : `(ID:${id} 未找到)`;
    });
    report.DB.items.push({ source: spec.specName, sourceId: spec.id, linked, targets });
    report.DB.total++;
    if (linked) report.DB.covered++;
  });

  // D→C 覆盖率
  (store.D || []).forEach(spec => {
    const linked = spec.refs?.C?.length > 0;
    const targets = (spec.refs?.C || []).map(id => {
      const p = (store.C || []).find(c => c.id === id);
      return p ? p.pageName : `(ID:${id} 未找到)`;
    });
    report.DC.items.push({ source: spec.specName, sourceId: spec.id, linked, targets });
    report.DC.total++;
    if (linked) report.DC.covered++;
  });

  // 孤立节点：A模块未被任何B引用
  (store.A.modules || []).forEach(mod => {
    if (!refIndex[mod.id] || refIndex[mod.id].length === 0) {
      report.orphans.push({ id: mod.id, label: mod.name, mode: 'A', missing: '无B引用' });
    }
  });
  // 孤立节点：B路径未被任何D引用
  (store.B || []).forEach(path => {
    if (!refIndex[path.id] || refIndex[path.id].length === 0) {
      report.orphans.push({ id: path.id, label: path.title, mode: 'B', missing: '无D引用' });
    }
  });
  // 孤立节点：C页面未被任何D引用
  (store.C || []).forEach(page => {
    if (!refIndex[page.id] || refIndex[page.id].length === 0) {
      report.orphans.push({ id: page.id, label: page.pageName, mode: 'C', missing: '无D引用' });
    }
  });

  return report;
}

/**
 * 渲染进度条
 */
function renderProgressBar(covered, total) {
  if (total === 0) return '<span style="color:var(--text2);font-size:12px;">无数据</span>';
  const pct = Math.round((covered / total) * 100);
  const color = pct === 100 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)';
  return `<div style="display:flex;align-items:center;gap:8px;">
    <div style="flex:1;height:8px;background:var(--surface);border-radius:4px;overflow:hidden;border:1px solid var(--border);">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:4px;transition:width .3s;"></div>
    </div>
    <span style="font-size:12px;font-weight:600;color:${color};min-width:70px;text-align:right;">${covered}/${total} (${pct}%)</span>
  </div>`;
}

/**
 * 打开覆盖率报告浮层

function showCoverageReport() {
  closeExportDropdown();

  const renderSection = (title, data, arrow) => {

/**
 * 导出覆盖率报告为 Markdown
 */
function exportCoverageReportMd() {
  const report = generateCoverageReport();
  let md = '# 📊 引用覆盖率报告\n\n';
  md += `> 生成时间：${new Date().toLocaleString()}\n\n`;

  const addSection = (title, data) => {
    md += `## ${title}\n\n`;
    if (data.total === 0) { md += '暂无数据\n\n'; return; }
    const pct = Math.round((data.covered / data.total) * 100);
    md += `**覆盖率：${data.covered}/${data.total} (${pct}%)**\n\n`;
    data.items.forEach(item => {
      const icon = item.linked ? '✅' : '⚠️';
      const target = item.linked ? item.targets.join(', ') : '(未关联)';
      const change = item.changed ? ' 🔄已变更' : '';
      md += `- ${icon} ${item.source} → ${target}${change}\n`;
    });
    md += '\n';
  };

  addSection('B → A 覆盖率（行为路径 → 功能模块）', report.BA);
  addSection('D → B 覆盖率（交互稿 → 行为路径）', report.DB);
  addSection('D → C 覆盖率（交互稿 → 信息架构）', report.DC);

  if (report.orphans.length > 0) {
    md += '## 🔴 未被引用的孤立节点\n\n';
    report.orphans.forEach(o => { md += `- **${o.mode}** ${o.label} — ${o.missing}\n`; });
  } else {
    md += '## ✅ 无孤立节点\n\n所有模块/路径/页面均已被引用。\n';
  }

  // 关闭覆盖率弹窗后显示导出弹窗
  document.querySelector('.modal-overlay')?.remove();
  showExportModal('📊 覆盖率报告 Markdown', md, 'md');
}

// ====== LocalStorage ======
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
    localStorage.setItem(ANNO_STORAGE_KEY, JSON.stringify(annotations));
    updateStorageStatus(true);
  } catch (e) {
    console.error('LocalStorage save failed:', e);
    updateStorageStatus(false);
  }
}

function loadFromStorage() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    const annoData = localStorage.getItem(ANNO_STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      if (parsed.A || parsed.B || parsed.C || parsed.D) {
        store = parsed;
        // 确保所有模式数据存在
        if (!store.A) store.A = {};
        if (!store.B) store.B = [];
        if (!store.C) store.C = [];
        if (!store.D) store.D = [];
        return true;
      }
    }
    if (annoData) {
      annotations = JSON.parse(annoData);
    }
  } catch (e) {
    console.error('LocalStorage load failed:', e);
  }
  return false;
}

// ====== History ======
function save() {
  const snap = JSON.stringify(store);
  hist = hist.slice(0, hIdx + 1);
  hist.push(snap);
  if (hist.length > 80) hist.shift();
  hIdx = hist.length - 1;
  updHist();
  saveToStorage(); // 同步到 LocalStorage
  buildRefIndex(); // 每次保存后刷新引用索引
}
function undo() {
  if (hIdx <= 0) return;
  hIdx--;
  store = JSON.parse(hist[hIdx]);
  renderAll(); updHist(); toast('已撤销');
}
function redo() {
  if (hIdx >= hist.length - 1) return;
  hIdx++;
  store = JSON.parse(hist[hIdx]);
  renderAll(); updHist(); toast('已重做');
}
function updHist() {
  document.getElementById('undoBtn').disabled = hIdx <= 0;
  document.getElementById('redoBtn').disabled = hIdx >= hist.length - 1;
}

// ====== Drag & Drop ======
let dragData = null;

// 工具函数：通过 drag-handle 精准控制拖动热区
// 仅在 mousedown 于 .drag-handle 时才临时开启父容器的 draggable
function bindHandleDrag(el, onDragStart, onDragEnd, onDragOver, onDragLeave, onDrop) {
  el.draggable = false;
  const handle = el.querySelector('.drag-handle');
  if (handle) {
    handle.onmousedown = () => { el.draggable = true; };
    document.addEventListener('mouseup', () => { el.draggable = false; }, { once: false });
    el.ondragend = () => { el.draggable = false; onDragEnd(); };
  } else {
    // 无 handle 则降级为全区域可拖（保持兼容）
    el.draggable = true;
    el.ondragend = onDragEnd;
  }
  el.ondragstart = onDragStart;
  el.ondragover = onDragOver;
  el.ondragleave = onDragLeave;
  el.ondrop = onDrop;
}

function bindDragDrop() {
  // 模式 B 路径拖拽
  document.querySelectorAll('#panelB .card[data-path]').forEach((card, idx) => {
    bindHandleDrag(
      card,
      e => { dragData = { type: 'b-path', idx }; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'b-path') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'b-path' && dragData.idx !== idx) {
          const item = store.B.splice(dragData.idx, 1)[0];
          store.B.splice(idx, 0, item);
          save(); renderAll(); toast('已调整顺序');
        }
      }
    );
  });

  // 模式 B 阶段拖拽（支持跨父级路径）
  document.querySelectorAll('#panelB .stage[data-stage]').forEach(stage => {
    const pid = stage.dataset.path;
    const sid = stage.dataset.stage;
    const path = bFindP(pid);
    if (!path) return;
    const stageIdx = path.stages.findIndex(s => s.id === sid);
    bindHandleDrag(
      stage,
      e => { e.stopPropagation(); dragData = { type: 'b-stage', pid, stageIdx, sid }; stage.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; },
      () => { stage.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); e.stopPropagation(); if (dragData?.type === 'b-stage') stage.classList.add('drag-over'); },
      () => stage.classList.remove('drag-over'),
      e => {
        e.preventDefault(); e.stopPropagation(); stage.classList.remove('drag-over');
        if (dragData?.type !== 'b-stage') return;
        if (dragData.pid === pid && dragData.stageIdx === stageIdx) return;
        const srcPath = bFindP(dragData.pid);
        const tgtPath = bFindP(pid);
        if (!srcPath || !tgtPath) return;
        const [item] = srcPath.stages.splice(dragData.stageIdx, 1);
        tgtPath.stages.splice(stageIdx, 0, item);
        save(); renderAll(); toast(dragData.pid === pid ? '已调整阶段顺序' : '已跨路径移动阶段');
      }
    );
  });

  // 模式 C 页面拖拽
  document.querySelectorAll('#panelC .card').forEach((card, idx) => {
    const pageId = card.querySelector('[data-f="c-page"]')?.dataset.i;
    if (!pageId) return;
    bindHandleDrag(
      card,
      e => { dragData = { type: 'c-page', idx }; card.classList.add('dragging'); },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'c-page') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'c-page' && dragData.idx !== idx) {
          const item = store.C.splice(dragData.idx, 1)[0];
          store.C.splice(idx, 0, item);
          save(); renderAll(); toast('已调整顺序');
        }
      }
    );
  });

  // 模式 D 交互稿拖拽
  document.querySelectorAll('#panelD .card').forEach((card, idx) => {
    const specId = card.querySelector('[data-f="d-name"]')?.dataset.i;
    if (!specId) return;
    bindHandleDrag(
      card,
      e => { dragData = { type: 'd-spec', idx }; card.classList.add('dragging'); },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'd-spec') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'd-spec' && dragData.idx !== idx) {
          const item = store.D.splice(dragData.idx, 1)[0];
          store.D.splice(idx, 0, item);
          save(); renderAll(); toast('已调整顺序');
        }
      }
    );
  });

  // 模式 A 模块拖拽
  document.querySelectorAll('#panelA .card[data-mod]').forEach((card, idx) => {
    bindHandleDrag(
      card,
      e => { dragData = { type: 'a-mod', idx }; card.classList.add('dragging'); },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'a-mod') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'a-mod' && dragData.idx !== idx) {
          const item = store.A.modules.splice(dragData.idx, 1)[0];
          store.A.modules.splice(idx, 0, item);
          save(); renderAll(); toast('已调整模块顺序');
        }
      }
    );
  });
}

// Util: focus editable element after render
function focusEl(selector) {
  requestAnimationFrame(() => {
    const el = document.querySelector(selector);
    if (el) { el.focus(); const r=document.createRange(),s=window.getSelection(); r.selectNodeContents(el); r.collapse(false); s.removeAllRanges(); s.addRange(r); }
  });
}

// ============================================================
// 复制模块内容到剪贴板（纯文本，区分标题与正文）
// ============================================================
// 去除 emoji 及多余空白，保留纯文本语义内容
function stripEmoji(str) {
  return (str||'').replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu,'').replace(/\s{2,}/g,' ').trim();
}
// 避免前缀与字段内容重复：若内容已以"前缀"开头则直接用内容，否则拼接前缀
function safePrefix(prefix, value) {
  const v = stripEmoji(value);
  const p = prefix.replace(/：$/, '');
  return (v.startsWith(p+'：') || v.startsWith(p+':') || v===p) ? v : `${prefix}${v}`;
}

// 复制富文本到剪贴板（同时写 text/html + text/plain）
// lines 为数组，每项：{ text, bold?, indent? }
function copyRichText(lines) {
  const plain = lines.map(l => (l.indent||'') + l.text).join('\n');
  const html = '<div style="font-family:sans-serif;font-size:14px;line-height:1.8;">' +
    lines.map(l => {
      const t = l.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const ind = l.indent ? `<span style="white-space:pre;">${l.indent}</span>` : '';
      return l.bold
        ? `<p style="margin:0;">${ind}<strong>${t}</strong></p>`
        : `<p style="margin:0;">${ind}${t}</p>`;
    }).join('') + '</div>';
  try {
    const item = new ClipboardItem({
      'text/html' : new Blob([html],  { type:'text/html'  }),
      'text/plain': new Blob([plain], { type:'text/plain' })
    });
    navigator.clipboard.write([item]).then(()=>toast('已复制到剪贴板（含格式）')).catch(()=>_copyPlainFallback(plain));
  } catch(e) { _copyPlainFallback(plain); }
}
function _copyPlainFallback(text) {
  navigator.clipboard.writeText(text).then(()=>toast('已复制到剪贴板')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已复制到剪贴板');
  });
}

function aCopyMod(mid) {
  const m=store.A.modules.find(x=>x.id===mid);if(!m)return;
  const p=m.priority==='high'?'高':m.priority==='mid'?'中':'低';
  const L=[];
  L.push({text:`【模块】${stripEmoji(m.name)}（优先级：${p}）`,bold:true});
  L.push({text:''});
  L.push({text:'包含功能：',bold:true});
  m.features.forEach((f,i)=>L.push({text:`${i+1}. ${stripEmoji(f.text)}`,indent:'  '}));
  if(m.suggestions.length){
    L.push({text:''});
    L.push({text:'UX补充建议：',bold:true});
    m.suggestions.forEach(s=>{
      L.push({text:`• ${stripEmoji(s.text)}`,indent:'  '});
      if(s.reason)L.push({text:`依据：${stripEmoji(s.reason)}`,indent:'    '});
    });
  }
  copyRichText(L);
}

function bCopyPath(pid) {
  const path=bFindP(pid);if(!path)return;
  const L=[];
  L.push({text:`【路径】${stripEmoji(path.title)}`,bold:true});
  L.push({text:safePrefix('起点：',path.startPoint),indent:'  '});
  L.push({text:''});
  path.stages.forEach((s,si)=>{
    const stitle=stripEmoji(s.title);
    L.push({text:safePrefix(`阶段 ${si+1}：`,stitle),bold:true,indent:'  '});
    if(s.actions.length){L.push({text:'用户操作：',bold:true,indent:'    '});s.actions.forEach((a,i)=>L.push({text:`${i+1}. ${stripEmoji(a.text)}`,indent:'      '}));}
    if(s.feedbacks.length){L.push({text:'系统反馈：',bold:true,indent:'    '});s.feedbacks.forEach(f=>L.push({text:`• ${stripEmoji(f.text)}`,indent:'      '}));}
    s.branches.forEach(b=>{L.push({text:`↳ ${stripEmoji(b.label)}`,bold:true,indent:'    '});b.items.forEach(it=>L.push({text:`• ${stripEmoji(it.text)}`,indent:'      '}));});
    L.push({text:''});
  });
  copyRichText(L);
}

function bCopyStageToClipboard(pid, sid) {
  const s=bFindS(pid,sid);if(!s)return;
  const path=bFindP(pid);
  const si=path?path.stages.findIndex(x=>x.id===sid):-1;
  const L=[];
  L.push({text:`${si>=0?'阶段 '+(si+1)+'：':''}${stripEmoji(s.title)}`,bold:true});
  L.push({text:''});
  if(s.actions.length){L.push({text:'用户操作：',bold:true});s.actions.forEach((a,i)=>L.push({text:`${i+1}. ${stripEmoji(a.text)}`,indent:'  '}));}
  if(s.feedbacks.length){L.push({text:'系统反馈：',bold:true});s.feedbacks.forEach(f=>L.push({text:`• ${stripEmoji(f.text)}`,indent:'  '}));}
  s.branches.forEach(b=>{L.push({text:`↳ ${stripEmoji(b.label)}`,bold:true});b.items.forEach(it=>L.push({text:`• ${stripEmoji(it.text)}`,indent:'  '}));});
  copyRichText(L);
}

function cCopyPage(pgId) {
  const pg=cFindPage(pgId);if(!pg)return;
  const L=[];
  L.push({text:`【页面架构】${stripEmoji(pg.pageName)}`,bold:true});
  L.push({text:''});
  function printNode(n,indent){
    L.push({text:`├─ ${stripEmoji(n.label)}${n.note?' ('+stripEmoji(n.note)+')':''}`,indent});
    (n.children||[]).forEach(c=>printNode(c,indent+'  '));
  }
  pg.nodes.forEach(n=>printNode(n,''));
  copyRichText(L);
}

function dCopySpec(spId) {
  const sp=dFindSpec(spId);if(!sp)return;
  const L=[];
  L.push({text:`【交互稿】${stripEmoji(sp.specName)}`,bold:true});
  L.push({text:''});
  if(sp.visible&&sp.visible.length){L.push({text:'界面规格：',bold:true});sp.visible.forEach(v=>L.push({text:`• ${stripEmoji(v.text)}`,indent:'  '}));L.push({text:''});}
  if(sp.interactions&&sp.interactions.length){L.push({text:'交互层：',bold:true});sp.interactions.forEach(it=>L.push({text:`• ${stripEmoji(it.text)}`,indent:'  '}));L.push({text:''});}
  if(sp.boundaries&&sp.boundaries.length){
    L.push({text:'系统边界：',bold:true});
    sp.boundaries.forEach(b=>{
      L.push({text:`【${stripEmoji(b.type)}】`,bold:true,indent:'  '});
      L.push({text:safePrefix('触发：',b.trigger),indent:'    '});
      L.push({text:safePrefix('反馈：',b.feedback),indent:'    '});
      L.push({text:safePrefix('恢复：',b.recovery),indent:'    '});
    });
    L.push({text:''});
  }
  copyRichText(L);
}

// Mode B helpers
function bFindP(id){return store.B.find(p=>p.id===id);}
function bFindS(pid,sid){const p=bFindP(pid);return p?p.stages.find(s=>s.id===sid):null;}
function bToggle(id){const p=bFindP(id);if(p)p.collapsed=!p.collapsed;renderAll();}
function bAddPath(){const nId=nid();store.B.push({id:nId,title:'新行为路径',startPoint:'',collapsed:false,stages:[{id:nid(),title:'新阶段',actions:[{id:nid(),text:''}],feedbacks:[],branches:[]}]});save();renderAll();toast('已新增路径');focusEl(`[data-f="b-title"][data-i="${nId}"]`);}
function bDelPath(id){store.B=store.B.filter(p=>p.id!==id);save();renderAll();toast('已删除');}
function bAddStage(pid){const p=bFindP(pid);if(p){const nId=nid();p.stages.push({id:nId,title:'新阶段',actions:[{id:nid(),text:''}],feedbacks:[],branches:[]});save();renderAll();toast('已新增');focusEl(`[data-f="b-stitle"][data-i="${nId}"]`);}}
function bDelStage(pid,sid){const p=bFindP(pid);if(p){p.stages=p.stages.filter(s=>s.id!==sid);save();renderAll();toast('已删除');}}
function bCopyStage(pid,sid){
  const p=bFindP(pid);if(!p)return;
  const s=bFindS(pid,sid);if(!s)return;
  const idx=p.stages.findIndex(x=>x.id===sid);
  function deepClone(obj){return JSON.parse(JSON.stringify(obj));}
  function reId(obj){
    if(Array.isArray(obj))return obj.map(reId);
    if(obj&&typeof obj==='object'){const n={};for(const k in obj){n[k]=k==='id'?nid():reId(obj[k]);}return n;}
    return obj;
  }
  const copy=reId(deepClone(s));copy.title=s.title+' (副本)';
  p.stages.splice(idx+1,0,copy);save();renderAll();toast('阶段已复制');
}
function bAddStep(pid,sid,type){const s=bFindS(pid,sid);if(s){const nId=nid();s[type].push({id:nId,text:''});save();renderAll();toast('已新增');focusEl(`[data-f="b-step"][data-i="${nId}"]`);}}
function bDelStep(pid,sid,type,id){const s=bFindS(pid,sid);if(s){s[type]=s[type].filter(x=>x.id!==id);save();renderAll();toast('已删除');}}
function bAddBranch(pid,sid){const s=bFindS(pid,sid);if(s){const nId=nid();s.branches.push({id:nId,label:'',items:[{id:nid(),text:''}]});save();renderAll();toast('已新增');focusEl(`[data-f="b-blabel"][data-i="${nId}"]`);}}
function bDelBranch(pid,sid,bid){const s=bFindS(pid,sid);if(s){s.branches=s.branches.filter(b=>b.id!==bid);save();renderAll();toast('已删除');}}
function bAddBItem(pid,sid,bid){const s=bFindS(pid,sid);const b=s?.branches.find(x=>x.id===bid);if(b){const nId=nid();b.items.push({id:nId,text:''});save();renderAll();toast('已新增');focusEl(`[data-f="b-bitem"][data-i="${nId}"]`);}}
function bDelBItem(pid,sid,bid,iid){const s=bFindS(pid,sid);const b=s?.branches.find(x=>x.id===bid);if(b){b.items=b.items.filter(x=>x.id!==iid);save();renderAll();toast('已删除');}}

// FB Popover (反馈与边界条件浮层)
let fbPopoverState = null; // { pid, sid }
function openFbPopover(pid, sid) {
  fbPopoverState = { pid, sid };
  renderFbPopover();
}
function closeFbPopover() {
  fbPopoverState = null;
  const ol = document.getElementById('fbPopoverOverlay');
  if (ol) ol.remove();
}
function renderFbPopover() {
  const ol = document.getElementById('fbPopoverOverlay');
  if (ol) ol.remove();
  if (!fbPopoverState) return;
  const { pid, sid } = fbPopoverState;
  const path = bFindP(pid); if (!path) return;
  const stageIdx = path.stages.findIndex(s => s.id === sid);
  if (stageIdx < 0) return;
  const stage = path.stages[stageIdx];

  const tabsHtml = path.stages.map((s, i) =>
    `<div class="fb-stage-tab ${s.id === sid ? 'active' : ''}" onclick="switchFbPopoverStage('${pid}','${s.id}')">${i+1}. ${esc(s.title.length>12?s.title.slice(0,12)+'…':s.title)}</div>`
  ).join('');

  const feedbacksHtml = stage.feedbacks.map(f => `
    <li class="step-item"><span class="step-num">•</span>
      <span class="step-content editable" contenteditable="true" data-f="b-step" data-i="${f.id}" data-s="${stage.id}" data-p="${pid}" data-t="feedbacks">${esc(f.text)}</span>
      <button class="step-del" onclick="bDelStep('${pid}','${stage.id}','feedbacks','${f.id}');renderFbPopover()">✕</button>
    </li>`).join('');

  const branchesHtml = stage.branches.map(b => `
    <div class="branch">
      <div class="branch-header">
        <span style="color:var(--orange);">👉</span>
        <span class="branch-title editable" contenteditable="true" data-f="b-blabel" data-i="${b.id}" data-s="${stage.id}" data-p="${pid}">${esc(b.label)}</span>
        <button class="step-del" onclick="bDelBranch('${pid}','${stage.id}','${b.id}');renderFbPopover()">✕</button>
      </div>
      ${b.items.map(it=>`<div class="branch-item"><span class="bullet">•</span>
        <span class="editable" contenteditable="true" style="flex:1" data-f="b-bitem" data-i="${it.id}" data-b="${b.id}" data-s="${stage.id}" data-p="${pid}">${esc(it.text)}</span>
        <button class="step-del" onclick="bDelBItem('${pid}','${stage.id}','${b.id}','${it.id}');renderFbPopover()">✕</button>
      </div>`).join('')}
      <button class="add-btn" onclick="bAddBItemInPopover('${pid}','${stage.id}','${b.id}')">+ 新增分支项</button>
    </div>`).join('');

  const html = `<div class="fb-popover-overlay" id="fbPopoverOverlay" onclick="if(event.target===this)closeFbPopover()">
    <div class="fb-popover">
      <div class="fb-popover-head">
        <h3>🔄 反馈与边界条件</h3>
        <button class="fb-popover-close" onclick="closeFbPopover()">✕</button>
      </div>
      <div class="fb-stage-tabs">${tabsHtml}</div>
      <div class="fb-popover-body">
        <div class="feedback-block" style="margin-bottom:10px;">
          <div class="block-label" style="display:flex;align-items:center;justify-content:space-between;">
            <span>💻 系统反馈</span>
            <button class="add-inline-btn" onclick="bAddStepInPopover('${pid}','${stage.id}','feedbacks')">＋新增反馈</button>
          </div>
          <ul class="step-list">${feedbacksHtml}</ul>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--orange);margin-bottom:6px;">👉 分支条件</div>
        ${branchesHtml}
        <button class="add-btn" onclick="bAddBranchInPopover('${pid}','${stage.id}')">+ 新增分支</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  bindEditableInPopover();
}
function switchFbPopoverStage(pid, sid) {
  fbPopoverState = { pid, sid };
  renderFbPopover();
}
function bAddStepInPopover(pid, sid, type) {
  const s = bFindS(pid, sid); if (!s) return;
  const nId = nid(); s[type].push({id:nId, text:''});
  save(); renderFbPopover();
  requestAnimationFrame(() => {
    const el = document.querySelector(`#fbPopoverOverlay [data-f="b-step"][data-i="${nId}"]`);
    if (el) { el.focus(); const r=document.createRange(),sel=window.getSelection(); r.selectNodeContents(el); r.collapse(false); sel.removeAllRanges(); sel.addRange(r); }
  });
}
function bAddBranchInPopover(pid, sid) {
  const s = bFindS(pid, sid); if (!s) return;
  const nId = nid(); s.branches.push({id:nId, label:'', items:[{id:nid(), text:''}]});
  save(); renderFbPopover();
}
function bAddBItemInPopover(pid, sid, bid) {
  const s = bFindS(pid, sid); const b = s?.branches.find(x=>x.id===bid); if (!b) return;
  const nId = nid(); b.items.push({id:nId, text:''});
  save(); renderFbPopover();
}
function bindEditableInPopover() {
  // 使浮层内 editable 在 blur 时也能触发统一编辑处理
  requestAnimationFrame(() => {
    document.querySelectorAll('#fbPopoverOverlay .editable').forEach(el => {
      el.onblur = onBlur;
    });
    // 阶段 Tab 区支持鼠标滚轮横向滚动
    const tabs = document.querySelector('#fbPopoverOverlay .fb-stage-tabs');
    if (tabs) {
      tabs.addEventListener('wheel', e => {
        if (e.deltaY !== 0) {
          e.preventDefault();
          tabs.scrollLeft += e.deltaY;
        }
      }, { passive: false });
    }
  });
}

function renderC() {
  const el = document.getElementById('panelC');
  if (!store.C || store.C.length === 0) {
    el.innerHTML = renderEmptyState();
    return;
  }
  el.innerHTML = store.C.map(page => `
    <div class="card" data-page="${page.id}">
      <div class="card-header">
        <span class="drag-handle">⠿</span>
        <div class="info">
          <div class="title">🏗️ <span class="editable" contenteditable="true" data-f="c-page" data-i="${page.id}">${esc(page.pageName)}</span></div>
          ${renderBackRefTags(page.id)}
        </div>
        <div class="actions">
          <button onclick="cCopyPage('${page.id}')" title="复制页面内容" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">⎘</button>
          <button class="add-inline-btn" onclick="cAddNode('${page.id}',null)">＋节点</button>
          <button class="del-btn" onclick="if(confirm('删除该页面架构？'))cDelPage('${page.id}')" title="删除页面">🗑</button>
          <button onclick="cToggle('${page.id}')">${page.collapsed?'▶':'▼'}</button>
        </div>
      </div>
      <div class="card-body ${page.collapsed?'collapsed':''}">
        <div class="tree-node root">${page.nodes.map(n=>renderCNode(page.id,n)).join('')}</div>
        <button class="add-btn" onclick="cAddNode('${page.id}',null)">+ 新增根节点</button>
      </div>
    </div>`).join('') +
    '<div style="display:flex;align-items:center;gap:8px;margin-top:12px;"><button class="add-btn" style="flex:1;" onclick="cAddPage()">+ 新增页面架构</button></div>';
}

function renderCNode(pageId,node,depth) {
  depth = depth||0;
  return `<div class="tree-node" style="${depth===0?'margin-left:0;':''}">
    <div class="node-row">
      <span class="node-icon">${node.icon||'├─'}</span>
      <span class="node-label editable" contenteditable="true" data-f="c-label" data-i="${node.id}" data-pg="${pageId}">${esc(node.label)}</span>
      ${node.note?`<span class="node-note">(${esc(node.note)})</span>`:''}
      <span class="node-actions">
        <button onclick="cAddNode('${pageId}','${node.id}')" title="添加子节点">＋</button>
        <button onclick="cEditNote('${pageId}','${node.id}')" title="编辑备注">📝</button>
        <button class="del-btn" onclick="cDelNode('${pageId}','${node.id}')" title="删除">✕</button>
      </span>
    </div>
    ${(node.children||[]).map(c=>renderCNode(pageId,c,depth+1)).join('')}
  </div>`;
}

// Mode C helpers
function cFindPage(id){return store.C.find(p=>p.id===id);}
function cFindNode(nodes,id){
  for(const n of nodes){if(n.id===id)return n;const r=cFindNode(n.children||[],id);if(r)return r;}return null;
}
function cFindParent(nodes,id){
  for(const n of nodes){if((n.children||[]).some(c=>c.id===id))return n;const r=cFindParent(n.children||[],id);if(r)return r;}return null;
}
function cToggle(id){const p=cFindPage(id);if(p)p.collapsed=!p.collapsed;renderAll();}
function cAddPage(){const nId=nid();store.C.push({id:nId,pageName:'',collapsed:false,nodes:[{id:nid(),icon:'📌',label:'',note:'',children:[]}]});save();renderAll();toast('已新增');focusEl(`[data-f="c-page"][data-i="${nId}"]`);}
function cDelPage(id){store.C=store.C.filter(p=>p.id!==id);save();renderAll();toast('已删除');}
function cAddNode(pgId,parentId){
  const pg=cFindPage(pgId);if(!pg)return;
  const nId=nid();
  const newNode={id:nId,icon:'',label:'',note:'',children:[]};
  if(!parentId){pg.nodes.push(newNode);}
  else{const p=cFindNode(pg.nodes,parentId);if(p){if(!p.children)p.children=[];p.children.push(newNode);}}
  save();renderAll();toast('已新增');focusEl(`[data-f="c-label"][data-i="${nId}"]`);
}
function cDelNode(pgId,nodeId){
  const pg=cFindPage(pgId);if(!pg)return;
  function del(arr){return arr.filter(n=>{if(n.id===nodeId)return false;n.children=del(n.children||[]);return true;});}
  pg.nodes=del(pg.nodes);save();renderAll();toast('已删除');
}
function cEditNote(pgId,nodeId){
  const pg=cFindPage(pgId);if(!pg)return;
  const n=cFindNode(pg.nodes,nodeId);if(!n)return;
  const v=prompt('编辑设计依据/备注：',n.note||'');
  if(v===null)return;n.note=v;save();renderAll();toast('已更新');
}

// ============================================================
// onBlur — unified edit handler for all modes
// ============================================================
function onBlur(e) {
  const el = e.target, ds = el.dataset, v = el.textContent.trim();
  let ch = false;
  const f = ds.f;
  // Mode A
  if (f === 'a-main' || f === 'a-hidden') {
    const type = f === 'a-main' ? 'main' : 'hidden';
    const g = store.A.goals[type].find(x => x.id === ds.i);
    if (g && g.text !== v) { g.text = v; ch = true; }
  } else if (f === 'a-modname') {
    const m = store.A.modules.find(x => x.id === ds.i);
    if (m && m.name !== v) { m.name = v; ch = true; }
  } else if (f === 'a-feat') {
    const m = store.A.modules.find(x => x.id === ds.mod);
    const it = m?.features.find(x => x.id === ds.i);
    if (it && it.text !== v) { it.text = v; ch = true; }
  } else if (f === 'a-sug') {
    const m = store.A.modules.find(x => x.id === ds.mod);
    const s = m?.suggestions.find(x => x.id === ds.i);
    if (s && s.text !== v) { s.text = v; ch = true; }
  } else if (f === 'a-sugr') {
    const m = store.A.modules.find(x => x.id === ds.mod);
    const s = m?.suggestions.find(x => x.id === ds.i);
    if (s && s.reason !== v) { s.reason = v; ch = true; }
  }
  // Mode B
  else if (f === 'b-title') { const p = bFindP(ds.i); if (p && p.title !== v) { p.title = v; ch = true; } }
  else if (f === 'b-start') { const p = bFindP(ds.i); if (p && p.startPoint !== v) { p.startPoint = v; ch = true; } }
  else if (f === 'b-stitle') { const s = bFindS(ds.p, ds.i); if (s && s.title !== v) { s.title = v; ch = true; } }
  else if (f === 'b-step') {
    const s = bFindS(ds.p, ds.s); const it = s?.[ds.t]?.find(x => x.id === ds.i);
    if (it && it.text !== v) { it.text = v; ch = true; }
  }
  else if (f === 'b-blabel') {
    const s = bFindS(ds.p, ds.s); const b = s?.branches.find(x => x.id === ds.i);
    if (b && b.label !== v) { b.label = v; ch = true; }
  }
  else if (f === 'b-bitem') {
    const s = bFindS(ds.p, ds.s); const b = s?.branches.find(x => x.id === ds.b);
    const it = b?.items.find(x => x.id === ds.i);
    if (it && it.text !== v) { it.text = v; ch = true; }
  }
  // Mode C
  else if (f === 'c-page') { const pg = cFindPage(ds.i); if (pg && pg.pageName !== v) { pg.pageName = v; ch = true; } }
  else if (f === 'c-label') {
    const pg = cFindPage(ds.pg); const n = pg ? cFindNode(pg.nodes, ds.i) : null;
    if (n && n.label !== v) { n.label = v; ch = true; }
  }
  // Mode D
  else if (f === 'd-name') { const sp = dFindSpec(ds.i); if (sp && sp.specName !== v) { sp.specName = v; ch = true; } }
  else if (f === 'd-vis') { const sp = dFindSpec(ds.sp); const it = sp?.visible.find(x => x.id === ds.i); if (it && it.text !== v) { it.text = v; ch = true; } }
  else if (f === 'd-inter') { const sp = dFindSpec(ds.sp); const it = sp?.interactions?.find(x => x.id === ds.i); if (it && it.text !== v) { it.text = v; ch = true; } }
  else if (f === 'd-btype') { const sp = dFindSpec(ds.sp); const b = sp?.boundaries.find(x => x.id === ds.i); if (b && b.type !== v) { b.type = v; ch = true; } }
  else if (f === 'd-btrig') { const sp = dFindSpec(ds.sp); const b = sp?.boundaries.find(x => x.id === ds.i); if (b && b.trigger !== v) { b.trigger = v; ch = true; } }
  else if (f === 'd-bfeed') { const sp = dFindSpec(ds.sp); const b = sp?.boundaries.find(x => x.id === ds.i); if (b && b.feedback !== v) { b.feedback = v; ch = true; } }
  else if (f === 'd-brec') { const sp = dFindSpec(ds.sp); const b = sp?.boundaries.find(x => x.id === ds.i); if (b && b.recovery !== v) { b.recovery = v; ch = true; } }

  if (ch) { save(); toast('已保存'); }
}

function importJSON() {

      <button class="primary" onclick="doImport()">导入</button>

  document.body.appendChild(ov);

function doImport() {
  const ta = document.getElementById('importArea');
  try {
    const d = JSON.parse(ta.value);
    // 只有当导入数据有实质内容时才覆盖，避免空数组/空对象清除已有数据
    const hasContent = {
      A: d.A && (d.A.goals?.main?.length > 0 || d.A.goals?.hidden?.length > 0 || d.A.modules?.length > 0),
      B: d.B && Array.isArray(d.B) && d.B.length > 0,
      C: d.C && Array.isArray(d.C) && d.C.length > 0,
      D: d.D && Array.isArray(d.D) && d.D.length > 0
    };
    if (hasContent.A) store.A = d.A;
    if (hasContent.B) store.B = d.B;
    if (hasContent.C) store.C = d.C;
    if (hasContent.D) store.D = d.D;
    ensureRefs(); // 兼容无 refs 字段的旧数据
    // 保存导入快照用于后续对比（仅记录实际导入的模式）
    if (hasContent.A) importSnapshot.A = JSON.parse(JSON.stringify(store.A));
    if (hasContent.B) importSnapshot.B = JSON.parse(JSON.stringify(store.B));
    if (hasContent.C) importSnapshot.C = JSON.parse(JSON.stringify(store.C));
    if (hasContent.D) importSnapshot.D = JSON.parse(JSON.stringify(store.D));
    try { localStorage.setItem(SNAPSHOT_STORAGE_KEY, JSON.stringify(importSnapshot)); } catch(e) {}
    save(); renderAll();
    ta.closest('.modal-overlay').remove();
    const imported = ['A','B','C','D'].filter(k => hasContent[k]);
    toast(imported.length > 0 ? `导入成功（${imported.join('、')}）` : '导入的JSON中无有效数据');
  } catch (e) { toast('JSON 格式错误：' + e.message); }
}

// ====== 模块级导出 ======
const MODE_LABELS = { A: '策划案分析', B: '行为路径', C: '信息架构', D: '交互稿' };

function exportJsonModFull() {
  closeExportDropdown();
  const m = activeMode;
  const data = {};
  data[m] = store[m];
  showExportModal(`导出 ${MODE_LABELS[m]} 全部 JSON`, JSON.stringify(data, null, 2), 'json');
}

function exportJsonModDiff() {
  closeExportDropdown();
  const m = activeMode;
  const current = JSON.stringify(store[m]);
  const snapshot = JSON.stringify(importSnapshot[m] || (m === 'A' ? {} : []));

  if (current === snapshot) {
    toast('该模块无修改内容');
    return;
  }

  // 使用 diff 对比产出变更数据
  const diffResult = computeDiff(store[m], importSnapshot[m] || (m === 'A' ? {} : []), m);
  const data = {};
  data[m] = diffResult;
  showExportModal(`导出 ${MODE_LABELS[m]} 修改内容`, JSON.stringify(data, null, 2), 'json');
}

function computeDiff(current, original, mode) {
  // 对于数组类型 (B/C/D)，找出新增和修改的项
  if (Array.isArray(current)) {
    const origMap = {};
    (original || []).forEach(item => { if (item.id) origMap[item.id] = JSON.stringify(item); });
    const changed = [];
    current.forEach(item => {
      if (!item.id || !origMap[item.id]) {
        // 新增的项
        changed.push({ ...item, _diff: 'added' });
      } else if (origMap[item.id] !== JSON.stringify(item)) {
        // 修改过的项
        changed.push({ ...item, _diff: 'modified' });
      }
    });
    // 检测删除的项
    const curIds = new Set(current.map(item => item.id));
    (original || []).forEach(item => {
      if (item.id && !curIds.has(item.id)) {
        changed.push({ id: item.id, _diff: 'deleted', _original: item });
      }
    });
    return changed;
  }

  // 对于对象类型 (A)，逐字段对比
  if (typeof current === 'object' && current !== null) {
    const result = {};
    const allKeys = new Set([...Object.keys(current || {}), ...Object.keys(original || {})]);
    allKeys.forEach(key => {
      const curVal = JSON.stringify(current[key]);
      const origVal = JSON.stringify((original || {})[key]);
      if (curVal !== origVal) {
        result[key] = current[key];
      }
    });
    if (Object.keys(result).length === 0) return current;
    return result;
  }

  return current;
}

      <button onclick="this.closest('.modal-overlay').remove()">关闭</button>
      <button class="primary" onclick="navigator.clipboard.writeText(this.closest('.modal').querySelector('pre').textContent).then(()=>toast('已复制'))">复制</button>
      <button class="primary" onclick="dlFile(this,'${ext}')">下载</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

function dlFile(btn, ext) {
  const text = btn.closest('.modal').querySelector('pre').textContent;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `UX设计_${new Date().toISOString().slice(0, 10)}.${ext}`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已下载');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});
