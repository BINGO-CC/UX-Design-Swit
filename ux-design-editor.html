<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX 设计交互编辑器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* === 背景层级（Notion Dark）=== */
  --bg:#191919;
  --surface:#202020;
  --surface2:#2b2b2b;
  --surface3:#333333;
  --surface4:#3d3d3d;

  /* === 边框（极细，低对比）=== */
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --border3:rgba(255,255,255,0.20);

  /* === 文字（4级层次）=== */
  --text:rgba(255,255,255,0.87);
  --text2:rgba(255,255,255,0.50);
  --text3:rgba(255,255,255,0.28);
  --text4:rgba(255,255,255,0.14);

  /* === 强调色 === */
  --accent:#5f7fff;
  --accent2:#4a6ee0;
  --accent-dim:rgba(95,127,255,0.14);
  --accent-glow:rgba(95,127,255,0.20);

  /* === 语义色 === */
  --green:#4caf89;
  --green-dim:rgba(76,175,137,0.12);
  --green-glow:rgba(76,175,137,0.12);
  --orange:#e8a048;
  --orange-dim:rgba(232,160,72,0.12);
  --red:#e06b6b;
  --red-dim:rgba(224,107,107,0.12);
  --yellow:#c9963a;
  --yellow-dim:rgba(201,150,58,0.14);
  --purple:#9b87d4;
  --purple-dim:rgba(155,135,212,0.12);

  /* === 尺寸 === */
  --radius:8px;
  --radius-sm:5px;
  --radius-xs:3px;

  /* === 阴影 === */
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 28px rgba(0,0,0,0.55);
  --shadow-xl:0 16px 48px rgba(0,0,0,0.65);

  /* === 动效 === */
  --dur-fast:120ms;
  --dur-base:180ms;
  --dur-slow:280ms;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.65;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── Toolbar ── */
.toolbar{
  position:sticky;top:0;z-index:100;
  height:44px;
  background:rgba(25,25,25,0.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex;align-items:center;gap:8px;
}
.toolbar h1{
  font-size:14px;font-weight:600;
  margin-right:auto;
  letter-spacing:0.02em;
  color:var(--text);
  display:flex;align-items:center;gap:7px;
}
.toolbar h1 .brand-icon{color:var(--accent);flex-shrink:0;}
.toolbar button{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);
  background:transparent;color:var(--text2);
  cursor:pointer;font-size:12px;font-weight:500;
  transition:background var(--dur-fast),border-color var(--dur-fast),color var(--dur-fast);
  font-family:inherit;white-space:nowrap;
}
.toolbar button:hover{background:var(--surface3);border-color:var(--border3);color:var(--text);}
.toolbar button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.toolbar .sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}

/* ── Toolbar Tabs（内嵌在 Toolbar 内）── */
.toolbar-tabs{display:flex;align-items:center;gap:2px;margin-left:4px;}
.toolbar-tabs .mode-tab{font-size:13px;padding:4px 12px;}

/* ── Tab Bar（第二行：操作区）── */
.tab-bar{
  display:flex;align-items:center;
  height:38px;
  background:rgba(22,22,22,0.90);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  position:sticky;top:44px;z-index:99;
}
.tab-bar .actions-right{display:flex;align-items:center;gap:4px;}
.tab-bar .actions-right button{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);
  background:transparent;color:var(--text2);
  cursor:pointer;font-size:12px;font-weight:500;
  transition:background var(--dur-fast),border-color var(--dur-fast),color var(--dur-fast);
  white-space:nowrap;font-family:inherit;
}
.tab-bar .actions-right button:hover{background:var(--surface3);border-color:var(--border3);color:var(--text);}
.tab-bar .actions-right button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.tab-bar .actions-right .sep{width:1px;height:16px;background:var(--border);flex-shrink:0;}
.undo-redo{display:flex;gap:2px;}
.undo-redo button{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);
  background:transparent;color:var(--text2);
  cursor:pointer;font-size:12px;font-weight:500;
  transition:background var(--dur-fast),border-color var(--dur-fast),color var(--dur-fast);
  font-family:inherit;
}
.undo-redo button:hover{background:var(--surface3);border-color:var(--border3);color:var(--text);}
.undo-redo button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.undo-redo button:disabled{opacity:.28;cursor:not-allowed;}
.undo-redo button:disabled:hover{background:transparent;border-color:var(--border2);color:var(--text2);}

/* ── Dropdown ── */
.dropdown{position:relative;display:inline-block;}
.dropdown-menu{
  display:none;position:absolute;top:100%;right:0;margin-top:5px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  z-index:200;min-width:210px;overflow:hidden;
  padding:3px;
}
.dropdown-menu button{
  display:flex;align-items:center;width:100%;
  padding:8px 13px;border:none;border-radius:var(--radius-sm);
  background:transparent;color:var(--text);font-size:13px;
  text-align:left;cursor:pointer;
  transition:background var(--dur-fast),color var(--dur-fast);
  font-family:inherit;
}
.dropdown-menu button:hover{background:var(--surface3);color:var(--text);}
.dropdown-menu button.disabled{opacity:.3;cursor:not-allowed;}
.dropdown-menu button.disabled:hover{background:transparent;}
.dropdown.open .dropdown-menu{display:block;}

/* ── Mode Tabs ── */
.mode-tab{
  padding:5px 13px;cursor:pointer;
  font-size:13px;font-weight:500;
  color:var(--text2);border-radius:var(--radius-sm);
  transition:background var(--dur-fast),color var(--dur-fast);
  white-space:nowrap;letter-spacing:0.01em;
  line-height:1.5;
}
.mode-tab:hover{background:var(--surface2);color:var(--text);}
.mode-tab.active{background:var(--surface3);color:var(--text);font-weight:600;}

/* ── Container ── */
.container{max-width:900px;margin:0 auto;padding:20px 20px 60px;}
.mode-panel{display:none;}
.mode-panel.active{display:block;}

/* ── Editable ── */
.editable{
  cursor:text;padding:2px 4px;border-radius:var(--radius-xs);
  transition:background var(--dur-fast),box-shadow var(--dur-fast),border-color var(--dur-fast);
  outline:none;min-height:1.65em;
  border-bottom:1px solid transparent;
}
.editable:hover{background:var(--surface2);}
.editable:focus,.editable:focus-visible{
  background:rgba(95,127,255,0.06);
  box-shadow:0 0 0 1.5px var(--accent);
  border-bottom-color:var(--accent);
}

/* ── Card ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,0.28);
  transition:border-color var(--dur-base),box-shadow var(--dur-base);
}
.card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,0.42);}
.card-header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
  cursor:pointer;
}
/* 卡片左侧色条 — Level 1 层级感 */
.card{border-left:3px solid var(--border2);}
.card:hover{border-left-color:var(--accent);}
.card-header .drag-handle{color:var(--text3);font-size:13px;cursor:grab;user-select:none;padding-top:3px;}
.card-header .info{flex:1;}
.card-header .title{font-size:14px;font-weight:600;color:var(--text);}
.card-header .meta{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;}
.card-header .actions{display:flex;gap:3px;}
.card-header .actions button{
  display:inline-flex;align-items:center;
  background:transparent;border:none;color:var(--text2);
  cursor:pointer;font-size:13px;padding:3px 6px;border-radius:var(--radius-xs);
  transition:background var(--dur-fast),color var(--dur-fast);
}
.card-header .actions button:hover{background:var(--surface3);color:var(--text);}
.card-header .actions button.del-btn{color:var(--red) !important;}
.card-header .actions button.del-btn:hover{background:var(--red-dim) !important;color:var(--red) !important;}
.card-body{padding:0 16px 14px;}
.card-body.collapsed{display:none;}

/* ── Stage (Mode B) ── */
.stage{
  margin-top:12px;
  border-left:2px solid var(--border3);
  padding-left:14px;position:relative;
}
.stage-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.stage-header .stage-title{font-weight:600;font-size:13px;flex:1;color:var(--text);}
.stage-header button{
  display:inline-flex;align-items:center;
  background:transparent;border:none;color:var(--text2);
  cursor:pointer;font-size:12px;padding:2px 6px;border-radius:var(--radius-xs);
  transition:background var(--dur-fast),color var(--dur-fast);font-family:inherit;
}
.stage-header button:hover{background:var(--surface3);color:var(--text);}

/* ── Action/Feedback blocks ── */
--action-bg: rgba(95,127,255,0.05);
--action-border: rgba(95,127,255,0.15);
.action-block,.feedback-block{margin:6px 0;padding:8px 11px;border-radius:var(--radius-sm);font-size:13px;}
.action-block{background:rgba(95,127,255,0.04);border:1px solid rgba(95,127,255,0.15);}
.feedback-block{background:var(--green-dim);border:1px solid rgba(76,175,137,0.18);}
.block-label{font-size:10px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;letter-spacing:0.05em;text-transform:uppercase;}
.action-block .block-label{color:var(--accent);}
.feedback-block .block-label{color:var(--green);}

/* ── 新增条目淡入动画 ── */
@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;transform:translateY(0);}
}
.step-item,.sug-item,.bound-item,.branch,.d-area-block,.d-flow-block,.node-row{
  animation:fadeSlideIn var(--dur-base) var(--ease) both;
}

/* ── Step items ── */
.step-list{list-style:none;}
.step-item{display:flex;align-items:flex-start;gap:7px;padding:3px 0;}
.step-item .step-num{color:var(--text3);font-size:11px;min-width:18px;text-align:right;padding-top:3px;}
.step-item .step-drag{cursor:grab;color:var(--text3);font-size:11px;padding-top:3px;user-select:none;}
.step-item .step-content{flex:1;font-size:13px;line-height:1.65;}
.step-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;padding:4px 7px;min-height:28px;min-width:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-xs);opacity:0;transition:opacity var(--dur-fast),background var(--dur-fast);line-height:1;}
.step-del:hover{opacity:1;background:var(--red-dim);}
.step-item:hover .step-del{opacity:0.5;}
.sug-item .step-del{position:absolute;top:6px;right:6px;}
.sug-item:hover .step-del{opacity:0.5;}
.bound-item > .step-del{position:absolute;top:7px;right:7px;}
.bound-item:hover > .step-del{opacity:0.5;}
.branch-header:hover .step-del{opacity:0.5;}
.branch-item:hover .step-del{opacity:0.5;}

/* ── FB wrapper (Mode B legacy) ── */
.fb-wrapper{margin:6px 0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.fb-wrapper-header{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--surface2);cursor:pointer;user-select:none;font-size:12px;font-weight:600;color:var(--purple);}
.fb-wrapper-header:hover{background:var(--surface3);}
.fb-wrapper-header .fb-toggle{font-size:10px;transition:transform var(--dur-base);}
.fb-wrapper-body{padding:4px 10px 10px;}
.fb-wrapper-body.collapsed{display:none;}

/* ── Branch ── */
.branch{margin:6px 0;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);}
.branch-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.branch-header .branch-title{font-weight:600;font-size:13px;color:var(--orange);flex:1;}
.branch-header button{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:var(--radius-xs);}
.branch-header button:hover{background:var(--red-dim);}
.branch-header:hover .step-del{opacity:0.5;}
.branch-item{display:flex;gap:5px;padding:2px 0;font-size:13px;}
.branch-item .bullet{color:var(--text3);min-width:14px;}

/* ── Tree node (Mode C) ── */
.tree-node{margin-left:20px;border-left:1px dashed var(--border2);padding-left:12px;margin-top:6px;}
.tree-node.root{margin-left:0;border-left:none;padding-left:0;}
.node-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:var(--radius-xs);transition:background var(--dur-fast);}
.node-row:hover{background:var(--surface2);}
.node-icon{font-size:14px;min-width:20px;text-align:center;}
.node-label{flex:1;font-size:13px;}
.node-note{font-size:12px;color:var(--text2);font-style:italic;}
.node-actions button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:2px 4px;opacity:0;transition:opacity var(--dur-fast);}
.node-row:hover .node-actions button{opacity:1;}
.node-actions button:hover{color:var(--accent);}
.node-actions button.del-btn{color:var(--red);}
.node-actions button.del-btn:hover{color:var(--red);background:var(--red-dim);}

/* ── Spec section (Mode D) ── */
.spec-section{margin-top:12px;border-radius:var(--radius-sm);overflow:hidden;}
.spec-section-header{
  padding:9px 13px;font-weight:600;font-size:11px;
  letter-spacing:0.05em;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;user-select:none;
}
.spec-section-header.visible{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,137,0.2);border-radius:var(--radius-sm) var(--radius-sm) 0 0;}
.spec-section-header.interact{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(95,127,255,0.2);border-radius:var(--radius-sm) var(--radius-sm) 0 0;}
.spec-section-header.boundary{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,107,107,0.2);border-radius:var(--radius-sm) var(--radius-sm) 0 0;}
.spec-section.collapsed .spec-section-header{border-radius:var(--radius-sm);}
.spec-section.collapsed .spec-section-body{display:none;}
.spec-section-header .sec-toggle-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:2px 5px;color:inherit;display:inline-flex;align-items:center;}
.spec-section-header .sec-actions{margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.spec-section-header .sec-copy-btn{background:none;border:none;color:inherit;cursor:pointer;font-size:12px;padding:2px 5px;border-radius:var(--radius-xs);opacity:.5;transition:opacity var(--dur-fast);}
.spec-section-header .sec-copy-btn:hover{opacity:1;}
.spec-section-body{padding:10px 13px;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);background:var(--surface);}
/* 区块底板与标题同色系 */
.spec-section-header.visible + .spec-section-body{background:rgba(76,175,137,0.04);border-color:rgba(76,175,137,0.18);}
.spec-section-header.interact + .spec-section-body{background:rgba(95,127,255,0.04);border-color:rgba(95,127,255,0.18);}
.spec-section-header.boundary + .spec-section-body{background:rgba(224,107,107,0.04);border-color:rgba(224,107,107,0.18);}

/* ── Module priority (Mode A) ── */
.module-priority{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
}
.module-priority.high{background:var(--red-dim);color:var(--red);}
.module-priority.mid{background:var(--yellow-dim);color:var(--yellow);}
.module-priority.low{background:var(--green-dim);color:var(--green);}

/* ── Add btn ── */
.add-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:6px 10px;margin-top:8px;
  background:transparent;
  border:1px dashed var(--border2);
  border-radius:var(--radius-sm);
  color:var(--text4);cursor:pointer;font-size:0;
  transition:border-color var(--dur-fast),color var(--dur-fast),background var(--dur-fast);
  width:100%;font-family:inherit;
}
.add-btn::before{content:'＋';font-size:14px;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

/* ── Annotation ── */
.anno{display:inline-flex;align-items:center;gap:3px;background:var(--yellow-dim);border:1px solid rgba(201,150,58,0.28);border-radius:var(--radius-xs);padding:1px 7px;font-size:11px;color:var(--yellow);margin-left:6px;cursor:pointer;}
.anno-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;padding:2px 4px;opacity:0;transition:opacity var(--dur-fast);}
.step-item:hover .anno-btn,.node-row:hover .anno-btn,.card-header:hover .anno-btn{opacity:1;}
.anno-btn:hover{color:var(--yellow);}
.anno-input{background:var(--bg);border:1px solid var(--yellow);border-radius:var(--radius-xs);padding:3px 7px;font-size:11px;color:var(--text);width:150px;outline:none;}

/* ── Reference Tags ── */
.ref-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.ref-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;cursor:pointer;transition:background var(--dur-fast),color var(--dur-fast);border:1px solid var(--border2);background:var(--surface2);color:var(--accent);}
.ref-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.ref-tag.changed{color:var(--orange);border-color:var(--orange-dim);background:var(--orange-dim);}
.ref-tag.changed:hover{background:var(--orange);color:#fff;border-color:var(--orange);}
.ref-tag.deleted{color:var(--red);border-color:var(--red-dim);background:var(--red-dim);text-decoration:line-through;cursor:default;}
.ref-tag .ref-mode{font-weight:700;opacity:.65;}
.back-ref-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;align-items:center;}
.back-ref-label{font-size:11px;color:var(--text2);}
.back-ref-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:11px;cursor:pointer;transition:background var(--dur-fast),color var(--dur-fast);color:var(--text2);background:var(--surface2);border:1px solid var(--border);}
.back-ref-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.ref-link-btn{display:inline-flex;align-items:center;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:var(--radius-xs);transition:background var(--dur-fast),color var(--dur-fast),border-color var(--dur-fast);}
.ref-link-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
/* Ref highlight */
.ref-highlight{animation:refFlash 0.5s ease-in-out 3;}
@keyframes refFlash{0%,100%{box-shadow:0 0 0 2px transparent;}50%{box-shadow:0 0 0 2px var(--accent);}}
/* Ref modal */
.ref-modal-list{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);padding:3px;}
.ref-modal-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;transition:background var(--dur-fast);}
.ref-modal-item:hover{background:var(--surface2);}
.ref-modal-item input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;}
.ref-modal-item .ref-modal-label{flex:1;color:var(--text);}
.ref-modal-item .ref-modal-id{font-size:11px;color:var(--text2);font-family:monospace;}

/* ── Drag & Drop ── */
.dragging{opacity:.35;transform:scale(.98);box-shadow:var(--shadow-md);}
.drag-over{
  border:2px dashed var(--accent) !important;
  background:var(--accent-dim) !important;
  box-shadow:0 0 0 3px var(--accent-glow) !important;
  transform:scale(1.005);
  transition:transform var(--dur-fast),box-shadow var(--dur-fast) !important;
}
.drag-handle{cursor:grab;user-select:none;}
.drag-handle:active{cursor:grabbing;}

/* ── Storage indicator ── */
.storage-status{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px;font-weight:500;}
.storage-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.storage-dot.unsaved{background:var(--orange);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── SVG Icon Utilities ── */
button svg{display:block;flex-shrink:0;pointer-events:none;}
.drag-handle{display:inline-flex;align-items:center;justify-content:center;}
.sec-toggle-btn{display:inline-flex;align-items:center;justify-content:center;}
.node-actions button{display:inline-flex;align-items:center;}
.card-header .actions button{display:inline-flex;align-items:center;}

/* ── Modal utilities ── */
.modal-sm{max-width:480px;}
.modal-md{max-width:500px;}
.modal-lg{max-width:600px;}
.modal-xl{max-width:640px;}
/* Modal 内语义布局 */
.modal-section{margin-bottom:14px;}
.modal-section-title{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text);}
.modal-empty{padding:12px;color:var(--text2);font-size:13px;}
.modal-hint{font-size:12px;color:var(--text2);margin-bottom:12px;}
.modal-hint strong.hl-orange{color:var(--orange);}
.modal-hint strong.hl-text{color:var(--text);}
.modal-hint strong.hl-red{color:var(--red);}
.modal-h2{display:flex;align-items:center;gap:7px;}
/* 变更详情列表 */
.ref-change-list{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px;max-height:250px;overflow-y:auto;}
.ref-change-list-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.ref-change-item{display:flex;gap:6px;align-items:flex-start;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border);}
.ref-change-item-icon{font-size:14px;min-width:18px;}
.ref-change-item-text{color:var(--text);flex:1;}
.ref-change-empty{font-size:13px;color:var(--text2);}
/* 进度条 */
.progress-bar-wrap{display:flex;align-items:center;gap:8px;}
.progress-bar-track{flex:1;height:8px;background:var(--surface);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .3s;}
.progress-bar-fill.green{background:var(--green);}
.progress-bar-fill.yellow{background:var(--yellow);}
.progress-bar-fill.red{background:var(--red);}
.progress-bar-label{font-size:12px;font-weight:600;min-width:70px;text-align:right;}
.progress-bar-label.green{color:var(--green);}
.progress-bar-label.yellow{color:var(--yellow);}
.progress-bar-label.red{color:var(--red);}
/* 覆盖率报告 */
.cov-section{margin-bottom:18px;}
.cov-section-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.cov-section-title.red{color:var(--red);}
.cov-section-title.green{color:var(--green);}
.cov-section-empty{font-size:13px;color:var(--text2);padding:8px;}
.cov-list{margin-top:8px;max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:4px;}
.cov-list-row{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;font-size:13px;border-bottom:1px solid var(--border);}
.cov-list-icon{min-width:20px;}
.cov-list-text{flex:1;color:var(--text);}
.cov-list-unlinked{color:var(--orange);}
.cov-list-changed{color:var(--orange);font-size:11px;}
.cov-orphan-box{border:1px solid rgba(224,107,107,0.3);border-radius:6px;background:rgba(224,107,107,0.05);padding:4px;}
.cov-orphan-row{display:flex;align-items:center;gap:6px;padding:5px 8px;font-size:13px;border-bottom:1px solid var(--border);}
.cov-orphan-mode{min-width:20px;font-weight:600;color:var(--text2);}
.cov-orphan-label{flex:1;color:var(--text);}
.cov-orphan-miss{font-size:11px;color:var(--orange);}
.modal-scroll-body{max-height:65vh;overflow-y:auto;padding-right:8px;}
/* 覆盖率报告弹窗内的二次确认 */
.confirm-modal-text{font-size:13px;color:var(--text2);line-height:1.7;margin:0 0 18px;}
/* 分享面板 */
.share-modal-label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}
.share-modal-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;box-sizing:border-box;outline:none;transition:border-color var(--dur-fast);}
.share-modal-input:focus{border-color:var(--accent);}
.share-modal-row{margin-bottom:8px;}
.share-checkbox-row{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);margin-bottom:10px;}
/* Mode A 模块内容块 */
.mod-section-title{font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.mod-section-title.accent{color:var(--accent);}
.mod-section-title.green{color:var(--green);}
.sug-item-wrap{margin:5px 0;padding:7px 28px 7px 10px;border-radius:5px;background:rgba(76,175,137,0.06);border:1px solid rgba(76,175,137,0.15);position:relative;}
.sug-reason{font-size:12px;color:var(--text2);margin-top:3px;}
/* Mode B 内联按钮（copy/delete 统一 ghost 样式）*/
.icon-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:2px 5px;border-radius:var(--radius-xs);display:inline-flex;align-items:center;transition:color var(--dur-fast),background var(--dur-fast);}
.icon-btn:hover{color:var(--accent);background:var(--accent-dim);}
.icon-btn.danger{color:var(--red);}
.icon-btn.danger:hover{color:var(--red);background:var(--red-dim);}
/* Mode D 区块（area/flow/boundary）*/
.d-area-block{margin:6px 0;padding:8px 28px 8px 10px;border-radius:5px;border:1px solid rgba(76,175,137,0.15);background:rgba(76,175,137,0.04);position:relative;}
.d-area-title{font-weight:600;font-size:13px;color:var(--accent);}
.d-area-list{margin-top:4px;}
.d-area-item-row{display:flex;align-items:baseline;gap:4px;padding:3px 0;}
.d-area-item-label{font-weight:600;flex-shrink:0;}
.d-area-item-sep{flex-shrink:0;color:var(--text2);}
.d-area-item-desc{flex:1;}
.d-flow-block{margin:6px 0;padding:8px 28px 8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-raised);position:relative;}
/* flows 区块内：绿色系；boundaries 区块内：红色系 */
.spec-section-header.interact + .spec-section-body .d-flow-block{background:rgba(95,127,255,0.05);border-color:rgba(95,127,255,0.2);}
.spec-section-header.boundary + .spec-section-body .d-flow-block{background:rgba(224,107,107,0.05);border-color:rgba(224,107,107,0.2);}
.d-flow-title{font-weight:600;font-size:13px;color:var(--accent);display:flex;align-items:center;}
.d-flow-meta{font-size:13px;margin-top:3px;}
.d-flow-meta-row{margin-top:2px;}
.d-flow-steps-title{font-size:13px;margin-top:4px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.d-flow-steps-list{margin-top:2px;}
.d-exception-wrap{margin-top:6px;padding-top:6px;border-top:1px dashed rgba(224,107,107,0.25);}
.d-exception-header{font-size:12px;font-weight:600;color:var(--orange);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
.d-exception-item{margin:4px 0 0 12px;padding:6px 8px;border-radius:4px;border:1px solid rgba(224,107,107,0.2);background:rgba(224,107,107,0.04);}
.d-exception-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.d-exception-title{font-weight:600;font-size:12px;color:var(--red);flex:1;}
.d-exception-del{background:none;border:none;color:var(--red);cursor:pointer;padding:2px 4px;flex-shrink:0;display:inline-flex;align-items:center;border-radius:var(--radius-xs);opacity:0.6;transition:opacity var(--dur-fast),background var(--dur-fast);}
.d-exception-del:hover{opacity:1;background:var(--red-dim);}
.d-exception-field{font-size:12px;margin-top:2px;display:flex;align-items:flex-start;}
.d-exception-field-label{flex-shrink:0;}
.d-exception-field-val{flex:1;}
.d-boundary-block{margin:6px 0;padding:8px 28px 8px 10px;border-radius:5px;border:1px solid rgba(224,107,107,0.15);background:rgba(224,107,107,0.04);position:relative;}
.d-boundary-title{font-weight:600;font-size:13px;color:var(--red);}
.d-boundary-field{font-size:13px;margin-top:3px;display:flex;align-items:flex-start;}
.d-boundary-field-label{flex-shrink:0;}
.d-boundary-field-val{flex:1;}
/* FB Popover 内部区块增强 */
.fb-section{margin-top:8px;}
.fb-section-title{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:6px 10px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;display:flex;align-items:center;justify-content:space-between;}
.fb-section-title.feedback{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,137,0.2);}
.fb-section-title.branch{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(232,160,72,0.2);}
.fb-section-body{padding:6px 10px 10px;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);background:var(--surface2);}
/* 反向引用 label */
.back-ref-label{display:inline-flex;align-items:center;gap:3px;}
/* 树节点 depth=0 */
.tree-node-root{margin-left:0;}

/* ── prefers-reduced-motion ── */
@media (prefers-reduced-motion: reduce) {
  *{transition:none !important;animation:none !important;}
}

/* ── Context menu ── */
.ctx-menu{position:fixed;z-index:250;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:3px;min-width:170px;box-shadow:var(--shadow-lg);}
.ctx-menu button{display:flex;align-items:center;gap:7px;width:100%;padding:7px 11px;background:none;border:none;color:var(--text);cursor:pointer;font-size:13px;border-radius:var(--radius-xs);text-align:left;transition:background var(--dur-fast);}
.ctx-menu button:hover{background:var(--surface3);}
.ctx-menu button.danger{color:var(--red);}
.ctx-menu button.danger:hover{background:var(--red-dim);}

/* ── Empty State ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text2);}
.empty-state .empty-icon{font-size:64px;margin-bottom:20px;opacity:.4;}
.empty-state .empty-text{font-size:14px;font-weight:500;color:var(--text2);text-align:center;line-height:1.8;}
.empty-state .empty-action{color:var(--accent);font-weight:600;cursor:pointer;padding:5px 14px;border-radius:var(--radius-sm);transition:background var(--dur-fast);display:inline-block;margin-top:4px;}
.empty-state .empty-action:hover{background:var(--accent-dim);}

/* ── Toast ── */
.toast{
  position:fixed;top:16px;left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:var(--surface3);
  border:1px solid var(--border2);
  padding:7px 18px;border-radius:20px;
  font-size:12px;font-weight:500;
  letter-spacing:0.01em;
  z-index:400;
  box-shadow:var(--shadow-lg);
  transition:opacity var(--dur-base) var(--ease),transform var(--dur-base) var(--ease);
  opacity:0;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Undo Delete Toast ── */
.undo-toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:0;
  z-index:450;
  box-shadow:var(--shadow-lg);
  min-width:260px;max-width:360px;
  overflow:hidden;
  opacity:0;pointer-events:none;
  transition:opacity var(--dur-base) var(--ease),transform var(--dur-base) var(--ease);
}
.undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.undo-toast-body{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;
}
.undo-toast-msg{flex:1;font-size:12px;color:var(--text2);}
.undo-toast-msg strong{color:var(--text);font-weight:500;}
.undo-toast-cancel{
  flex-shrink:0;
  background:var(--surface3);border:1px solid var(--border2);
  color:var(--text);font-size:12px;font-weight:500;
  padding:4px 11px;border-radius:var(--radius-xs);
  cursor:pointer;font-family:inherit;
  transition:background var(--dur-fast),border-color var(--dur-fast);
}
.undo-toast-cancel:hover{background:var(--surface4);border-color:var(--border3);}
/* 进度条倒计时 */
.undo-toast-bar{
  height:2px;
  background:var(--red);
  transform-origin:left;
  transform:scaleX(1);
  transition:transform linear;
}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:22px;width:90%;max-width:640px;max-height:82vh;overflow-y:auto;box-shadow:var(--shadow-xl);}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text);}
.modal pre{background:var(--bg);padding:14px;border-radius:var(--radius-sm);font-size:12px;overflow-x:auto;white-space:pre-wrap;max-height:45vh;border:1px solid var(--border);}
.modal textarea{width:100%;height:200px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:12px;font-size:12px;font-family:monospace;resize:vertical;outline:none;transition:border-color var(--dur-fast);}
.modal textarea:focus{border-color:var(--accent);}
.modal .m-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:16px;}
.modal button{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:background var(--dur-fast),border-color var(--dur-fast);}
.modal button:hover{background:var(--surface3);border-color:var(--border3);}
.modal button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.modal button.primary:hover{background:var(--accent2);border-color:var(--accent2);}
.modal button.danger-btn{background:var(--red);border-color:var(--red);color:#fff;}
.modal button.danger-btn:hover{background:#c55;border-color:#c55;}

/* ── Inline add button ── */
.add-inline-btn{
  background:transparent !important;
  border:1px dashed var(--border2) !important;
  border-radius:var(--radius-xs);color:var(--text3) !important;
  cursor:pointer;font-size:0 !important;
  padding:4px 10px !important;
  min-height:28px;
  display:inline-flex !important;align-items:center;justify-content:center;
  transition:border-color var(--dur-fast),color var(--dur-fast),background var(--dur-fast);
  white-space:nowrap;line-height:1.6;font-family:inherit;
}
.add-inline-btn::before{content:'＋';font-size:12px;}
.add-inline-btn:hover{border-color:var(--accent) !important;color:var(--accent) !important;background:var(--accent-dim) !important;}

/* ── FB Popover（反馈与边界条件浮层）── */
.fb-popover-btn{background:var(--purple-dim) !important;border:1px solid rgba(155,135,212,0.35) !important;border-radius:var(--radius-sm);color:var(--purple) !important;cursor:pointer;font-size:12px !important;padding:3px 9px !important;transition:background var(--dur-fast),border-color var(--dur-fast);white-space:nowrap;}
.fb-popover-btn:hover{background:rgba(155,135,212,0.22) !important;border-color:var(--purple) !important;}
.fb-popover-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.fb-popover{position:fixed;z-index:310;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:0;width:760px;max-width:calc(100vw - 40px);height:75vh;max-height:75vh;display:flex;flex-direction:column;box-shadow:var(--shadow-xl);top:50%;left:50%;transform:translate(-50%,-50%);}
.fb-popover-head{display:flex;align-items:center;gap:8px;padding:14px 18px 0;flex-shrink:0;}
.fb-popover-head h3{font-size:14px;font-weight:600;color:var(--purple);flex:1;}
.fb-popover-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:var(--radius-xs);line-height:1;transition:background var(--dur-fast),color var(--dur-fast);}
.fb-popover-close:hover{background:var(--surface2);color:var(--text);}
.fb-stage-tabs{display:flex;gap:3px;padding:10px 18px 0;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.fb-stage-tabs::-webkit-scrollbar{display:none;}
.fb-stage-tab{padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);white-space:nowrap;transition:background var(--dur-fast),color var(--dur-fast),border-color var(--dur-fast);flex-shrink:0;}
.fb-stage-tab:hover{border-color:var(--purple);color:var(--purple);}
.fb-stage-tab.active{background:var(--purple-dim);border-color:var(--purple);color:var(--purple);font-weight:600;}
.fb-popover-body{overflow-y:auto;padding:12px 18px 16px;flex:1;min-height:0;}
.fb-popover-body .editable{overflow-wrap:break-word;word-break:break-word;}
.fb-popover-body .step-content,.fb-popover-body .branch-title{white-space:normal;overflow-wrap:break-word;word-break:break-word;}
</style>
</head>
<body>

<!-- ── Toolbar Row 1：品牌 + TAB 导航 + 存储状态 ── -->
<div class="toolbar">
  <h1>
    <span class="brand-icon" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </span>
    UX Editor
  </h1>
  <div class="sep"></div>
  <!-- TAB 内嵌至 Toolbar -->
  <div class="toolbar-tabs">
    <div class="mode-tab active" data-mode="A">策划案分析</div>
    <div class="mode-tab" data-mode="B">行为路径</div>
    <div class="mode-tab" data-mode="C" style="display:none;">信息架构</div>
    <div class="mode-tab" data-mode="D">交互稿</div>
  </div>
  <!-- 右侧：存储状态 -->
  <div class="storage-status" id="storageStatus" title="数据自动保存到浏览器" style="margin-left:auto;">
    <span class="storage-dot"></span>
    <span>已保存</span>
  </div>
</div>

<!-- ── Toolbar Row 2：操作栏（分三组）── -->
<div class="tab-bar">
  <!-- 组1：历史 -->
  <div class="undo-redo">
    <button id="undoBtn" disabled title="撤销 Ctrl+Z" aria-label="撤销">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
    </button>
    <button id="redoBtn" disabled title="重做 Ctrl+Y" aria-label="重做">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3L21 13"/></svg>
    </button>
  </div>
  <div class="actions-right" style="margin-left:auto;">
    <!-- 组2：数据 -->
    <button id="importBtn" aria-label="导入 JSON">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      导入
    </button>

<script>
// ====== Core Utils ======
let uid = 1000;
function nid() { return 'n' + (uid++); }
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Undo Delete Toast ──
let _undoTimer = null;
let _undoRafId = null;
function pendingDel(label, execFn, delay = 3000) {
  // 如有上一个待删除，立即执行
  if (_undoTimer) {
    clearTimeout(_undoTimer);
    clearAnimationFrame(_undoRafId);
    _undoTimer = null;
    document.getElementById('undoToast').classList.remove('show');
  }
  const toastEl = document.getElementById('undoToast');
  const msgEl   = document.getElementById('undoToastMsg');
  const barEl   = document.getElementById('undoToastBar');
  const cancelEl = document.getElementById('undoToastCancel');
  msgEl.innerHTML = `即将删除 <strong>${label}</strong>`;
  // 进度条动画
  barEl.style.transition = 'none';
  barEl.style.transform  = 'scaleX(1)';
  toastEl.classList.add('show');
  // 下一帧启动进度条
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      barEl.style.transition = `transform ${delay}ms linear`;
      barEl.style.transform  = 'scaleX(0)';
    });
  });
  // 撤销按钮
  const newCancel = cancelEl.cloneNode(true);
  cancelEl.parentNode.replaceChild(newCancel, cancelEl);
  newCancel.onclick = () => {
    clearTimeout(_undoTimer);
    _undoTimer = null;
    toastEl.classList.remove('show');
    toast('已取消删除');
  };
  // 倒计时后真正执行
  _undoTimer = setTimeout(() => {
    _undoTimer = null;
    toastEl.classList.remove('show');
    execFn();
  }, delay);
}
function clearAnimationFrame(id) { if (id) cancelAnimationFrame(id); }

// ====== Icon System (Heroicons Outline 24px) ======
const ICONS = {
  // 删除 / 关闭

  // 成功
  check: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-1px"><polyline points="20 6 9 17 4 12"/></svg>`,
  // 模块
  modules: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>`,
  // 空状态
  empty: `<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>`,
  // 统计报告
  chart: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
  // 阶段（层叠/流程步骤）
  stage: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
  // 用户操作（人像）
  user: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  // 反馈与边界（双向箭头）
  feedback: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`,
  // 分支选项（向右箭头）
  arrowRight: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
  // 删除（垃圾桶）
  trash: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`,
};

// ====== State ======
let store = { A: {}, B: [], C: [], D: [] };
let importSnapshot = { A: {}, B: [], C: [], D: [] }; // 导入时的快照，用于对比修改
let annotations = {}; // { nodeId: "批注内容" }
let hist = [], hIdx = -1, activeMode = 'A';
const STORAGE_KEY = 'ux_design_editor_data';
const ANNO_STORAGE_KEY = 'ux_design_editor_annotations';
const SNAPSHOT_STORAGE_KEY = 'ux_design_editor_snapshot';
const FINGERPRINT_STORAGE_KEY = 'ux_design_editor_fingerprints';

// ====== Reference Network ======
// 运行时反向索引（不持久化），key = 被引用方ID，value = [{ from, fromMode, fromLabel }]
let refIndex = {};
// 引用指纹（持久化），建立引用时记录被引用对象的内容hash，用于变更检测
let refFingerprints = {};

/**
 * 从 store 构建反向引用索引
 * B.refs.A → refIndex[aModuleId] = [{ from: bPathId, fromMode:'B', fromLabel }]
 * D.refs.B → refIndex[bPathId]   = [{ from: dSpecId, fromMode:'D', fromLabel }]
 * D.refs.C → refIndex[cPageId]   = [{ from: dSpecId, fromMode:'D', fromLabel }]
 */
function buildRefIndex() {
  refIndex = {};
  // B→A
  (store.B || []).forEach(path => {
    (path.refs?.A || []).forEach(aId => {
      if (!refIndex[aId]) refIndex[aId] = [];
      refIndex[aId].push({ from: path.id, fromMode: 'B', fromLabel: path.title });
    });
  });
  // D→B
  (store.D || []).forEach(spec => {
    (spec.refs?.B || []).forEach(bId => {
      if (!refIndex[bId]) refIndex[bId] = [];
      refIndex[bId].push({ from: spec.id, fromMode: 'D', fromLabel: spec.specName });
    });
    // D→C
    (spec.refs?.C || []).forEach(cId => {
      if (!refIndex[cId]) refIndex[cId] = [];
      refIndex[cId].push({ from: spec.id, fromMode: 'D', fromLabel: spec.specName });
    });
  });
}

/**
 * 对节点对象生成轻量内容指纹（djb2 hash），排除 refs/collapsed/id 等非内容字段
 */
function fingerprint(obj) {
  const content = JSON.stringify(obj, (key, val) => {
    if (['refs', 'collapsed', 'id'].includes(key)) return undefined;
    return val;
  });
  let hash = 5381;
  for (let i = 0; i < content.length; i++) {
    hash = ((hash << 5) + hash) + content.charCodeAt(i);
  }
  return 'fp_' + (hash >>> 0).toString(36);
}

/**
 * 记录被引用对象的当前内容指纹
 */
function snapshotFingerprint(targetId, targetObj) {
  refFingerprints[targetId] = fingerprint(targetObj);
  try { localStorage.setItem(FINGERPRINT_STORAGE_KEY, JSON.stringify(refFingerprints)); } catch(e) {}
}

/**
 * 检查被引用对象内容是否已变更
 */
function hasRefChanged(targetId, targetObj) {
  const saved = refFingerprints[targetId];
  if (!saved) return false;
  return saved !== fingerprint(targetObj);
}

/**
 * 确保 B 和 D 数据中的 refs 字段存在（导入兼容）
 */
function ensureRefs() {
  (store.B || []).forEach(path => {
    if (!path.refs) path.refs = {};
    if (!path.refs.A) path.refs.A = [];
  });
  (store.D || []).forEach(spec => {
    if (!spec.refs) spec.refs = {};
    if (!spec.refs.B) spec.refs.B = [];
    if (!spec.refs.C) spec.refs.C = [];
  });
}

// ====== D 模块数据迁移（旧 visible/interactions → 新 elements/flows）======
function migrateD() {
  let migrated = false;
  (store.D || []).forEach(spec => {
    // 迁移 visible → elements
    if (spec.visible && !spec.elements) {
      spec.elements = [{
        id: nid(), area: '默认区域',
        items: spec.visible.map(v => ({ id: v.id || nid(), label: '展示内容', desc: v.text || '' }))
      }];
      delete spec.visible;
      migrated = true;
    }
    // 迁移 interactions → flows
    if (spec.interactions && !spec.flows) {
      spec.flows = spec.interactions.map(it => ({
        id: it.id || nid(), action: it.text || '', trigger: '', validation: '',
        steps: [], exceptions: []
      }));
      delete spec.interactions;
      migrated = true;
    }
    // 迁移 boundaries 字段名（type→scenario, feedback→defense）
    if (spec.boundaries) {
      spec.boundaries.forEach(b => {
        if (b.type !== undefined && b.scenario === undefined) {
          b.scenario = b.type; delete b.type; migrated = true;
        }
        if (b.feedback !== undefined && b.defense === undefined) {
          b.defense = b.feedback; delete b.feedback; migrated = true;
        }
      });
    }
    // 确保新字段存在
    if (!spec.elements) spec.elements = [];
    if (!spec.flows) spec.flows = [];
    if (!spec.boundaries) spec.boundaries = [];
  });
  if (migrated) { save(); console.log('[migrateD] 旧版 D 模块数据已迁移到新结构'); }
}

/**
 * 根据 ID 在 store 中查找对应节点及其标签
 * 返回 { mode, label, obj } 或 null
 */
function resolveRefTarget(targetId) {
  // 在 A 模块中查找
  const aMod = store.A.modules?.find(m => m.id === targetId);
  if (aMod) return { mode: 'A', label: aMod.name, obj: aMod };
  // 在 B 路径中查找
  const bPath = (store.B || []).find(p => p.id === targetId);
  if (bPath) return { mode: 'B', label: bPath.title, obj: bPath };
  // 在 C 页面中查找
  const cPage = (store.C || []).find(p => p.id === targetId);
  if (cPage) return { mode: 'C', label: cPage.pageName, obj: cPage };
  // 在 D 交互稿中查找
  const dSpec = (store.D || []).find(s => s.id === targetId);
  if (dSpec) return { mode: 'D', label: dSpec.specName, obj: dSpec };
  return null;
}

/**
 * 渲染正向引用标签行（B卡片显示refs.A，D卡片显示refs.B和refs.C）
 */
function renderRefTags(item, itemMode) {
  if (!item.refs) return '';
  const tags = [];
  const refKeys = itemMode === 'B' ? ['A'] : ['B', 'C'];
  refKeys.forEach(targetMode => {
    (item.refs[targetMode] || []).forEach(targetId => {
      const resolved = resolveRefTarget(targetId);
      if (!resolved) {
        tags.push(`<span class="ref-tag deleted" title="引用目标已删除">${ICONS.warning} <span class="ref-mode">${targetMode}:</span>(已删除)</span>`);
      } else {
        const changed = hasRefChanged(targetId, resolved.obj);
        const cls = changed ? 'ref-tag changed' : 'ref-tag';
        const prefix = changed ? ICONS.warning + ' ' : '';
        const onclick = changed
          ? `showRefChangeDetail('${targetId}','${resolved.mode}','${esc(resolved.label).replace(/'/g,"\\&#39;")}')`
          : `jumpToRef('${targetId}','${resolved.mode}')`;
        const title = changed ? '内容已变更，点击查看详情' : '点击跳转';
        tags.push(`<span class="${cls}" onclick="${onclick}" title="${title}">${prefix}<span class="ref-mode">${targetMode}:</span>${esc(resolved.label)}</span>`);
      }
    });
  });
  if (tags.length === 0) return '';
  return `<div class="ref-tags">${tags.join('')}</div>`;
}

/**
 * 渲染反向引用标签行（A模块/B路径/C页面 显示"被谁引用"）
 */
function renderBackRefTags(itemId) {
  const refs = refIndex[itemId];
  if (!refs || refs.length === 0) return '';
  const tags = refs.map(r =>
    `<span class="back-ref-tag" onclick="jumpToRef('${r.from}','${r.fromMode}')" title="点击跳转到 ${r.fromLabel}">${r.fromMode}:${esc(r.fromLabel)}</span>`
  ).join('');
  return `<div class="back-ref-row"><span class="back-ref-label">${ICONS.pin}被引用:</span>${tags}</div>`;
}

/**
 * 跳转到引用目标：切换Tab + 滚动 + 高亮闪烁
 */
function jumpToRef(targetId, targetMode) {
  switchMode(targetMode);
  requestAnimationFrame(() => {
    const selectors = [
      `.card[data-path="${targetId}"]`,
      `.card[data-mod="${targetId}"]`,
      `.card[data-page="${targetId}"]`,
      `.card[data-spec="${targetId}"]`
    ];
    let el = null;
    for (const sel of selectors) {
      el = document.querySelector(sel);
      if (el) break;
    }
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('ref-highlight');
      setTimeout(() => el.classList.remove('ref-highlight'), 2000);
    } else {
      toast('未找到目标节点');
    }
  });
}

/**
 * 打开引用管理浮层
 */
function openRefModal(itemId, itemMode) {
  const item = itemMode === 'B' ? (store.B || []).find(p => p.id === itemId) : (store.D || []).find(s => s.id === itemId);
  if (!item) return;
  if (!item.refs) item.refs = {};

  let sections = '';

  if (itemMode === 'B') {
    const aModules = store.A.modules || [];
    const selectedA = new Set(item.refs.A || []);
    sections += `<div class="modal-section">
      <div class="modal-section-title">📎 引用功能模块（A）</div>
      <div class="ref-modal-list" id="refListA">
        ${aModules.length === 0 ? '<div class="modal-empty">暂无功能模块数据</div>' :
          aModules.map(m => `<label class="ref-modal-item">
            <input type="checkbox" value="${m.id}" ${selectedA.has(m.id) ? 'checked' : ''}>
            <span class="ref-modal-label">${esc(m.name)}</span>
            <span class="ref-modal-id">${m.id}</span>
          </label>`).join('')}
      </div>
    </div>`;
  }

  if (itemMode === 'D') {
    const bPaths = store.B || [];
    const selectedB = new Set(item.refs.B || []);
    sections += `<div class="modal-section">
      <div class="modal-section-title">📎 引用行为路径（B）</div>
      <div class="ref-modal-list" id="refListB">
        ${bPaths.length === 0 ? '<div class="modal-empty">暂无行为路径数据</div>' :
          bPaths.map(p => `<label class="ref-modal-item">
            <input type="checkbox" value="${p.id}" ${selectedB.has(p.id) ? 'checked' : ''}>
            <span class="ref-modal-label">${esc(p.title)}</span>
            <span class="ref-modal-id">${p.id}</span>
          </label>`).join('')}
      </div>
    </div>`;

    const cPages = store.C || [];
    const selectedC = new Set(item.refs.C || []);
    sections += `<div class="modal-section">
      <div class="modal-section-title">📎 引用信息架构（C）</div>
      <div class="ref-modal-list" id="refListC">
        ${cPages.length === 0 ? '<div class="modal-empty">暂无信息架构数据</div>' :
          cPages.map(p => `<label class="ref-modal-item">
            <input type="checkbox" value="${p.id}" ${selectedC.has(p.id) ? 'checked' : ''}>
            <span class="ref-modal-label">${esc(p.pageName)}</span>
            <span class="ref-modal-id">${p.id}</span>
          </label>`).join('')}
      </div>
    </div>`;
  }

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal modal-sm">
    <h2 class="modal-h2">${ICONS.link} 管理引用关系</h2>
    <p class="modal-hint">选择该${itemMode === 'B' ? '路径' : '交互稿'}所关联的上游模块，建立引用后可跳转导航和变更检测</p>
    ${sections}
    <div class="m-actions">
      <button onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="primary" onclick="saveRefs('${itemId}','${itemMode}')">保存</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

/**
 * 保存引用关系
 */
function saveRefs(itemId, itemMode) {
  const item = itemMode === 'B' ? (store.B || []).find(p => p.id === itemId) : (store.D || []).find(s => s.id === itemId);
  if (!item) return;
  if (!item.refs) item.refs = {};

  if (itemMode === 'B') {
    const listA = document.getElementById('refListA');
    if (listA) {
      const checked = [...listA.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
      item.refs.A = checked;
      checked.forEach(aId => {
        const mod = store.A.modules?.find(m => m.id === aId);
        if (mod) snapshotFingerprint(aId, mod);
      });
    }
  }

  if (itemMode === 'D') {
    const listB = document.getElementById('refListB');
    if (listB) {
      const checked = [...listB.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
      item.refs.B = checked;
      checked.forEach(bId => {
        const path = (store.B || []).find(p => p.id === bId);
        if (path) snapshotFingerprint(bId, path);
      });
    }
    const listC = document.getElementById('refListC');
    if (listC) {
      const checked = [...listC.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
      item.refs.C = checked;
      checked.forEach(cId => {
        const page = (store.C || []).find(p => p.id === cId);
        if (page) snapshotFingerprint(cId, page);
      });
    }
  }

  document.querySelector('.modal-overlay')?.remove();
  save(); renderAll();
  toast('引用关系已保存');
}

/**

function showRefChangeDetail(targetId, targetMode, targetLabel) {

  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });

/**
 * 计算引用变更摘要（对比指纹快照与当前内容的差异）
 */
function computeRefChangeSummary(targetId, targetObj, targetMode) {
  const changes = [];
  try {
    if (targetMode === 'A') {
      // A模块：对比 features / suggestions 数量
      changes.push({ icon: '📝', text: `功能项数量: ${targetObj.features?.length || 0} 个`, color: 'var(--accent)' });
      changes.push({ icon: '💡', text: `建议数量: ${targetObj.suggestions?.length || 0} 个`, color: 'var(--green)' });
      changes.push({ icon: '🏷️', text: `优先级: ${targetObj.priority === 'high' ? '高' : targetObj.priority === 'mid' ? '中' : '低'}`, color: 'var(--yellow)' });
    } else if (targetMode === 'B') {
      // B路径：对比 stages 数量、起点、关键点
      changes.push({ icon: '🌊', text: `阶段数量: ${targetObj.stages?.length || 0} 个`, color: 'var(--accent)' });
      changes.push({ icon: '📍', text: `起点: ${targetObj.startPoint || '(空)'}`, color: 'var(--text2)' });
      changes.push({ icon: '⭐', text: `体验关键点: ${targetObj.keyPoint || '(空)'}`, color: 'var(--text2)' });
    } else if (targetMode === 'C') {
      // C页面：对比根节点数量
      const countNodes = (nodes) => { let c = nodes.length; nodes.forEach(n => { c += countNodes(n.children || []); }); return c; };
      const total = countNodes(targetObj.nodes || []);
      changes.push({ icon: '🌳', text: `节点总数: ${total} 个`, color: 'var(--accent)' });
    }
  } catch (e) {
    changes.push({ icon: '❓', text: '无法解析变更详情', color: 'var(--text2)' });
  }
  return changes;
}

/**
 * 标记变更已读（更新指纹）
 */
function ackRefChange(targetId, targetMode) {
  const resolved = resolveRefTarget(targetId);
  if (resolved) {
    snapshotFingerprint(targetId, resolved.obj);
  }
  document.querySelector('.modal-overlay')?.remove();
  renderAll();
  toast('已标记为已读');
}

// ====== Phase 4: 覆盖率报告 ======

/**
 * 生成覆盖率报告数据
 */
function generateCoverageReport() {
  const report = {
    BA: { items: [], covered: 0, total: 0 },
    DB: { items: [], covered: 0, total: 0 },
    DC: { items: [], covered: 0, total: 0 },
    orphans: []
  };

  // B→A 覆盖率
  (store.B || []).forEach(path => {
    const linked = path.refs?.A?.length > 0;
    const targets = (path.refs?.A || []).map(id => {
      const mod = store.A.modules?.find(m => m.id === id);
      return mod ? mod.name : `(ID:${id} 未找到)`;
    });
    const changed = linked && (path.refs.A || []).some(id => {
      const mod = store.A.modules?.find(m => m.id === id);
      return mod && hasRefChanged(id, mod);
    });
    report.BA.items.push({ source: path.title, sourceId: path.id, linked, targets, changed });
    report.BA.total++;
    if (linked) report.BA.covered++;
  });

  // D→B 覆盖率
  (store.D || []).forEach(spec => {
    const linked = spec.refs?.B?.length > 0;
    const targets = (spec.refs?.B || []).map(id => {
      const p = (store.B || []).find(b => b.id === id);
      return p ? p.title : `(ID:${id} 未找到)`;
    });
    report.DB.items.push({ source: spec.specName, sourceId: spec.id, linked, targets });
    report.DB.total++;
    if (linked) report.DB.covered++;
  });

  // D→C 覆盖率
  (store.D || []).forEach(spec => {
    const linked = spec.refs?.C?.length > 0;
    const targets = (spec.refs?.C || []).map(id => {
      const p = (store.C || []).find(c => c.id === id);
      return p ? p.pageName : `(ID:${id} 未找到)`;
    });
    report.DC.items.push({ source: spec.specName, sourceId: spec.id, linked, targets });
    report.DC.total++;
    if (linked) report.DC.covered++;
  });

  // 孤立节点：A模块未被任何B引用
  (store.A.modules || []).forEach(mod => {
    if (!refIndex[mod.id] || refIndex[mod.id].length === 0) {
      report.orphans.push({ id: mod.id, label: mod.name, mode: 'A', missing: '无B引用' });
    }
  });
  // 孤立节点：B路径未被任何D引用
  (store.B || []).forEach(path => {
    if (!refIndex[path.id] || refIndex[path.id].length === 0) {
      report.orphans.push({ id: path.id, label: path.title, mode: 'B', missing: '无D引用' });
    }
  });
  // 孤立节点：C页面未被任何D引用
  (store.C || []).forEach(page => {
    if (!refIndex[page.id] || refIndex[page.id].length === 0) {
      report.orphans.push({ id: page.id, label: page.pageName, mode: 'C', missing: '无D引用' });
    }
  });

  return report;
}

/**
 * 渲染进度条
 */
function renderProgressBar(covered, total) {
  if (total === 0) return '<span class="progress-bar-label">无数据</span>';
  const pct = Math.round((covered / total) * 100);
  const colorCls = pct === 100 ? 'green' : pct >= 60 ? 'yellow' : 'red';
  return `<div class="progress-bar-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill ${colorCls}" style="width:${pct}%;"></div>
    </div>
    <span class="progress-bar-label ${colorCls}">${covered}/${total} (${pct}%)</span>
  </div>`;
}

/**
 * 导出覆盖率报告为 Markdown
 */
function exportCoverageReportMd() {
  const report = generateCoverageReport();
  let md = '# 📊 引用覆盖率报告\n\n';
  md += `> 生成时间：${new Date().toLocaleString()}\n\n`;

  const addSection = (title, data) => {
    md += `## ${title}\n\n`;
    if (data.total === 0) { md += '暂无数据\n\n'; return; }
    const pct = Math.round((data.covered / data.total) * 100);
    md += `**覆盖率：${data.covered}/${data.total} (${pct}%)**\n\n`;
    data.items.forEach(item => {
        const icon = item.linked ? ICONS.check : ICONS.warning;
      const target = item.linked ? item.targets.join(', ') : '(未关联)';
      const change = item.changed ? ' 🔄已变更' : '';
      md += `- ${icon} ${item.source} → ${target}${change}\n`;
    });
    md += '\n';
  };

  addSection('B → A 覆盖率（行为路径 → 功能模块）', report.BA);
  addSection('D → B 覆盖率（交互稿 → 行为路径）', report.DB);
  addSection('D → C 覆盖率（交互稿 → 信息架构）', report.DC);

  if (report.orphans.length > 0) {

  } else {
    md += '## ✅ 无孤立节点\n\n所有模块/路径/页面均已被引用。\n';

  // 关闭覆盖率弹窗后显示导出弹窗

// ====== LocalStorage ======
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
    localStorage.setItem(ANNO_STORAGE_KEY, JSON.stringify(annotations));
    updateStorageStatus(true);
  } catch (e) {
    console.error('LocalStorage save failed:', e);
    updateStorageStatus(false);
  }
}

function loadFromStorage() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    const annoData = localStorage.getItem(ANNO_STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      if (parsed.A || parsed.B || parsed.C || parsed.D) {
        store = parsed;
        // 确保所有模式数据存在
        if (!store.A) store.A = {};
        if (!store.B) store.B = [];
        if (!store.C) store.C = [];
        if (!store.D) store.D = [];
        return true;
      }
    }
    if (annoData) {
      annotations = JSON.parse(annoData);
    }
  } catch (e) {
    console.error('LocalStorage load failed:', e);
  }
  return false;
}

function clearStorage() {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `
    <div class="modal modal-sm">
      <h2>🗑️ 清除数据</h2>
      <p class="confirm-modal-text">
        此操作将清除<strong class="hl-text">四个模式（A/B/C/D）下的所有数据</strong>，包括批注、引用关系、导入快照等，且<strong class="hl-red">无法撤销</strong>。<br>确定要继续吗？
      </p>
      <div class="m-actions">
        <button onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="primary danger-btn" onclick="this.closest('.modal-overlay').remove();doClearStorage()">确认清除</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}

function doClearStorage() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(ANNO_STORAGE_KEY);
  localStorage.removeItem(SNAPSHOT_STORAGE_KEY);
  localStorage.removeItem(FINGERPRINT_STORAGE_KEY);
  localStorage.removeItem(SHARE_CODE_STORAGE_KEY);
  annotations = {};
  refFingerprints = {};
  refIndex = {};
  store = { A: {}, B: [], C: [], D: [] };
  importSnapshot = { A: {}, B: [], C: [], D: [] };
  hist = []; hIdx = -1;
  save(); renderAll();

}

function updateStorageStatus(saved) {
  const el = document.getElementById('storageStatus');
  const dot = el.querySelector('.storage-dot');
  const text = el.querySelector('span:last-child');
  if (saved) {
    dot.classList.remove('unsaved');
    text.textContent = '已保存';
  } else {
    dot.classList.add('unsaved');
    text.textContent = '未保存';
  }
}

// ====== History ======
function save() {
  const snap = JSON.stringify(store);
  hist = hist.slice(0, hIdx + 1);
  hist.push(snap);
  if (hist.length > 80) hist.shift();
  hIdx = hist.length - 1;
  updHist();
  saveToStorage(); // 同步到 LocalStorage
  buildRefIndex(); // 每次保存后刷新引用索引
}
function undo() {
  if (hIdx <= 0) return;
  hIdx--;
  store = JSON.parse(hist[hIdx]);
  renderAll(); updHist(); toast('已撤销');
}
function redo() {
  if (hIdx >= hist.length - 1) return;
  hIdx++;
  store = JSON.parse(hist[hIdx]);
  renderAll(); updHist(); toast('已重做');
}
function updHist() {
  document.getElementById('undoBtn').disabled = hIdx <= 0;
  document.getElementById('redoBtn').disabled = hIdx >= hist.length - 1;
}

// ====== Drag & Drop ======
let dragData = null;

// 工具函数：通过 drag-handle 精准控制拖动热区
// 仅在 mousedown 于 .drag-handle 时才临时开启父容器的 draggable
function bindHandleDrag(el, onDragStart, onDragEnd, onDragOver, onDragLeave, onDrop) {
  el.draggable = false;
  const handle = el.querySelector('.drag-handle');
  if (handle) {
    handle.onmousedown = () => { el.draggable = true; };
    document.addEventListener('mouseup', () => { el.draggable = false; }, { once: false });
    el.ondragend = () => { el.draggable = false; onDragEnd(); };
  } else {
    // 无 handle 则降级为全区域可拖（保持兼容）
    el.draggable = true;
    el.ondragend = onDragEnd;
  }
  el.ondragstart = onDragStart;
  el.ondragover = onDragOver;
  el.ondragleave = onDragLeave;
  el.ondrop = onDrop;
}

function bindDragDrop() {
  // 模式 B 路径拖拽
  document.querySelectorAll('#panelB .card[data-path]').forEach((card, idx) => {
    bindHandleDrag(
      card,
      e => { dragData = { type: 'b-path', idx }; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'b-path') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'b-path' && dragData.idx !== idx) {
          const item = store.B.splice(dragData.idx, 1)[0];
          store.B.splice(idx, 0, item);
          save(); renderAll(); toast('已调整顺序');
        }
      }
    );
  });

  // 模式 B 阶段拖拽（支持跨父级路径）
  document.querySelectorAll('#panelB .stage[data-stage]').forEach(stage => {
    const pid = stage.dataset.path;
    const sid = stage.dataset.stage;
    const path = bFindP(pid);
    if (!path) return;
    const stageIdx = path.stages.findIndex(s => s.id === sid);
    bindHandleDrag(
      stage,
      e => { e.stopPropagation(); dragData = { type: 'b-stage', pid, stageIdx, sid }; stage.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; },
      () => { stage.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); e.stopPropagation(); if (dragData?.type === 'b-stage') stage.classList.add('drag-over'); },
      () => stage.classList.remove('drag-over'),
      e => {
        e.preventDefault(); e.stopPropagation(); stage.classList.remove('drag-over');
        if (dragData?.type !== 'b-stage') return;
        if (dragData.pid === pid && dragData.stageIdx === stageIdx) return;
        const srcPath = bFindP(dragData.pid);
        const tgtPath = bFindP(pid);
        if (!srcPath || !tgtPath) return;
        const [item] = srcPath.stages.splice(dragData.stageIdx, 1);
        tgtPath.stages.splice(stageIdx, 0, item);
        save(); renderAll(); toast(dragData.pid === pid ? '已调整阶段顺序' : '已跨路径移动阶段');
      }
    );
  });

  // 模式 C 页面拖拽
  document.querySelectorAll('#panelC .card').forEach((card, idx) => {
    const pageId = card.querySelector('[data-f="c-page"]')?.dataset.i;
    if (!pageId) return;
    bindHandleDrag(
      card,
      e => { dragData = { type: 'c-page', idx }; card.classList.add('dragging'); },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'c-page') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'c-page' && dragData.idx !== idx) {
          const item = store.C.splice(dragData.idx, 1)[0];
          store.C.splice(idx, 0, item);
          save(); renderAll(); toast('已调整顺序');
        }
      }
    );
  });

  // 模式 D 交互稿拖拽
  document.querySelectorAll('#panelD .card').forEach((card, idx) => {
    const specId = card.querySelector('[data-f="d-name"]')?.dataset.i;
    if (!specId) return;
    bindHandleDrag(
      card,
      e => { dragData = { type: 'd-spec', idx }; card.classList.add('dragging'); },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'd-spec') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'd-spec' && dragData.idx !== idx) {
          const item = store.D.splice(dragData.idx, 1)[0];
          store.D.splice(idx, 0, item);
          save(); renderAll(); toast('已调整顺序');
        }
      }
    );
  });

  // 模式 A 模块拖拽
  document.querySelectorAll('#panelA .card[data-mod]').forEach((card, idx) => {
    bindHandleDrag(
      card,
      e => { dragData = { type: 'a-mod', idx }; card.classList.add('dragging'); },
      () => { card.classList.remove('dragging'); dragData = null; },
      e => { e.preventDefault(); if (dragData?.type === 'a-mod') card.classList.add('drag-over'); },
      () => card.classList.remove('drag-over'),
      e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragData?.type === 'a-mod' && dragData.idx !== idx) {
          const item = store.A.modules.splice(dragData.idx, 1)[0];
          store.A.modules.splice(idx, 0, item);
          save(); renderAll(); toast('已调整模块顺序');
        }
      }
    );
  });
}

// ============================================================
// 复制模块内容到剪贴板（纯文本，区分标题与正文）
// ============================================================
// 去除 emoji 及多余空白，保留纯文本语义内容
function stripEmoji(str) {
  return (str||'').replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu,'').replace(/\s{2,}/g,' ').trim();
}
// 避免前缀与字段内容重复：若内容已以"前缀"开头则直接用内容，否则拼接前缀
function safePrefix(prefix, value) {
  const v = stripEmoji(value);
  const p = prefix.replace(/：$/, '');
  return (v.startsWith(p+'：') || v.startsWith(p+':') || v===p) ? v : `${prefix}${v}`;
}

// 复制富文本到剪贴板（同时写 text/html + text/plain）
// lines 为数组，每项：{ text, bold?, indent? }
function copyRichText(lines) {
  const plain = lines.map(l => (l.indent||'') + l.text).join('\n');
  const html = '<div style="font-family:sans-serif;font-size:14px;line-height:1.8;">' +
    lines.map(l => {
      const t = l.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const ind = l.indent ? `<span style="white-space:pre;">${l.indent}</span>` : '';
      return l.bold
        ? `<p style="margin:0;">${ind}<strong>${t}</strong></p>`
        : `<p style="margin:0;">${ind}${t}</p>`;
    }).join('') + '</div>';
  try {
    const item = new ClipboardItem({
      'text/html' : new Blob([html],  { type:'text/html'  }),
      'text/plain': new Blob([plain], { type:'text/plain' })
    });
    navigator.clipboard.write([item]).then(()=>toast('已复制到剪贴板（含格式）')).catch(()=>_copyPlainFallback(plain));
  } catch(e) { _copyPlainFallback(plain); }
}
function _copyPlainFallback(text) {
  navigator.clipboard.writeText(text).then(()=>toast('已复制到剪贴板')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已复制到剪贴板');
  });
}

    });
    L.push({text:''});
  }
  if(sp.flows&&sp.flows.length){
    L.push({text:'核心场景交互流：',bold:true});
    sp.flows.forEach((fl,idx,arr)=>{
      L.push({text:`操作：${stripEmoji(fl.action)}`,bold:true,indent:'  '});
      if(fl.trigger)L.push({text:safePrefix('触发条件：',fl.trigger),indent:'    '});
      if(fl.validation)L.push({text:safePrefix('系统校验：',fl.validation),indent:'    '});
      (fl.steps||[]).forEach((st,i)=>L.push({text:`${i+1}. ${stripEmoji(st.desc)}`,indent:'    '}));
      (fl.exceptions||[]).forEach(ex=>{
        L.push({text:`异常分支：${stripEmoji(ex.scenario)}`,bold:true,indent:'    '});
        L.push({text:safePrefix('触发条件：',ex.trigger),indent:'      '});
        L.push({text:safePrefix('防错设计：',ex.defense),indent:'      '});
        L.push({text:safePrefix('流程反馈：',ex.recovery),indent:'      '});
      });
      if(idx<arr.length-1)L.push({text:''});
    });
    L.push({text:''});
  }
  if(sp.boundaries&&sp.boundaries.length){
    L.push({text:'系统级边界：',bold:true});
    sp.boundaries.forEach(b=>{
      L.push({text:`【${stripEmoji(b.scenario)}】`,bold:true,indent:'  '});

      L.push({text:safePrefix('流程反馈：',b.recovery),indent:'    '});
    });
    L.push({text:''});
  }
  copyRichText(L);
}

function renderB() {
  const el = document.getElementById('panelB');
  if (!store.B || store.B.length === 0) {
    el.innerHTML = renderEmptyState();
    return;
  }
  el.innerHTML = store.B.map((path,pi) => `
    <div class="card" data-path="${path.id}" draggable="true">
      <div class="card-header">
        <span class="drag-handle">${ICONS.drag}</span>
        <div class="info">
          <div class="title editable" contenteditable="true" data-f="b-title" data-i="${path.id}">${esc(path.title)}${renderAnno(path.id)}</div>
          <div class="meta">【起点】<span class="editable" contenteditable="true" data-f="b-start" data-i="${path.id}">${esc(path.startPoint)}</span></div>
          ${renderRefTags(path, 'B')}
          ${renderBackRefTags(path.id)}
        </div>
        <div class="actions">
          <button class="ref-link-btn" onclick="openRefModal('${path.id}','B')" title="管理引用关系">${ICONS.link}</button>
          <button class="icon-btn" onclick="bCopyPath('${path.id}')" title="复制路径内容">${ICONS.copy}</button>
          <button class="add-inline-btn" onclick="bAddStage('${path.id}')">＋阶段</button>
          <button class="del-btn" onclick="pendingDel('行为路径', ()=>bDelPath('${path.id}'))" title="删除路径">${ICONS.x}</button>
          <button onclick="bToggle('${path.id}')" title="${path.collapsed?'展开':'收起'}">${path.collapsed?ICONS.chevronRight:ICONS.chevronDown}</button>
        </div>
      </div>
      <div class="card-body ${path.collapsed?'collapsed':''}">
        ${path.stages.map((s,si)=>renderBStage(path.id,s,si)).join('')}
        <button class="add-btn" onclick="bAddStage('${path.id}')">+ 新增阶段</button>
      </div>
    </div>`).join('') +
    '<div style="margin-top:12px;"><button class="add-btn" onclick="bAddPath()">+ 新增路径</button></div>';

  return `<div class="stage" data-stage="${stage.id}" data-path="${pid}">
    <div class="stage-header">
      <span class="drag-handle">${ICONS.drag}</span>
      <span class="icon-btn" style="pointer-events:none;color:var(--accent);opacity:0.7;">${ICONS.stage}</span>
